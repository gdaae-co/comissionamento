                            <div style={S.row}>
                              <FG label="Status Concessão (1378)" flex>
                                <select style={S.inp} value={mil.numStatus || "pendente"} onChange={e => updateMilNum(prop.id, mil.id, "numStatus", e.target.value)}>
                                  {Object.entries(NUMERARIO_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                                </select>
                              </FG>
                              <FG label="Boletim de Publicação" flex>
                                <input style={S.inp} value={mil.numBoletim || ""} onChange={e => updateMilNum(prop.id, mil.id, "numBoletim", e.target.value)} placeholder="Bol Int Ost Nº XX, de XX MAR 2026" />
                              </FG>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      );
    }

    /* ═══════════════════════════════════════
       ORDENS DE SERVIÇO TAB
       ═══════════════════════════════════════ */
    function emptyOS() {
      return { id: uid(), numero: "", missaoCurso: "", localidade: "", dataInicio: "", dataFim: "" };
    }

    function OSTab({ propostas, setPropostas, oficios }) {
      const [saved, setSaved] = useState(false);

      const getComprep = (propId) => {
        const of = oficios.find(o => o.propostaId === propId && o.status === "autorizado" && o.oficioComprep);
        return of?.oficioComprep || null;
      };

      const updateOS = (propostaId, milId, osId, field, value) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : {
            ...m,
            ordensServico: (m.ordensServico || []).map(os => os.id === osId ? { ...os, [field]: value } : os)
          })
        }));
      };

      const addOS = (propostaId, milId) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : {
            ...m,
            ordensServico: [...(m.ordensServico || []), emptyOS()]
          })
        }));
      };

      const removeOS = (propostaId, milId, osId) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : {
            ...m,
            ordensServico: (m.ordensServico || []).filter(os => os.id !== osId)
          })
        }));
      };

      const handleSave = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      };

      const allMil = propostas.flatMap(p => (p.militares || []).map(m => ({ ...m, _propId: p.id })));
      const totalOS = allMil.reduce((s, m) => s + (m.ordensServico?.length || 0), 0);
      const milComOS = allMil.filter(m => m.ordensServico?.length > 0).length;

      return (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Ordens de Serviço</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Controle de OS individuais por militar — missões e cursos</p>
            </div>
            <button
              style={{ ...S.btnPri, background: saved ? "linear-gradient(135deg,#16a34a,#22c55e)" : "linear-gradient(135deg,#1d4ed8,#2563eb)", transition: "all .3s" }}
              onClick={handleSave}
            >
              {saved ? I.check : I.file}
              <span>{saved ? "Salvo!" : "Salvar"}</span>
            </button>
          </div>

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Total de Militares", value: allMil.length, color: "#6366f1" },
              { label: "Militares com OS", value: milComOS, color: "#22c55e" },
              { label: "Total de OS", value: totalOS, color: "#3b82f6" },
              { label: "Sem OS", value: allMil.length - milComOS, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.clipboard}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {allMil.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.clipboard}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum militar nas propostas</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Cadastre militares em uma proposta para gerenciar as OS aqui.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 16 }}>
              {propostas.filter(p => p.militares?.length > 0).map(prop => {
                const comprep = getComprep(prop.id);
                return (
                <div key={prop.id} style={S.card}>
                  <div style={{ padding: "14px 22px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, background: "rgba(56,189,248,0.04)" }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#7dd3fc" }}>{prop.titulo || "Proposta sem título"}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em" }}>COMPREP:</span>
                      {comprep ? (
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#22c55e", fontFamily: "'JetBrains Mono','Fira Code',monospace" }}>{comprep}</span>
                      ) : (
                        <span style={{ fontSize: 12, color: "#f59e0b", fontStyle: "italic" }}>Preencha na aba Ofícios</span>
                      )}
                    </div>
                  </div>
                  <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 14 }}>
                    {prop.militares.map(mil => {
                      const oss = mil.ordensServico || [];
                      
                      const totalDiasModulos = (mil.modulos || []).reduce((s, m) => s + diffDays(m.dataInicio, m.dataFim), 0);
                      const targetDias = parseInt(mil.diasMinimos) || totalDiasModulos;
                      const diasCumpridos = calcDiasOS(oss);
                      const diasRestantes = Math.max(0, targetDias - diasCumpridos);
                      const isFechado = targetDias > 0 && diasCumpridos >= targetDias;

                      return (
                        <div key={mil.id} style={{ background: "#0c111b", border: "1px solid #1e293b", borderRadius: 12, padding: 16 }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                              <div style={S.avatar}>{mil.postoGrad?.charAt(0)}</div>
                              <div>
                                <div style={{ fontWeight: 600, color: "#f1f5f9", fontSize: 13 }}>{mil.postoGrad} {mil.nomeGuerra}</div>
                                <div style={{ fontSize: 11, color: "#64748b" }}>{mil.nomeCompleto}</div>
                                
                                <div style={{ display: "flex", gap: 12, marginTop: 6, alignItems: "center", flexWrap: "wrap" }}>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Meta: <strong style={{color: "#f1f5f9"}}>{targetDias}d</strong></span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Cumpridos: <strong style={{color: "#3b82f6"}}>{diasCumpridos}d</strong></span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Restantes: <strong style={{color: isFechado ? "#22c55e" : "#f59e0b"}}>{diasRestantes}d</strong></span>
                                  {isFechado && <span style={{ fontSize: 10, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "2px 6px", borderRadius: 4 }}>✔ FECHADO</span>}
                                </div>
                              </div>
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ fontSize: 11, fontWeight: 600, color: oss.length > 0 ? "#22c55e" : "#64748b", background: oss.length > 0 ? "rgba(34,197,94,0.12)" : "rgba(100,116,139,0.12)", padding: "3px 10px", borderRadius: 5 }}>
                                {oss.length} OS
                              </span>
                              <button style={S.btnGhost} onClick={() => addOS(prop.id, mil.id)}>{I.plus} Nova OS</button>
                            </div>
                          </div>

                          {oss.length > 0 && (
                            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                              {oss.map((os, osIdx) => (
                                <div key={os.id} style={{ background: "#111827", border: "1px solid #1e293b", borderRadius: 10, padding: 14 }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                                    <span style={{ fontSize: 12, fontWeight: 600, color: "#64748b" }}>OS {osIdx + 1}</span>
                                    <button style={{ ...S.actBtn, color: "#ef4444", padding: 3 }} onClick={() => removeOS(prop.id, mil.id, os.id)}>{I.x}</button>
                                  </div>
                                  <div style={S.row}>
                                    <FG label="Nº da Ordem de Serviço" flex>
                                      <input style={S.inp} value={os.numero || ""} onChange={e => updateOS(prop.id, mil.id, os.id, "numero", e.target.value)} placeholder="Nº da OS" />
                                    </FG>
                                    <FG label="Missão / Curso" flex>
                                      <input style={S.inp} value={os.missaoCurso || ""} onChange={e => updateOS(prop.id, mil.id, os.id, "missaoCurso", e.target.value)} placeholder="Ex: CADOM, OOM-III, Op Ágata..." />
                                    </FG>
                                  </div>
                                  <div style={{ ...S.row, marginTop: 10 }}>
                                    <FG label="Localidade" flex>
                                      <input style={S.inp} value={os.localidade || ""} onChange={e => updateOS(prop.id, mil.id, os.id, "localidade", e.target.value)} placeholder="Ex: Brasília-DF" />
                                    </FG>
                                    <FG label="Início" flex>
                                      <input type="date" style={S.inp} value={os.dataInicio || ""} onChange={e => updateOS(prop.id, mil.id, os.id, "dataInicio", e.target.value)} />
                                    </FG>
                                    <FG label="Término" flex>
                                      <input type="date" style={S.inp} value={os.dataFim || ""} onChange={e => updateOS(prop.id, mil.id, os.id, "dataFim", e.target.value)} />
                                    </FG>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )})}
            </div>
          )}
        </>
      );
    }

    /* ═══════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════ */
    function App() {
      const [data, setData] = useState({ militares: [], propostas: [], oficios: [] });
      const [loaded, setLoaded] = useState(false);
      const [tab, setTab] = useState("dashboard");
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      // Listener de Autenticação do Firebase
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // Só carrega os dados do banco se o usuário estiver logado
      useEffect(() => {
        if (!user) return; 
        (async () => {
          try {
            const r = await window.storage.get(STORAGE_KEY);
            if (r?.value) {
              setData(JSON.parse(r.value));
            }
          } catch (e) { console.log("Erro ao inicializar dados:", e); }
          setLoaded(true);
        })();
      }, [user]);

      useEffect(() => {
        if (!loaded || !user) return;
        (async () => {
          try { 
            await window.storage.set(STORAGE_KEY, JSON.stringify(data)); 
          } catch (e) { console.error(e); }
        })();
      }, [data, loaded, user]);

      const setPropostas = fn => setData(d => ({ ...d, propostas: typeof fn === "function" ? fn(d.propostas) : fn }));
      const setOficios = fn => setData(d => ({ ...d, oficios: typeof fn === "function" ? fn(d.oficios || []) : fn }));

      // Telas de Carregamento e Bloqueio
      if (authLoading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#0c111b" }}><div style={{ width: 36, height: 36, border: "3px solid #1e293b", borderTop: "3px solid #3b82f6", borderRadius: "50%", animation: "spin .8s linear infinite" }} /></div>;
      
      if (!user) return <LoginPage />;
      
      if (!loaded) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#0c111b" }}><div style={{ width: 36, height: 36, border: "3px solid #1e293b", borderTop: "3px solid #3b82f6", borderRadius: "50%", animation: "spin .8s linear infinite" }} /></div>;

      return (
        <div style={S.root}>
          <style>{`
            @keyframes spin { to { transform: rotate(360deg) } }
            input:focus, select:focus, textarea:focus { border-color: #3b82f6 !important; }
            button:hover { opacity: 0.85; }
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: #0c111b; }
            ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
          `}</style>

          <header style={S.header}>
            <div style={S.hInner}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={S.logo}>{I.shield}</div>
                <div>
                  <h1 style={{ fontSize: 17, fontWeight: 700, color: "#f1f5f9", margin: 0, letterSpacing: "-.02em" }}>Controle de Comissionamento</h1>
                  <p style={{ fontSize: 11, color: "#64748b", margin: 0, fontWeight: 500, letterSpacing: ".04em", textTransform: "uppercase" }}>1º Grupo de Defesa Antiaérea</p>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
                <div style={S.tabs}>
                  {[
                    { key: "dashboard", label: "Dashboard", icon: I.chart },
                    { key: "consulta", label: "Consulta", icon: I.search },
                    { key: "propostas", label: "Propostas", icon: I.doc },
                    { key: "oficios", label: "Ofícios", icon: I.mail },
                    { key: "pag", label: "PAG", icon: I.file },
                    { key: "portaria", label: "Portaria", icon: I.stamp },
                    { key: "numerario", label: "Numerário", icon: I.coin },
                    { key: "os", label: "Ordens Serviço", icon: I.clipboard },
                  ].map(t => (
                    <button key={t.key} style={{ ...S.tab, ...(tab === t.key ? S.tabActive : {}) }} onClick={() => setTab(t.key)}>
                      {t.icon}<span>{t.label}</span>
                    </button>
                  ))}
                </div>
                
                {/* BOTÃO DE LOGOUT */}
                <button 
                  onClick={() => auth.signOut()} 
                  style={{ ...S.btnSec, padding: "8px 14px", fontSize: 12, display: 'flex', alignItems: 'center', gap: 6, borderColor: 'rgba(239,68,68,0.5)', color: '#ef4444' }}
                >
                  {I.logout} Sair
                </button>
              </div>
            </div>
          </header>

          <main style={S.main}>
            {tab === "dashboard" && <DashboardTab propostas={data.propostas} />}
            {tab === "consulta" && <ConsultaTab propostas={data.propostas} oficios={data.oficios || []} />}
            {tab === "propostas" && <PropostasTab propostas={data.propostas} setPropostas={setPropostas} />}
            {tab === "oficios" && <OficiosTab oficios={data.oficios || []} setOficios={setOficios} propostas={data.propostas} />}
            {tab === "pag" && <PagTab propostas={data.propostas} setPropostas={setPropostas} />}
            {tab === "portaria" && <PortariaTab propostas={data.propostas} setPropostas={setPropostas} />}
            {tab === "numerario" && <NumerarioTab propostas={data.propostas} setPropostas={setPropostas} />}
            {tab === "os" && <OSTab propostas={data.propostas} setPropostas={setPropostas} oficios={data.oficios || []} />}
          </main>
        </div>
      );
    }

    /* ─── Styles ─── */
    const S = {
      root: { fontFamily: "'DM Sans','Segoe UI',system-ui,sans-serif", background: "#0c111b", minHeight: "100vh", color: "#e2e8f0" },
      header: { background: "linear-gradient(135deg,#0f172a,#1a2744)", borderBottom: "1px solid rgba(56,189,248,0.12)", padding: "0 24px", position: "sticky", top: 0, zIndex: 50, backdropFilter: "blur(12px)" },
      hInner: { maxWidth: 1300, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 0", flexWrap: "wrap", gap: 12 },
      logo: { width: 44, height: 44, borderRadius: 10, background: "linear-gradient(135deg,#1d4ed8,#2563eb)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", boxShadow: "0 0 20px rgba(37,99,235,0.35)" },
      tabs: { display: "flex", gap: 4, background: "#0c111b", borderRadius: 12, padding: 4, flexWrap: "wrap" },
      tab: { display: "flex", alignItems: "center", gap: 7, padding: "8px 16px", borderRadius: 10, background: "transparent", border: "none", color: "#64748b", fontSize: 13, fontWeight: 500, cursor: "pointer", transition: "all .2s", whiteSpace: "nowrap" },
      tabActive: { background: "#1e293b", color: "#f1f5f9", fontWeight: 600 },
      main: { maxWidth: 1300, margin: "0 auto", padding: "24px 24px 48px" },

      statsGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(200px,1fr))", gap: 14, marginBottom: 22 },
      statCard: { background: "linear-gradient(145deg,#141c2e,#111827)", border: "1px solid #1e293b", borderRadius: 14, padding: "18px 20px", display: "flex", alignItems: "center", gap: 14 },
      statIcon: { width: 42, height: 42, borderRadius: 11, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 },
      statVal: { fontSize: 24, fontWeight: 800, color: "#f8fafc", lineHeight: 1, letterSpacing: "-.03em" },
      statLbl: { fontSize: 11, color: "#64748b", marginTop: 3, fontWeight: 500 },

      card: { background: "linear-gradient(145deg,#141c2e,#111827)", border: "1px solid #1e293b", borderRadius: 16, overflow: "hidden" },
      toolbar: { padding: "16px 20px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", borderBottom: "1px solid #1e293b" },
      searchWrap: { position: "relative", flex: "1 1 260px", minWidth: 180 },
      searchIco: { position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#475569", display: "flex" },
      searchIn: { width: "100%", boxSizing: "border-box", padding: "9px 14px 9px 36px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, color: "#e2e8f0", fontSize: 13, outline: "none" },
      filterGrp: { display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" },
      sel: { padding: "9px 12px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, color: "#e2e8f0", fontSize: 13, outline: "none", cursor: "pointer" },
      table: { width: "100%", borderCollapse: "collapse" },
      th: { padding: "11px 16px", fontSize: 10, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: ".06em", textAlign: "left", borderBottom: "1px solid #1e293b", whiteSpace: "nowrap" },
      tr: { borderBottom: "1px solid rgba(30,41,59,0.5)", cursor: "default", transition: "background .15s" },
      td: { padding: "12px 16px", fontSize: 13, verticalAlign: "middle" },
      avatar: { width: 34, height: 34, borderRadius: 8, background: "linear-gradient(135deg,#1e3a5f,#1e40af)", color: "#93c5fd", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 },
      mono: { fontFamily: "'JetBrains Mono','Fira Code',monospace", fontSize: 12, color: "#94a3b8", background: "rgba(30,41,59,0.6)", padding: "3px 7px", borderRadius: 5 },
      dTag: { display: "inline-block", padding: "3px 9px", borderRadius: 5, fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" },
      badge: { display: "inline-block", padding: "3px 9px", borderRadius: 5, fontSize: 12, fontWeight: 600 },
      tfoot: { padding: "11px 20px", fontSize: 12, color: "#475569", borderTop: "1px solid #1e293b" },
      empty: { padding: "56px 24px", textAlign: "center" },
      actBtn: { background: "transparent", border: "1px solid transparent", borderRadius: 8, padding: 6, cursor: "pointer", color: "#64748b", display: "flex", alignItems: "center", transition: "all .15s" },

      btnPri: { display: "inline-flex", alignItems: "center", gap: 7, padding: "9px 18px", background: "linear-gradient(135deg,#1d4ed8,#2563eb)", border: "none", borderRadius: 10, color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", boxShadow: "0 2px 12px rgba(37,99,235,0.3)", whiteSpace: "nowrap" },
      btnSec: { padding: "9px 18px", background: "transparent", border: "1px solid #334155", borderRadius: 10, color: "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer" },
      btnGhost: { background: "transparent", border: "none", color: "#3b82f6", fontSize: 13, fontWeight: 600, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5, padding: 0 },

      overlay: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 },
      modal: { background: "#141c2e", border: "1px solid #1e293b", borderRadius: 18, width: "100%", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 80px rgba(0,0,0,0.5)" },
      modalHead: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 28px 14px", borderBottom: "1px solid #1e293b" },
      modalTitle: { fontSize: 16, fontWeight: 700, color: "#f1f5f9", margin: 0 },
      iconBtn: { background: "transparent", border: "none", color: "#64748b", cursor: "pointer", padding: 4, display: "flex" },

      row: { display: "flex", gap: 12 },
      lbl: { fontSize: 11, fontWeight: 600, color: "#64748b", textTransform: "uppercase", letterSpacing: ".04em" },
      inp: { width: "100%", boxSizing: "border-box", padding: "9px 12px", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, color: "#e2e8f0", fontSize: 13, outline: "none", fontFamily: "inherit", transition: "border-color .2s" },
      fActions: { display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 22 },
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
