<body>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;
    // MOTOR DO LEITOR DE PDF
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // --- CONFIGURAÇÃO DO FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyC4NecwUMfKliMKi8W_69huhBm-Oitdh_Q",
      authDomain: "comissionamento-1gdaae.firebaseapp.com",
      projectId: "comissionamento-1gdaae",
      storageBucket: "comissionamento-1gdaae.firebasestorage.app",
      messagingSenderId: "350146761777",
      appId: "1:350146761777:web:ae7ef7d32ce77778fff110"
    };

    if (!window.firebase.apps.length) {
      window.firebase.initializeApp(firebaseConfig);
    }
    const db = window.firebase.firestore();
    const auth = window.firebase.auth();

    // MOTOR DE SALVAMENTO NUVEM
    window.storage = {
      get: async (key) => {
        try {
          const doc = await db.collection("appData").doc(key).get();
          if (doc.exists) {
            return { value: JSON.stringify(doc.data()), exists: true };
          }
          // Documento confirmado como inexistente (novo usuário)
          return { value: null, exists: false };
        } catch (e) {
          console.error("Erro ao buscar dados da Nuvem:", e);
          // Retorna null SOMENTE em erro — diferente de documento inexistente
          return null;
        }
      },
      set: async (key, val) => {
        try {
          await db.collection("appData").doc(key).set(JSON.parse(val));
        } catch (e) {
          console.error("Erro ao salvar dados na Nuvem:", e);
        }
      }
    };

    const STORAGE_KEY = "comissionamento-1gdaae-v2";

    const POSTOS = [
      "Cel","TC","Maj","Cap","1º Ten","2º Ten","Asp",
      "SubOf","1º Sgt","2º Sgt","3º Sgt","Cb","S1","S2"
    ];

    // TRADUTOR INTELIGENTE DE POSTOS/GRADUAÇÕES
    const normalizePosto = (p) => {
      if (!p) return "S2";
      // Normaliza: remove acentos, espaços extras e especialidade (ex: "3S SGS" → "3S")
      const raw = String(p).trim()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove acentos
        .toUpperCase()
        .replace(/[ºª°]/g, "")  // remove ordinals
        .trim();
      // Tenta match completo primeiro, depois só a primeira palavra
      const map = {
        // Coronel / TC
        "CEL": "Cel", "TC": "TC", "TEN CEL": "TC", "TENENTE CORONEL": "TC",
        // Major / Capitão
        "MAJ": "Maj", "MAJOR": "Maj",
        "CAP": "Cap", "CAPITAO": "Cap",
        // Tenentes
        "1 TEN": "1º Ten", "1TEN": "1º Ten", "1T": "1º Ten", "PRIMEIRO TENENTE": "1º Ten",
        "2 TEN": "2º Ten", "2TEN": "2º Ten", "2T": "2º Ten", "SEGUNDO TENENTE": "2º Ten",
        "ASP": "Asp",
        // Suboficial — todas as variações possíveis que o Claude pode gerar
        "SO": "SubOf", "S/O": "SubOf", "SUB OF": "SubOf",
        "SUBOF": "SubOf", "SUBOFICIAL": "SubOf", "SUB-OFICIAL": "SubOf",
        "ST": "SubOf",  // alguns sistemas usam ST para subtenente/suboficial
        // Sargentos
        "1 SGT": "1º Sgt", "1SGT": "1º Sgt", "1S": "1º Sgt", "PRIMEIRO SARGENTO": "1º Sgt",
        "2 SGT": "2º Sgt", "2SGT": "2º Sgt", "2S": "2º Sgt", "SEGUNDO SARGENTO": "2º Sgt",
        "3 SGT": "3º Sgt", "3SGT": "3º Sgt", "3S": "3º Sgt", "TERCEIRO SARGENTO": "3º Sgt",
        // Cabo / Soldado
        "CB": "Cb", "CABO": "Cb",
        "S1": "S1", "SD": "S1", "SG": "S1", "SOL 1": "S1",
        "S2": "S2", "REC": "S2", "SOL 2": "S2",
      };
      // 1) Tenta o raw completo (ex: "SUBOFICIAL")
      if (map[raw]) return map[raw];
      // 2) Tenta só a primeira palavra (ex: "SO SGS" → "SO")
      const first = raw.split(/\s+/)[0];
      if (map[first]) return map[first];
      // 3) Fallback: retorna o original formatado
      return String(p).trim();
    };

    const STATUS_CFG = {
      ativo: { label: "Ativo", color: "#22c55e", bg: "rgba(34,197,94,0.12)" },
      finalizado: { label: "Finalizado", color: "#3b82f6", bg: "rgba(59,130,246,0.12)" },
      cancelado: { label: "Cancelado", color: "#ef4444", bg: "rgba(239,68,68,0.12)" },
    };

    const MODULO_TIPOS = ["Curso", "Missão", "Localidade"];

    const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

    function diffDays(a, b) {
      if (!a || !b) return 0;
      return Math.max(0, Math.ceil((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 864e5) + 1);
    }

    function calcDiasOS(oss, statusFilter = null) {
      if (!oss || !oss.length) return 0;
      return oss
        .filter(os => statusFilter ? os.status === statusFilter : true)
        .reduce((acc, os) => acc + diffDays(os.dataInicio, os.dataFim), 0);
    }

    function fmtDate(d) {
      if (!d) return "—";
      const [y, m, dd] = d.split("-");
      return `${dd}/${m}/${y}`;
    }

    function fmtMoney(v) {
      const n = parseFloat(v) || 0;
      return n.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    // ─── TABELA FINANCEIRA 2026 (derivada da planilha CALCULADORA AJUDA DE CUSTO 2026) ───
    const TABELA_FINANCEIRA_2026 = {
      "Cel":    { soldo: 12285.00, dispPct: 0.26, adcMilPct: 0.25 },
      "TC":     { soldo: 12285.00, dispPct: 0.26, adcMilPct: 0.25 },
      "Maj":    { soldo: 12285.00, dispPct: 0.26, adcMilPct: 0.25 },
      "Cap":    { soldo:  9976.00, dispPct: 0.12, adcMilPct: 0.22 },
      "1º Ten": { soldo:  9004.00, dispPct: 0.06, adcMilPct: 0.19 },
      "2º Ten": { soldo:  9004.00, dispPct: 0.06, adcMilPct: 0.19 },
      "Asp":    { soldo:  9004.00, dispPct: 0.06, adcMilPct: 0.19 },
      "SubOf":  { soldo:  6737.00, dispPct: 0.32, adcMilPct: 0.16 },
      "1º Sgt": { soldo:  5988.00, dispPct: 0.20, adcMilPct: 0.16 },
      "2º Sgt": { soldo:  5209.00, dispPct: 0.12, adcMilPct: 0.16 },
      "3º Sgt": { soldo:  4177.00, dispPct: 0.06, adcMilPct: 0.16 },
      "Cb":     { soldo:  2869.00, dispPct: 0.06, adcMilPct: 0.13 },
      "S1":     { soldo:  2103.00, dispPct: 0.05, adcMilPct: 0.13 },
      "S2":     { soldo:  1927.00, dispPct: 0.05, adcMilPct: 0.13 },
    };

    // Percentual do SOLDO por tipo de habilitação
    const HABILITACAO_PCT = {
      "ALTOS ESTUDOS CAT I":  0.73,
      "ALTOS ESTUDOS CAT II": 0.68,
      "APERFEIÇOAMENTO":      0.45,
      "ESPECIALIZAÇÃO":       0.27,
      "FORMAÇÃO":             0.12,
    };
    const HABILITACAO_OPTIONS = ["ALTOS ESTUDOS CAT I","ALTOS ESTUDOS CAT II","APERFEIÇOAMENTO","ESPECIALIZAÇÃO","FORMAÇÃO"];

    // Diária base para cálculo de dias mínimos (economicidade)
    const DIARIA_ECON = {
      "Cel":335,"TC":335,"Maj":335,"Cap":335,"1º Ten":335,"2º Ten":335,"Asp":335,
      "SubOf":335,"1º Sgt":335,"2º Sgt":335,"3º Sgt":335,
      "Cb":280,"S1":280,"S2":280,
    };

    function calcBaseAjuda(postoGrad, habilitacao) {
      const tab = TABELA_FINANCEIRA_2026[postoGrad];
      if (!tab) return 0;
      const { soldo, dispPct, adcMilPct } = tab;
      const habPct = HABILITACAO_PCT[habilitacao] || 0;
      return parseFloat((soldo + soldo*dispPct + soldo*adcMilPct + soldo*habPct).toFixed(2));
    }

    function calcAjudaCustoCompleto(postoGrad, habilitacao, temDependente, diasMinimos) {
      const ajuda = calcBaseAjuda(postoGrad, habilitacao || "");
      if (!ajuda) return { ajuda: 0, ida: 0, volta: 0 };
      let idaCoeff, voltaCoeff;
      if (!temDependente) { idaCoeff = 0.5; voltaCoeff = 0.5; }
      else if (diasMinimos >= 90) { idaCoeff = 2; voltaCoeff = 1; }
      else { idaCoeff = 1; voltaCoeff = 1; }
      return { ajuda, ida: parseFloat((ajuda*idaCoeff).toFixed(2)), volta: parseFloat((ajuda*voltaCoeff).toFixed(2)) };
    }

    function calcDiasMinimos(postoGrad, habilitacao, temDependente) {
      const ajuda = calcBaseAjuda(postoGrad, habilitacao || "");
      if (!ajuda) return 0;
      const diaria = DIARIA_ECON[postoGrad] || 335;
      return Math.round((ajuda * (temDependente ? 2 : 1)) / diaria);
    }

    // Detecta habilitação a partir do valor de fechamento extraído do PDF
    function detectHabilitacaoFromAjuda(postoGrad, temDependente, valorAbertura, valorFechamento) {
      const vFe = parseFloat(valorFechamento) || 0;
      const vAb = parseFloat(valorAbertura) || 0;
      if (!vFe && !vAb) return "";
      // VOLTA = AJUDA × 1 (com dep.) ou × 0.5 (sem dep.)
      const ajuda = temDependente ? vFe : (vFe > 0 ? vFe * 2 : vAb * 2);
      if (!ajuda) return "";
      const tab = TABELA_FINANCEIRA_2026[postoGrad];
      if (!tab) return "";
      const { soldo, dispPct, adcMilPct } = tab;
      const base = soldo + soldo * dispPct + soldo * adcMilPct;
      const habPct = (ajuda - base) / soldo;
      let melhor = "", menorDiff = 0.05; // tolerância de 5%
      for (const [hab, pct] of Object.entries(HABILITACAO_PCT)) {
        const diff = Math.abs(pct - habPct);
        if (diff < menorDiff) { menorDiff = diff; melhor = hab; }
      }
      return melhor;
    }

    // mantida por compatibilidade (usada em partes antigas)
    function calcAjudas(temDependente, totalDias) {
      if (temDependente) return totalDias <= 89 ? 2 : 3;
      return totalDias <= 89 ? 1 : 1.5;
    }

    // ─── TABELA DE DIÁRIAS (Anexo III - Decreto nº 4.307, de 18/07/2002) ───
    // Colunas: [Brasília/Manaus/RJ/SP, Outras capitais de Estados, Demais deslocamentos]
    const TABELA_DIARIAS = {
      "A": [800, 700, 650],  // Cmt Marinha/Exército/Aeron. e Natureza Especial
      "B": [600, 515, 455],  // Oficiais-Generais
      "C": [510, 450, 395],  // Oficiais-Superiores
      "D": [425, 380, 335],  // Of. Intermediários, Subalternos, Guardas-Marinha, Asp
      "E": [425, 380, 335],  // Suboficiais, Subtenentes, Sargentos, Aspirantes e Cadetes
      "F": [355, 315, 280],  // Alunos CFA Aeronáutica / Colégio Naval / Escolas prep.
      "G": [355, 315, 280],  // Demais Praças e Praças Especiais
    };

    // Normaliza string: minúsculas, sem acento
    function norm(s) {
      return String(s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    }

    // SOMENTE nomes de cidades capitais — siglas de UF foram REMOVIDAS intencionalmente
    // para evitar falsos positivos: "Cachoeirinha/RS" contém "rs" mas NÃO é capital.
    const CAPITAIS_GRUPO1_NOMES = [
      "brasilia", "distrito federal",
      "manaus",
      "rio de janeiro",
      "sao paulo",
    ];

    const OUTRAS_CAPITAIS_NOMES = [
      "porto alegre",
      "florianopolis",
      "curitiba",
      "campo grande",
      "cuiaba",
      "porto velho",
      "rio branco",
      "macapa",
      "boa vista",
      "belem",
      "sao luis",
      "teresina",
      "fortaleza",
      "natal",
      "joao pessoa",
      "recife",
      "maceio",
      "aracaju",
      "salvador",
      "belo horizonte",
      "vitoria",
      "goiania",
      "palmas",
    ];

    // Retorna o grupo da tabela conforme o posto/graduação
    function getGrupoDiaria(postoGrad) {
      const p = String(postoGrad || "").trim();
      if (["Cel", "TC", "Maj"].includes(p)) return "C";
      if (["Cap", "1º Ten", "2º Ten", "Asp"].includes(p)) return "D";
      if (["ST", "1º Sgt", "2º Sgt", "3º Sgt"].includes(p)) return "E";
      if (["Cb", "S1", "S2"].includes(p)) return "G";
      return "G";
    }

    // Retorna o índice da coluna (0=BSB/MAO/RJ/SP, 1=outras capitais, 2=demais)
    // Compara SOMENTE pelo nome da cidade (sem siglas de UF),
    // evitando falsos positivos como "Cachoeirinha/RS" bater em Porto Alegre.
    function getColunaDiaria(localidade) {
      if (!localidade) return 2;
      const loc = norm(localidade);
      if (CAPITAIS_GRUPO1_NOMES.some(c => loc.includes(c))) return 0;
      if (OUTRAS_CAPITAIS_NOMES.some(c => loc.includes(c))) return 1;
      return 2;
    }

    // Retorna o valor da diária para um dado posto e localidade
    function getValorDiaria(postoGrad, localidade) {
      const grupo = getGrupoDiaria(postoGrad);
      const col = getColunaDiaria(localidade);
      return TABELA_DIARIAS[grupo][col];
    }

    // Calcula o total de diárias para um militar com seus módulos
    // Regra: para cada módulo, valor_diaria(posto, localidade) * (dias - 0.5)
    // Se módulos tiverem localidades diferentes, soma cada um separado
    function calcTotalDiarias(postoGrad, modulos) {
      if (!modulos || modulos.length === 0) return 0;
      let total = 0;
      for (const mod of modulos) {
        const dias = diffDays(mod.dataInicio, mod.dataFim);
        if (dias <= 0) continue;
        const valorDiaria = getValorDiaria(postoGrad, mod.localidade);
        total += valorDiaria * (dias - 0.5);
      }
      return total;
    }

    // Retorna detalhamento das diárias por módulo (para exibição)
    function detalheDiarias(postoGrad, modulos) {
      if (!modulos || modulos.length === 0) return [];
      return modulos
        .filter(mod => diffDays(mod.dataInicio, mod.dataFim) > 0)
        .map(mod => {
          const dias = diffDays(mod.dataInicio, mod.dataFim);
          const valorDiaria = getValorDiaria(postoGrad, mod.localidade);
          const col = getColunaDiaria(mod.localidade);
          const colLabel = col === 0 ? "BSB/MAO/RJ/SP" : col === 1 ? "Capital" : "Demais";
          return {
            descricao: mod.descricao || mod.tipo,
            localidade: mod.localidade || "—",
            dias,
            valorDiaria,
            colLabel,
            subtotal: valorDiaria * (dias - 0.5),
            multiplicador: dias - 0.5,
          };
        });
    }

    // ─── Pipeline de etapas do comissionamento ───
    const ETAPAS_CFG = {
      enviar_oficio:          { label:"Enviar Ofício",             prox:"Criar ofício de solicitação (SIGAD)",       cor:"#64748b", n:1  },
      aguardando_autorizacao: { label:"Aguardando Autorização",    prox:"Aguardar autorização do COMPREP",           cor:"#f59e0b", n:2  },
      abrir_pag:              { label:"Abrir PAG",                 prox:"Registrar PAG e nº subprocesso",            cor:"#fb923c", n:3  },
      registrar_portaria:     { label:"Registrar Portaria",        prox:"Confeccionar portaria de abertura",         cor:"#a78bfa", n:4  },
      publicar_boletim:       { label:"Publicar em Boletim",       prox:"Publicar portaria no boletim interno",      cor:"#818cf8", n:5  },
      numerario_abertura:     { label:"Numerário de Abertura",     prox:"Conceder numerário — ajuda de custo (ida)", cor:"#3b82f6", n:6  },
      iniciar_os:             { label:"Iniciar OS",                prox:"Emitir primeira Ordem de Serviço",          cor:"#22d3ee", n:7  },
      os_andamento:           { label:"OS em Andamento",           prox:"Acompanhar execução das OS",                cor:"#22c55e", n:8  },
      encerramento:           { label:"Encerrar Comissionamento",  prox:"Confeccionar portaria apostila",            cor:"#f97316", n:9  },
      apostila_boletim:       { label:"Publicar Apostila",         prox:"Publicar portaria apostila no boletim",     cor:"#a78bfa", n:10 },
      numerario_fechamento:   { label:"Numerário de Fechamento",   prox:"Conceder numerário — ajuda de custo (volta)",cor:"#3b82f6", n:11 },
      concluido:              { label:"Concluído",                 prox:"Comissionamento encerrado",                 cor:"#10b981", n:12 },
    };

    function getEtapaMilitar(mil, oficio, isFechado) {
      if (mil.itemFinanceiro)                              return "concluido";
      if (mil.boletimApostila)                             return "numerario_fechamento";
      if (mil.portariaApostila)                            return "apostila_boletim";
      if (isFechado)                                       return "encerramento";
      if ((mil.ordensServico || []).length > 0)            return "os_andamento";
      if (mil.numBoletim || mil.numStatus === "concedido") return "iniciar_os";
      if (mil.boletim)                                     return "numerario_abertura";
      if (mil.portaria)                                    return "publicar_boletim";
      if (mil.numeroPag)                                   return "registrar_portaria";
      if (oficio?.status === "autorizado")                 return "abrir_pag";
      if (oficio)                                          return "aguardando_autorizacao";
      return "enviar_oficio";
    }

    // ─── Retorna o posto/grad do militar em uma data específica (considera promoções) ───
    function getMilPostoNaData(mil, dataStr) {
      const promocoes = mil.promocoes;
      if (!promocoes || promocoes.length === 0) return mil.postoGrad;
      const sorted = [...promocoes]
        .filter(p => p.dataPromocao && p.postoNovo)
        .sort((a, b) => a.dataPromocao.localeCompare(b.dataPromocao));
      const before = sorted.filter(p => p.dataPromocao <= (dataStr || ""));
      if (before.length === 0) return mil.postoGradInicial || mil.postoGrad;
      return before[before.length - 1].postoNovo;
    }

    // ─── Calcula o subtotal de diárias de uma OS (considera promoção + pernoites de trânsito) ───
    function calcSubtotalOS(mil, os) {
      const d = diffDays(os.dataInicio, os.dataFim);
      if (d <= 0) return 0;
      const posto = getMilPostoNaData(mil, os.dataInicio);
      let total = getValorDiaria(posto, os.localidade) * (d - 0.5);
      if (os.pernoitesTransito && os.pernoitesTransito.length > 0) {
        total += os.pernoitesTransito.reduce((acc, p) => {
          if (!p.localidade) return acc;
          const dp = diffDays(p.dataInicio, p.dataFim);
          const diasPernoite = dp > 0 ? dp - 0.5 : 1; // período com chegada descontada; legado sem período = 1 diária
          return acc + getValorDiaria(posto, p.localidade) * diasPernoite;
        }, 0);
      }
      return total;
    }

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight;
        const onResize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
        window.addEventListener('resize', onResize);

        const N = 90;
        const pts = Array.from({ length: N }, () => ({
          x: Math.random() * W, y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r: Math.random() * 1.8 + 0.8,
        }));

        let animId;
        const MAX_DIST = 140;
        const draw = () => {
          ctx.clearRect(0, 0, W, H);
          for (const p of pts) {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > W) p.vx *= -1;
            if (p.y < 0 || p.y > H) p.vy *= -1;
          }
          for (let i = 0; i < N; i++) {
            for (let j = i + 1; j < N; j++) {
              const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
              const d = Math.sqrt(dx * dx + dy * dy);
              if (d < MAX_DIST) {
                const a = (1 - d / MAX_DIST) * 0.4;
                ctx.strokeStyle = `rgba(56,139,253,${a})`;
                ctx.lineWidth = 0.7;
                ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
              }
            }
          }
          for (const p of pts) {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(96,165,250,0.75)'; ctx.fill();
          }
          animId = requestAnimationFrame(draw);
        };
        draw();
        return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', onResize); };

    /* ── Radial Economicidade Chart ── */
    /* ── Rank abbreviation helper ── */
    function rankAbbr(postoGrad) {
      const m = { "Cel":"CEL","TC":"TC","Maj":"MAJ","Cap":"CAP","1º Ten":"1T","2º Ten":"2T",
                  "SubOf":"SO","1º Sgt":"1S","2º Sgt":"2S","3º Sgt":"3S","Cb":"CB","S1":"S1","S2":"S2" };
      return m[postoGrad] || (postoGrad||"?").slice(0,3).toUpperCase();

    /* ── Insígnia FAB — badge com sigla ── */

        "TC":      { abbr:"TC",       bg:"#1e40af", color:"#fbbf24" },
        "Maj":     { abbr:"MAJ",      bg:"#1d4ed8", color:"#fbbf24" },
        "Cap":     { abbr:"CAP",      bg:"#2563eb", color:"#ffffff" },
        "1º Ten":  { abbr:"1T",       bg:"#3b82f6", color:"#ffffff" },
        "2º Ten":  { abbr:"2T",       bg:"#60a5fa", color:"#1e3a8a" },
        "Asp":     { abbr:"ASP",      bg:"#bfdbfe", color:"#1e3a8a" },
        "SubOf":   { abbr:"SO",       bg:"#4c1d95", color:"#ddd6fe" },
        "1º Sgt":  { abbr:"1S",       bg:"#1e293b", color:"#e2e8f0" },
        "2º Sgt":  { abbr:"2S",       bg:"#1e293b", color:"#cbd5e1" },
        "3º Sgt":  { abbr:"3S",       bg:"#334155", color:"#94a3b8" },
        "Cb":      { abbr:"CB",       bg:"#292524", color:"#a8a29e" },
        "S1":      { abbr:"S1",       bg:"#1c1917", color:"#78716c" },
        "S2":      { abbr:"S2",       bg:"#0c0a09", color:"#57534e" },
        "TfMor":   { abbr:"TF MOR",   bg:"#18181b", color:"#a1a1aa" },
        "Tf1":     { abbr:"TF1",      bg:"#18181b", color:"#71717a" },
        "Tf2":     { abbr:"TF2",      bg:"#18181b", color:"#52525b" },
      };
      const cfg = ABBR_MAP[postoGrad] || { abbr:(postoGrad||"?").slice(0,4).toUpperCase(), bg:"#374151", color:"#d1d5db" };
      const abbr = cfg.abbr;
      const fontSize = abbr.length >= 7 ? Math.max(6,  sz * 0.18)

      return (

          flexShrink: 0, fontSize: fontSize,
          fontWeight: 800, fontFamily: "Arial,sans-serif",

          {abbr}
