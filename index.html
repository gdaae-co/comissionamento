    /* ── Economicidade Progress Panel (substitui EconRadialChart) ── */
    function EconProgressPanel({ milData }) {
      const [filterPropId, setFilterPropId] = useState("");
      const PALETTE = ["#3b82f6","#f59e0b","#8b5cf6","#06b6d4","#f43f5e","#a78bfa","#34d399","#fb923c","#e879f9"];
      const withData = milData.filter(m => m.limiarEconomicidade > 0);
      const withoutData = milData.filter(m => m.limiarEconomicidade <= 0);
      const propList = [...new Map(milData.map(m => [m._propId, { id: m._propId, titulo: m._propTitulo }])).values()];
      const filtered = filterPropId ? withData.filter(m => m._propId === filterPropId) : withData;
      const atingiram = withData.filter(m => m.atingiuEconomicidade).length;

      return (
        <div>
          <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:14, flexWrap:"wrap" }}>
            <div style={{ display:"flex", gap:8, flex:1, flexWrap:"wrap" }}>
              <span style={{ background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.2)", borderRadius:6, padding:"4px 12px", fontSize:11, fontWeight:700, color:"#22c55e" }}>✔ {atingiram} atingiram</span>
              <span style={{ background:"rgba(245,158,11,0.1)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:6, padding:"4px 12px", fontSize:11, fontWeight:700, color:"#f59e0b" }}>⏳ {withData.length - atingiram} em progresso</span>
              {withoutData.length > 0 && <span style={{ background:"rgba(100,116,139,0.1)", border:"1px solid rgba(100,116,139,0.2)", borderRadius:6, padding:"4px 12px", fontSize:11, fontWeight:600, color:"#64748b" }}>⚠ {withoutData.length} sem dados</span>}
            </div>
            {propList.length > 1 && (
              <select style={{ ...S.inp, maxWidth:200, fontSize:11 }} value={filterPropId} onChange={e => setFilterPropId(e.target.value)}>
                <option value="">Todas as propostas</option>
                {propList.map(p => <option key={p.id} value={p.id}>{p.titulo || "Sem título"}</option>)}
              </select>
            )}
          </div>
          {filtered.length === 0 ? (
            <div style={{ textAlign:"center", padding:"24px 0", color:"#475569", fontSize:12 }}>Nenhum militar com dados financeiros cadastrados.</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8, maxHeight:340, overflowY:"auto", paddingRight:2 }}>
              {filtered.map((m, i) => {
                const pct = Math.min(100, (m.totalDiariasExec / m.limiarEconomicidade) * 100);
                const color = m.atingiuEconomicidade ? "#22c55e" : PALETTE[i % PALETTE.length];
                return (
                  <div key={m.id} style={{ background:"#0c111b", border:`1px solid ${m.atingiuEconomicidade ? "rgba(34,197,94,0.25)" : "#1e293b"}`, borderRadius:10, padding:"10px 14px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                      <span style={{ fontSize:12, fontWeight:700, color:"#e2e8f0" }}>{m.postoGrad} {m.nomeGuerra}</span>
                      <span style={{ fontSize:12, fontWeight:900, color }}>{m.atingiuEconomicidade ? "✔ " : ""}{Math.round(pct)}%</span>
                    </div>
                    <div style={{ height:5, background:"rgba(255,255,255,0.06)", borderRadius:3, overflow:"hidden", marginBottom:8 }}>
                      <div style={{ height:"100%", width:`${pct}%`, background:color, borderRadius:3, transition:"width 1.2s ease" }}/>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
                      {[
                        { l:"Meta",      v:m.limiarEconomicidade,                                 c:"#94a3b8" },
                        { l:"Executado", v:m.totalDiariasExec,                                    c:color },
                        { l:"Falta",     v:m.faltaEconomicidade, c:m.atingiuEconomicidade?"#22c55e":"#f59e0b" },
                      ].map((x, j) => (
                        <div key={j} style={{ background:"rgba(0,0,0,0.3)", borderRadius:6, padding:"5px 8px" }}>
                          <div style={{ fontSize:9, color:"#475569", textTransform:"uppercase", fontWeight:700, letterSpacing:".05em", marginBottom:2 }}>{x.l}</div>
                          <div style={{ fontSize:11, fontWeight:800, color:x.c }}>{fmtMoney(x.v)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function EconRadialChart({ milData }) {
      const [animPcts, setAnimPcts] = useState({});
      useEffect(() => {
        const steps = 60; let step = 0;
        const iv = setInterval(() => {
          step++;
          const ease = 1 - Math.pow(1 - step/steps, 3);
          const next = {};
          milData.forEach(m => {
            const target = m.limiarEconomicidade > 0 ? Math.min(100, (m.totalDiariasExec/m.limiarEconomicidade)*100) : 0;
            next[m.id] = target * ease;
          });
          setAnimPcts(next);
          if (step >= steps) clearInterval(iv);
        }, 1600/steps);
        return () => clearInterval(iv);
      }, [milData.map(m=>m.id).join(",")]);

      const PALETTE = ["#22c55e","#3b82f6","#f59e0b","#8b5cf6","#06b6d4","#f43f5e","#a78bfa","#34d399","#fb923c","#e879f9"];
      const cx=150, cy=150, maxR=132, ringStroke=13, ringGap=20;
      const withData = milData.filter(m=>m.limiarEconomicidade>0);
      const svgSize = 300;

      return (
        <div style={{display:"flex",alignItems:"flex-start",gap:24,flexWrap:"wrap"}}>
          {/* SVG Radial Chart */}
          <div style={{position:"relative",flexShrink:0}}>
            <svg width={svgSize} height={svgSize} viewBox={`0 0 ${svgSize} ${svgSize}`}>
              {/* Background dashed rings at 25/50/75/100% */}
              {[25,50,75,100].map(g=>(
                <circle key={g} cx={cx} cy={cy} r={maxR*(g/100)} fill="none"
                  stroke="rgba(255,255,255,0.05)" strokeWidth={g===100?1.5:1} strokeDasharray={g===100?"4 5":"2 6"}/>
              ))}
              {/* % labels */}
              {[25,50,75,100].map(g=>(
                <text key={g} x={cx+2} y={cy - maxR*(g/100) + 4} fill="rgba(255,255,255,0.18)"
                  fontSize="6.5" textAnchor="middle" style={{fontWeight:600}}>{g}%</text>
              ))}
              {/* Rings */}
              {withData.slice(0,7).map((m,i)=>{
                const r = maxR - i*ringGap;
                if(r < 16) return null;
                const circ = 2*Math.PI*r;
                const pct = animPcts[m.id] || 0;
                const dash = (pct/100)*circ;
                const color = m.atingiuEconomicidade ? "#22c55e" : PALETTE[i+1] || "#3b82f6";
                return (
                  <g key={m.id}>
                    <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={ringStroke}/>
                    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={ringStroke}
                      strokeLinecap="round" strokeDasharray={`${dash} ${circ-dash}`}
                      style={{transform:`rotate(-90deg)`,transformOrigin:`${cx}px ${cy}px`,
                        transition:`stroke-dasharray 1.6s cubic-bezier(0.34,1.2,0.64,1) ${i*.13}s`,
                        filter:`drop-shadow(0 0 5px ${color}99)`}}/>
                    {/* End dot glow */}
                    {pct>2&&(()=>{
                      const angle = (-90 + (pct/100)*360) * (Math.PI/180);
                      const dx = cx + r*Math.cos(angle), dy = cy + r*Math.sin(angle);
                      return <circle cx={dx} cy={dy} r={4} fill={color} style={{filter:`drop-shadow(0 0 4px ${color})`}}/>;
                    })()}
                  </g>
                );
              })}
              {/* Center label */}
              <text x={cx} y={cy-8} fill="#94a3b8" fontSize="9" textAnchor="middle" style={{fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>LIMIAR</text>
              <text x={cx} y={cy+6} fill="#f1f5f9" fontSize="15" textAnchor="middle" style={{fontWeight:900}}>
                {withData.length > 0 ? `${Math.round(withData.reduce((a,m)=>a+(m.atingiuEconomicidade?1:0),0)/withData.length*100)}%` : "—"}
              </text>
              <text x={cx} y={cy+18} fill="#475569" fontSize="7.5" textAnchor="middle" style={{fontWeight:600}}>ATINGIRAM</text>
            </svg>
          </div>

          {/* Legend */}
          <div style={{flex:1,minWidth:180,display:"flex",flexDirection:"column",gap:14}}>
            {withData.slice(0,7).map((m,i)=>{
              const pct = Math.min(100, m.limiarEconomicidade>0?(m.totalDiariasExec/m.limiarEconomicidade)*100:0);
              const color = m.atingiuEconomicidade ? "#22c55e" : PALETTE[i+1] || "#3b82f6";
              const saldo = m.totalDiariasExec - m.limiarEconomicidade;
              return (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0,boxShadow:`0 0 7px ${color}`}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11.5,fontWeight:700,color:"#e2e8f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {m.postoGrad} {m.nomeGuerra}
                    </div>
                    <div style={{fontSize:10,color:"#475569",marginTop:2}}>
                      {m.atingiuEconomicidade
                        ? <span style={{color:"#22c55e"}}>✔ +{fmtMoney(saldo)} de sobra</span>
                        : <span style={{color:"#f59e0b"}}>Faltam {fmtMoney(m.faltaEconomicidade)}</span>}
                    </div>
                  </div>
                  <div style={{fontSize:13,fontWeight:900,color,flexShrink:0}}>{Math.round(pct)}%</div>
                </div>
              );
            })}
            {withData.length === 0 && (
              <div style={{color:"#475569",fontSize:12,textAlign:"center",padding:"20px 0"}}>Nenhum dado de economicidade disponível.</div>
            )}
          </div>
        </div>
      );
    }

    /* ── Animated Donut ── */
    function AnimatedDonut({ pct, color, size, label, subtitle }) {
      const sz = size || 160;
      const [animPct, setAnimPct] = useState(0);
      useEffect(() => {
        setAnimPct(0);
        const steps = 60; let step = 0;
        const iv = setInterval(() => {
          step++;
          const ease = 1 - Math.pow(1 - step / steps, 3);
          setAnimPct(pct * ease);
          if (step >= steps) clearInterval(iv);
        }, 1500 / steps);
        return () => clearInterval(iv);
      }, [pct]);
      const r = 15.9155, circ = 2 * Math.PI * r;
      const offset = circ - (animPct / 100) * circ;
      return (
        <div style={{ position: "relative", width: sz, height: sz, flexShrink: 0 }}>
          <svg viewBox="0 0 36 36" width={sz} height={sz} style={{ transform: "rotate(-90deg)" }}>
            <circle cx="18" cy="18" r={r} fill="transparent" stroke="#1e293b" strokeWidth="3.2" />
            <circle cx="18" cy="18" r={r} fill="transparent" stroke={color} strokeWidth="3.2"
              strokeOpacity="0.12" />
            <circle cx="18" cy="18" r={r} fill="transparent" stroke={color} strokeWidth="3.2"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 0.04s linear", filter: `drop-shadow(0 0 5px ${color})` }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2 }}>
            <span style={{ fontSize: sz * 0.18, fontWeight: 900, color: "#f1f5f9", lineHeight: 1 }}>{Math.round(animPct)}%</span>
            {label    && <span style={{ fontSize: sz * 0.074, color: "#475569", fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase" }}>{label}</span>}
            {subtitle && <span style={{ fontSize: sz * 0.069, color: color, fontWeight: 600 }}>{subtitle}</span>}
          </div>
        </div>
      );
    }

    function PainelPendencias({ propostas, oficios }) {
      const items = React.useMemo(() => {
        return propostas.flatMap(p => {
          const oficio = (oficios || []).find(o => o.propostaId === p.id);
          return (p.militares || []).map(m => {
            const modDias = (m.modulos || []).reduce((s, mod) => s + diffDays(mod.dataInicio, mod.dataFim), 0);
            const cumpDias = calcDiasOS(m.ordensServico, "Executado");
            const valAbertura = parseFloat(m.valorAbertura) || 0;
            const valFechamento = parseFloat(m.valorFechamento) || 0;
            const totalDiariasExec = (m.ordensServico || [])
              .filter(os => os.status === "Executado")
              .reduce((acc, os) => acc + calcSubtotalOS(m, os), 0);
            const limiar = valAbertura + valFechamento;
            const atingiuEco = limiar > 0 && totalDiariasExec >= limiar;
            const isFechado = (modDias > 0 && cumpDias >= modDias) || atingiuEco;
            const etapa = getEtapaMilitar(m, oficio, isFechado);
            const cfg = ETAPAS_CFG[etapa];
            return {
              nome: `${m.postoGrad} ${m.nomeGuerra}`,
              propTitulo: p.titulo || "Sem título",
              etapa, cfg,
            };
          });
        }).filter(x => x.etapa !== "concluido");
      }, [propostas, oficios]);

      const grouped = React.useMemo(() => {
        const map = {};
        items.forEach(item => {
          if (!map[item.etapa]) map[item.etapa] = [];
          map[item.etapa].push(item);
        });
        return Object.entries(map).sort((a, b) => (ETAPAS_CFG[a[0]]?.n||0) - (ETAPAS_CFG[b[0]]?.n||0));
      }, [items]);

      if (items.length === 0) {
        return (
          <div style={{textAlign:"center",padding:"24px 0",color:"#475569",fontSize:13}}>
            <div style={{fontSize:24,marginBottom:8}}>✅</div>
            Nenhuma ação pendente — todos os comissionamentos estão concluídos.
          </div>
        );
      }

      return (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {grouped.map(([etapa, mils]) => {
            const cfg = ETAPAS_CFG[etapa];
            return (
              <div key={etapa} style={{border:`1px solid ${cfg.cor}44`,borderRadius:10,overflow:"hidden"}}>
                <div style={{background:`${cfg.cor}15`,padding:"9px 16px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:cfg.cor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:"#fff",flexShrink:0}}>{cfg.n}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:12,fontWeight:700,color:cfg.cor}}>{cfg.label}</span>
                    <span style={{fontSize:11,color:"#64748b",marginLeft:8}}>→ {cfg.prox}</span>
                  </div>
                  <div style={{fontSize:11,background:`${cfg.cor}25`,color:cfg.cor,padding:"2px 10px",borderRadius:12,fontWeight:700,flexShrink:0}}>{mils.length}</div>
                </div>
                <div style={{padding:"8px 14px 10px",display:"flex",flexWrap:"wrap",gap:6}}>
                  {mils.map((mil, i) => (
                    <div key={i} style={{fontSize:11,color:"#cbd5e1",background:"#0f1117",border:"1px solid #242d45",borderRadius:6,padding:"3px 10px",whiteSpace:"nowrap"}}>
                      {mil.nome}
                      <span style={{color:"#475569",marginLeft:5,fontSize:10}}>({mil.propTitulo})</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function DashboardTab({ propostas, oficios }) {
      const [selectedMilId, setSelectedMilId] = useState("");
      const [selectedPropId, setSelectedPropId] = useState("");

      const allMil = useMemo(() => propostas.flatMap(p => {
        const propStatus = getPropostaStatus(p.id, oficios);
        if (propStatus !== "autorizado") return []; // só autorizado entra no dashboard
        const propAutorizada = true;
        return (p.militares || []).map(m => {
        const modDias = (m.modulos || []).reduce((s, mod) => s + diffDays(mod.dataInicio, mod.dataFim), 0);
        const targetDias = modDias; // meta = total de dias da proposta
        const cumpDias = calcDiasOS(m.ordensServico, "Executado");
        const planejDias = calcDiasOS(m.ordensServico, "Planejado");
        const restantes = Math.max(0, targetDias - cumpDias);
        const faltamComPlano = Math.max(0, targetDias - cumpDias - planejDias);
        const valAbertura  = parseFloat(m.valorAbertura)  || 0;
        const valFechamento= parseFloat(m.valorFechamento) || 0;
        const valTotal = valAbertura + valFechamento;

        // Economicidade: soma das diárias das OS executadas
        const totalDiariasExec = (m.ordensServico || [])
          .filter(os => os.status === "Executado")
          .reduce((acc, os) => acc + calcSubtotalOS(m, os), 0);
        const limiarEconomicidade = valAbertura + valFechamento;
        const atingiuEconomicidade = limiarEconomicidade > 0 && totalDiariasExec >= limiarEconomicidade;
        const faltaEconomicidade = Math.max(0, limiarEconomicidade - totalDiariasExec);
        // Só conta como fechado se a proposta estiver autorizada
        const isFechado = propAutorizada && ((targetDias > 0 && cumpDias >= targetDias) || atingiuEconomicidade);

        return { ...m, _propTitulo: p.titulo, _propId: p.id, targetDias, cumpDias, planejDias, restantes, faltamComPlano, isFechado, valTotal,
                 totalDiariasExec, limiarEconomicidade, atingiuEconomicidade, faltaEconomicidade };
      });
      }), [propostas, oficios]);

      const totMil = allMil.length;
      const totFechados = allMil.filter(m => m.isFechado).length;
      const totAndamento = totMil - totFechados;
      const totDinheiro = allMil.reduce((acc, m) => acc + m.valTotal, 0);
      const totEconomicidade = allMil.filter(m => m.atingiuEconomicidade).length;

      const propChartData = useMemo(() => propostas.map(p => {
        const pMil = p.militares || [];
        const fechados = pMil.filter(m => {
          const modDias = (m.modulos || []).reduce((s, mod) => s + diffDays(mod.dataInicio, mod.dataFim), 0);
          const td = parseInt(m.diasMinimos) || modDias;
          const cd = calcDiasOS(m.ordensServico, "Executado");
          return td > 0 && cd >= td;
        }).length;
        const andamento = pMil.length - fechados;
        return { titulo: p.titulo || 'Sem Título', fechados, andamento, total: pMil.length };
      }), [propostas]);

      const filteredMilByProp = selectedPropId ? allMil.filter(m => m._propId === selectedPropId) : allMil;
      const selectedMil = allMil.find(m => m.id === selectedMilId);
      const globalPct   = totMil > 0 ? (totFechados / totMil) * 100 : 0;

      const [counts, setCounts] = useState({ mil:0, andamento:0, fechados:0, econo:0 });
      useEffect(() => {
        const tgt = { mil:totMil, andamento:totAndamento, fechados:totFechados, econo:totEconomicidade };
        const steps=60; let step=0;
        const iv = setInterval(()=>{
          step++;
          const ease = 1-Math.pow(1-step/steps,3);
          setCounts({ mil:Math.round(tgt.mil*ease), andamento:Math.round(tgt.andamento*ease), fechados:Math.round(tgt.fechados*ease), econo:Math.round(tgt.econo*ease) });
          if(step>=steps) clearInterval(iv);
        }, 1500/steps);
        return ()=>clearInterval(iv);
      }, [totMil, totAndamento, totFechados, totEconomicidade]);

      return (
        <div className="no-print">
          <style>{`
            @keyframes card-rise { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }
            @keyframes bar-fill  { from{width:0 !important;} }
            .dash-card{animation:card-rise .45s ease both;}
            .dash-bar{animation:bar-fill 1.2s cubic-bezier(.34,1.56,.64,1) both;}
            .dash-card:hover{transform:translateY(-2px);transition:transform .2s;}
          `}</style>

          {/* ── KPI Cards ── */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16,marginBottom:24}}>
            {[
              {label:"Total de Militares",    value:counts.mil,       color:"#8b5cf6",icon:I.users, pct:null,                                            delay:"0s"},
              {label:"Em Andamento",          value:counts.andamento, color:"#f59e0b",icon:I.clock, pct:totMil?Math.round(totAndamento/totMil*100):0,    delay:".08s"},
              {label:"Fechados",              value:counts.fechados,  color:"#10b981",icon:I.check, pct:totMil?Math.round(totFechados/totMil*100):0,     delay:".16s"},
              {label:"Economicidade Atingida",value:counts.econo,     color:"#06b6d4",icon:I.coin,  pct:totMil?Math.round(totEconomicidade/totMil*100):0,delay:".24s"},
            ].map((c,i)=>(
              <div key={i} className="dash-card" style={{background:"#1a2235",border:"1px solid #242d45",borderTop:`3px solid ${c.color}`,borderRadius:14,padding:"22px 24px",animationDelay:c.delay}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                  <div style={{width:42,height:42,borderRadius:11,background:`${c.color}18`,color:c.color,display:"flex",alignItems:"center",justifyContent:"center"}}>{c.icon}</div>
                  {c.pct!==null&&<span style={{background:`${c.color}15`,color:c.color,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,border:`1px solid ${c.color}30`}}>{c.pct}%</span>}
                </div>
                <div style={{fontSize:46,fontWeight:900,color:"#f8fafc",lineHeight:1,fontVariantNumeric:"tabular-nums",letterSpacing:"-.03em"}}>{c.value}</div>
                <div style={{fontSize:12,color:"#64748b",fontWeight:600,marginTop:8,letterSpacing:".01em"}}>{c.label}</div>
                {c.pct!==null&&(
                  <div style={{marginTop:14}}>
                    <div style={{height:3,background:"rgba(255,255,255,.05)",borderRadius:2,overflow:"hidden"}}>
                      <div className="dash-bar" style={{height:"100%",width:`${c.pct}%`,background:c.color,borderRadius:2,animationDelay:c.delay}}/>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* ── Row 2: Donut Global + Barras por Proposta ── */}
          <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1.8fr)",gap:20,marginBottom:20}}>

            <div className="dash-card" style={{...S.card,animationDelay:".32s",display:"flex",flexDirection:"column"}}>
              <div style={{padding:"16px 22px",borderBottom:"1px solid #242d45"}}>
                <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#f1f5f9",letterSpacing:".01em"}}>Conclusão Geral</h3>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#475569"}}>Proporção de comissionamentos fechados</p>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 22px"}}>
                <AnimatedDonut pct={globalPct} color={globalPct>=80?"#10b981":globalPct>=50?"#3b82f6":"#f59e0b"} size={180} label="FECHADOS"/>
                <div style={{display:"flex",gap:24,marginTop:20}}>
                  {[{v:totFechados,l:"Fechados",c:"#10b981"},{v:totAndamento,l:"Andamento",c:"#f59e0b"},{v:totMil,l:"Total",c:"#8b5cf6"}].map((x,i)=>(
                    <React.Fragment key={i}>
                      {i>0&&<div style={{width:1,background:"#242d45"}}/>}
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:24,fontWeight:900,color:"#f8fafc"}}>{x.v}</div>
                        <div style={{fontSize:10,color:x.c,textTransform:"uppercase",letterSpacing:".06em",fontWeight:700,marginTop:2}}>{x.l}</div>
                      </div>
                    </React.Fragment>
                  ))}
                </div>
              </div>
            </div>

            <div className="dash-card" style={{...S.card,animationDelay:".4s"}}>
              <div style={{padding:"16px 22px",borderBottom:"1px solid #242d45"}}>
                <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#f1f5f9",letterSpacing:".01em"}}>Status por Proposta</h3>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#475569"}}>Militares fechados vs. em andamento</p>
              </div>
              <div style={{padding:"20px 22px"}}>
                {propChartData.length===0?(
                  <div style={{textAlign:"center",padding:40,color:"#475569"}}>Nenhuma proposta cadastrada.</div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:20}}>
                    {propChartData.map((p,i)=>{
                      const pF=p.total>0?(p.fechados/p.total)*100:0;
                      const pA=p.total>0?(p.andamento/p.total)*100:0;
                      return (
                        <div key={i}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
                            <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p.titulo}</span>
                            <span style={{fontSize:11,color:"#475569",background:"#242d45",padding:"2px 8px",borderRadius:5}}>{p.total} militar{p.total!==1?"es":""}</span>
                          </div>
                          <div style={{height:8,background:"#0f1117",borderRadius:6,overflow:"hidden",display:"flex"}}>
                            {pF>0&&<div className="dash-bar" style={{width:`${pF}%`,background:"#10b981",borderRadius:"6px 0 0 6px",animationDelay:`${.4+i*.1}s`}}/>}
                            {pA>0&&<div className="dash-bar" style={{width:`${pA}%`,background:"#3b82f6",borderRadius:pF>0?"0 6px 6px 0":"6px",animationDelay:`${.45+i*.1}s`}}/>}
                          </div>
                          <div style={{display:"flex",gap:16,marginTop:8,alignItems:"center"}}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#10b981"}}/><span style={{fontSize:11,color:"#64748b"}}>Fechados: <strong style={{color:"#f1f5f9"}}>{p.fechados}</strong></span></div>
                            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#3b82f6"}}/><span style={{fontSize:11,color:"#64748b"}}>Andamento: <strong style={{color:"#f1f5f9"}}>{p.andamento}</strong></span></div>
                            <span style={{marginLeft:"auto",fontSize:11,color:"#10b981",fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"2px 8px",borderRadius:5}}>{Math.round(pF)}% concluído</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* ── Row 3: Progresso Individual + Economicidade ── */}
          <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1.6fr)",gap:20}}>

            <div className="dash-card" style={{...S.card,animationDelay:".48s"}}>
              <div style={{padding:"16px 22px",borderBottom:"1px solid #242d45"}}>
                <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#f1f5f9",letterSpacing:".01em"}}>Progresso Individual</h3>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#475569"}}>Acompanhamento detalhado por militar</p>
              </div>
              <div style={{padding:22}}>
                {/* Step 1: Proposta */}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>1. Filtrar por Proposta</div>
                  <select style={S.inp} value={selectedPropId} onChange={e=>{setSelectedPropId(e.target.value);setSelectedMilId("");}}>
                    <option value="">— Todas as Propostas —</option>
                    {propostas.map(p=><option key={p.id} value={p.id}>{p.titulo||"Sem título"}</option>)}
                  </select>
                </div>
                {/* Step 2: Militar */}
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>2. Selecionar Militar</div>
                  <select style={{...S.inp,borderColor:selectedPropId?"rgba(59,130,246,0.4)":"undefined"}} value={selectedMilId} onChange={e=>setSelectedMilId(e.target.value)}>
                    <option value="">— Selecione um Militar —</option>
                    {filteredMilByProp.map(m=><option key={m.id} value={m.id}>{m.postoGrad} {m.nomeGuerra}{!selectedPropId?` (${m._propTitulo})`:""}</option>)}
                  </select>
                </div>
                {selectedMil?(
                  <div>
                    <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
                      <AnimatedDonut
                        pct={selectedMil.targetDias>0?Math.min(100,(selectedMil.cumpDias/selectedMil.targetDias)*100):0}
                        color={selectedMil.isFechado?"#22c55e":"#3b82f6"}
                        size={165} label="EXECUTADO"
                        subtitle={`${selectedMil.cumpDias} / ${selectedMil.targetDias} dias`}
                      />
                    </div>
                    <div style={{textAlign:"center",padding:"10px 16px",background:selectedMil.isFechado?"rgba(34,197,94,.1)":"rgba(59,130,246,.1)",border:`1px solid ${selectedMil.isFechado?"rgba(34,197,94,.25)":"rgba(59,130,246,.25)"}`,borderRadius:10,color:selectedMil.isFechado?"#22c55e":"#3b82f6",fontSize:13,fontWeight:700,marginBottom:16}}>
                      {selectedMil.isFechado?"✔ COMISSIONAMENTO FECHADO":"▶ EM ANDAMENTO"}
                    </div>
                    {/* Barra segmentada: executado + planejado + faltam */}
                    {selectedMil.targetDias > 0 && (
                      <div style={{marginBottom:14}}>
                        <div style={{display:"flex",height:12,borderRadius:6,overflow:"hidden",background:"#1e293b",marginBottom:6}}>
                          {selectedMil.cumpDias > 0 && (
                            <div style={{width:`${Math.min(100,(selectedMil.cumpDias/selectedMil.targetDias)*100)}%`,background:"#3b82f6",transition:"width .5s"}} title={`Executado: ${selectedMil.cumpDias}d`}/>
                          )}
                          {selectedMil.planejDias > 0 && (
                            <div style={{width:`${Math.min(100,(selectedMil.planejDias/selectedMil.targetDias)*100)}%`,background:"#f59e0b",opacity:.8,transition:"width .5s"}} title={`Planejado: ${selectedMil.planejDias}d`}/>
                          )}
                        </div>
                        <div style={{display:"flex",gap:12,fontSize:10,color:"#475569"}}>
                          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#3b82f6",display:"inline-block"}}/> Executado</span>
                          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#f59e0b",display:"inline-block"}}/> Planejado</span>
                          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#1e293b",border:"1px solid #334155",display:"inline-block"}}/> Sem OS</span>
                        </div>
                      </div>
                    )}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                      {[
                        {lbl:"Executados", val:selectedMil.cumpDias,    c:"#3b82f6"},
                        {lbl:"Planejados", val:selectedMil.planejDias,   c:"#f59e0b"},
                        {lbl:"Sem OS",     val:selectedMil.faltamComPlano, c:selectedMil.faltamComPlano===0?"#22c55e":"#ef4444"},
                      ].map((x,i)=>(
                        <div key={i} style={{background:"#0f1117",padding:"10px 12px",borderRadius:10,border:"1px solid #242d45",textAlign:"center"}}>
                          <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",fontWeight:700,letterSpacing:".06em",marginBottom:3}}>{x.lbl}</div>
                          <div style={{fontSize:24,color:"#f8fafc",fontWeight:900}}>{x.val}</div>
                          <div style={{fontSize:9,color:x.c,fontWeight:600}}>dias</div>
                        </div>
                      ))}
                    </div>
                    <div style={{padding:"10px 14px",background:"#0f1117",borderRadius:10,border:"1px solid #242d45",fontSize:12,color:"#64748b"}}>
                      Meta: <strong style={{color:"#f1f5f9"}}>{selectedMil.targetDias} dias</strong>
                      <span style={{margin:"0 8px"}}>•</span>
                      Valor: <strong style={{color:"#10b981"}}>{fmtMoney(selectedMil.valTotal)}</strong>
                    </div>
                  </div>
                ):(
                  <div style={{textAlign:"center",padding:"32px 0",color:"#475569"}}>
                    <div style={{marginBottom:8}}>{I.users}</div>
                    <p style={{margin:0,fontSize:13}}>Selecione um militar para ver o progresso detalhado.</p>
                  </div>
                )}
              </div>
            </div>

            <div className="dash-card" style={{...S.card,animationDelay:".56s"}}>
              <div style={{padding:"16px 22px",borderBottom:"1px solid #242d45",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:9,background:"rgba(16,185,129,0.12)",color:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚖️</div>
                <div>
                  <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#f1f5f9",letterSpacing:".01em"}}>Princípio da Economicidade</h3>
                  <p style={{margin:"2px 0 0",fontSize:11,color:"#475569"}}>Meta, executado e saldo de cada militar</p>
                </div>
              </div>
              <div style={{padding:"20px 22px"}}>
                <EconProgressPanel milData={allMil} />
                {/* Mini resumo abaixo do gráfico */}
                {allMil.filter(m=>m.limiarEconomicidade===0).length > 0 && (
                  <div style={{marginTop:16,padding:"10px 14px",background:"rgba(100,116,139,0.08)",border:"1px solid rgba(100,116,139,0.15)",borderRadius:8}}>
                    <span style={{fontSize:11,color:"#475569",fontWeight:600}}>
                      ⚠ {allMil.filter(m=>m.limiarEconomicidade===0).length} militar(es) sem dados de abertura/fechamento cadastrados
                    </span>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* ── Missões Planejadas ── */}
          {(() => {
            const hoje = new Date(new Date().toDateString());
            const planejadas = propostas.flatMap(p =>
              (p.militares || []).flatMap(m =>
                (m.ordensServico || [])
                  .filter(os => os.status !== "Executado" && os.dataInicio)
                  .map(os => {
                    const diff = Math.round((new Date(os.dataInicio + "T00:00:00") - hoje) / 864e5);
                    const postoNaData = getMilPostoNaData(m, os.dataInicio);
                    const subtotal = calcSubtotalOS(m, os);
                    return { diff, os, mil: m, propTitulo: p.titulo || "Sem título", postoNaData, subtotal };
                  })
              )
            ).sort((a, b) => a.diff - b.diff);

            if (planejadas.length === 0) return null;

            return (
              <div className="dash-card" style={{...S.card, marginTop:20, animationDelay:".60s"}}>
                <div style={{padding:"16px 22px", borderBottom:"1px solid #242d45", display:"flex", alignItems:"center", gap:10}}>
                  <div style={{width:32,height:32,borderRadius:9,background:"rgba(245,158,11,0.12)",color:"#f59e0b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>⏳</div>
                  <div>
                    <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#f1f5f9"}}>Missões Planejadas</h3>
                    <p style={{margin:"2px 0 0",fontSize:11,color:"#475569"}}>OS não executadas — ordenadas por data de início</p>
                  </div>
                  <div style={{marginLeft:"auto",fontSize:12,color:"#f59e0b",fontWeight:700,background:"rgba(245,158,11,0.1)",padding:"3px 12px",borderRadius:12}}>{planejadas.length}</div>
                </div>
                <div style={{padding:"16px 22px", display:"flex", flexDirection:"column", gap:8}}>
                  {planejadas.map(({diff, os, mil, propTitulo, postoNaData, subtotal}, i) => {
                    const atrasado = diff < 0;
                    const hoje2 = diff === 0;
                    const cor = atrasado ? "#ef4444" : hoje2 ? "#22c55e" : "#f59e0b";
                    const bgCor = atrasado ? "rgba(239,68,68,0.08)" : hoje2 ? "rgba(34,197,94,0.08)" : "rgba(245,158,11,0.06)";
                    const label = atrasado ? `${Math.abs(diff)}d em atraso` : hoje2 ? "Hoje" : `em ${diff} dia${diff>1?"s":""}`;
                    const diasOS = diffDays(os.dataInicio, os.dataFim);
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:bgCor,border:`1px solid ${cor}22`,borderRadius:10}}>
                        <div style={{minWidth:72,textAlign:"center",background:`${cor}18`,border:`1px solid ${cor}33`,borderRadius:8,padding:"6px 4px"}}>
                          <div style={{fontSize:16,fontWeight:900,color:cor,lineHeight:1}}>{atrasado?"⚠":hoje2?"🟢":"⏳"}</div>
                          <div style={{fontSize:10,fontWeight:700,color:cor,marginTop:2}}>{label}</div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mil.postoGrad} {mil.nomeGuerra}</div>
                          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{os.missaoCurso || "—"} · {os.localidade || "—"}</div>
                          <div style={{fontSize:11,color:"#475569",marginTop:1}}>{propTitulo}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{fmtDate(os.dataInicio)}{os.dataFim ? ` → ${fmtDate(os.dataFim)}` : ""}</div>
                          {diasOS > 0 && <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{diasOS} dia{diasOS>1?"s":""}</div>}
                          {subtotal > 0 && <div style={{fontSize:12,color:"#10b981",fontWeight:700,marginTop:2}}>{fmtMoney(subtotal)}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* ── Painel de Pendências ── */}
          <div className="dash-card" style={{...S.card,marginTop:20,animationDelay:".64s"}}>
            <div style={{padding:"16px 22px",borderBottom:"1px solid #242d45",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:9,background:"rgba(249,115,22,0.12)",color:"#f97316",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>📋</div>
              <div>
                <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#f1f5f9"}}>Próximas Ações — Pipeline</h3>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#475569"}}>Ações pendentes por militar, em sequência do processo de comissionamento</p>
              </div>
            </div>
            <div style={{padding:"20px 22px"}}>
              <PainelPendencias propostas={propostas} oficios={oficios} />
            </div>
          </div>

        </div>
      );
    }


    /* ═══════════════════════════════════════
       CONSULTA TAB
       ═══════════════════════════════════════ */
    function ConsultaTab({ propostas, oficios, logo }) {
      const [search, setSearch] = useState("");
      const [selectedMil, setSelectedMil] = useState(null);
      const [isPrinting, setIsPrinting] = useState(false);

      const allMil = propostas.flatMap(p => (p.militares || []).map(m => ({
        ...m,
        _propId: p.id,
        _propTitulo: p.titulo || "Proposta sem título",
        _propData: p.dataCriacao,
        _propMilitares: p.militares,
        _propModulos: m.modulos || [],
        _propValAb: m.valorAbertura,
        _propValFe: m.valorFechamento,
        _propValDi: m.valorDiarias,
        _propTemDep: m.temDependente,
        _oficioComprepOS: p.oficioComprepOS,
      })));

      const filtered = useMemo(() => {
        if (!search.trim()) return [];
        const s = search.toLowerCase();
        return allMil.filter(m =>
          m.nomeCompleto?.toLowerCase().includes(s) ||
          m.nomeGuerra?.toLowerCase().includes(s) ||
          m.subprocesso?.toLowerCase().includes(s) ||
          m.postoGrad?.toLowerCase().includes(s) ||
          m.numeroPag?.toLowerCase().includes(s) ||
          m.saram?.toLowerCase().includes(s) ||
          m.identidade?.toLowerCase().includes(s)
        );
      }, [allMil, search]);

      const getOficio = (propId) => oficios.find(o => o.propostaId === propId) || {};

      useEffect(() => {
        if (isPrinting) {
          window.print();
          const timer = setTimeout(() => setIsPrinting(false), 500);
          return () => clearTimeout(timer);
        }
      }, [isPrinting]);

      const renderFicha = (mil) => {
        const of = getOficio(mil._propId);
        const totalDias = mil._propModulos.reduce((s, mod) => s + diffDays(mod.dataInicio, mod.dataFim), 0);
        const ajudas = calcAjudas(mil._propTemDep, totalDias);
        const oss = mil.ordensServico || [];
        
        const targetDias = parseInt(mil.diasMinimos) || totalDias;
        const diasCumpridos = calcDiasOS(oss, "Executado");
        const diasPlanejados = calcDiasOS(oss, "Planejado");
        const diasRestantes = Math.max(0, targetDias - diasCumpridos);
        const _valAb = parseFloat(mil.valorAbertura) || 0;
        const _valFe = parseFloat(mil.valorFechamento) || 0;
        const _limiar = _valAb + _valFe;
        const _diariasExec = oss.filter(o => o.status === "Executado").reduce((acc, os) => acc + calcSubtotalOS(mil, os), 0);
        const _atingiuEcono = _limiar > 0 && _diariasExec >= _limiar;
        const isFechado = (targetDias > 0 && diasCumpridos >= targetDias) || _atingiuEcono;

        // OMs Adidos da Missão
        const oMsList = [...new Set(mil._propModulos.map(m => m.omAdido).filter(Boolean))].join(", ") || "—";

        const Section = ({ title, color, children }) => (
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 3, height: 14, borderRadius: 2, background: color }} />
              {title}
            </div>
            {children}
          </div>
        );

        const Info = ({ label, value, mono }) => (
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            <span style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em" }}>{label}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: value && value !== "—" ? "#e2e8f0" : "#475569", ...(mono ? { fontFamily: "'JetBrains Mono','Fira Code',monospace", fontSize: 12 } : {}) }}>{value || "—"}</span>
          </div>
        );

        const stOficio = OFICIO_STATUS[of.status] || {};

        return (
          <div>
            {/* VIEW DE TELA (NO PRINT) */}
            <div className="no-print">
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6, flexWrap: 'wrap' }}>
                <button style={{ ...S.actBtn, padding: 8 }} onClick={() => setSelectedMil(null)}>{I.back}</button>
                <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9", flex: 1 }}>Ficha Completa</h2>
                
                <button 
                  style={{ ...S.btnPri, background: "linear-gradient(135deg,#3b82f6,#8b5cf6)" }} 
                  onClick={() => setIsPrinting(true)}
                >
                  {I.print} Imprimir Ficha Oficial
                </button>
              </div>

              <div style={{ ...S.card, marginBottom: 16, padding: "22px 24px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
                  <InsigniaFAB postoGrad={mil.postoGrad} size={52} />
                  <div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: "#f1f5f9", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                      {mil.postoGrad} {mil.nomeGuerra}
                      {isFechado ? (
                        <span style={{ fontSize: 11, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "3px 8px", borderRadius: 4, display: "inline-flex", alignItems: "center", gap: 4, textTransform: "uppercase", letterSpacing: ".05em" }}>{I.check} Comissionamento Fechado</span>
                      ) : (
                        <span style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", background: "rgba(59,130,246,0.12)", padding: "3px 8px", borderRadius: 4, textTransform: "uppercase", letterSpacing: ".05em", display: "inline-flex", alignItems: "center" }}>Em Andamento</span>
                      )}
                    </div>
                    <div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>{mil.nomeCompleto}</div>
                  </div>
                  {mil.subprocesso && <span style={{ marginLeft: "auto", ...S.mono, fontSize: 14, padding: "6px 14px" }}>Subprocesso: {mil.subprocesso}</span>}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 12 }}>
                  <Info label="SARAM" value={mil.saram} mono />
                  <Info label="Identidade" value={mil.identidade} mono />
                  <Info label="Dependente" value={mil._propTemDep ? "Sim" : "Não"} />
                  <Info label="Total Dias Módulos" value={String(totalDias)} />
                  <Info label="Ajudas de Custo" value={String(ajudas)} />
                </div>
                
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 12, marginTop: 16, paddingTop: 16, borderTop: "1px solid #1e293b" }}>
                  <Info label="Meta a Cumprir" value={`${targetDias} d`} />
                  <Info label="Dias Executados" value={`${diasCumpridos} d`} />
                  <Info label="Dias Planejados" value={`${diasPlanejados} d`} />
                  <Info label="Saldo Restante" value={`${diasRestantes} d`} />
                </div>
              </div>

              <div style={S.card}>
                <div style={{ padding: "22px 24px" }}>
                  <Section title="Proposta" color="#3b82f6">
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 14 }}>
                      <Info label="Título" value={mil._propTitulo} />
                      <Info label="Data Criação" value={fmtDate(mil._propData)} />
                      <Info label="Abertura (Ida)" value={fmtMoney(mil._propValAb)} />
                      <Info label="Fechamento (Volta)" value={fmtMoney(mil._propValFe)} />
                      <Info label="Total Soma" value={fmtMoney((parseFloat(mil._propValAb)||0) + (parseFloat(mil._propValFe)||0))} />
                    </div>
                    {mil._propModulos.length > 0 && (
                      <div>
                        <span style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em" }}>Módulos e OM Adido</span>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 6 }}>
                          {mil._propModulos.map((mod, i) => (
                            <div key={i} style={{ background: "#0c111b", border: "1px solid #1e293b", borderRadius: 8, padding: "8px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 6 }}>
                              <div style={{display: 'flex', flexDirection: 'column', gap: 4}}>
                                <span style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0" }}>{mod.tipo}: {mod.descricao || "—"} {mod.localidade ? `(${mod.localidade})` : ""}</span>
                                {mod.omAdido && <span style={{fontSize: 10, color: "#94a3b8"}}>OM Adido: {mod.omAdido}</span>}
                              </div>
                              <span style={{ fontSize: 11, color: "#94a3b8" }}>{fmtDate(mod.dataInicio)} → {fmtDate(mod.dataFim)} · <strong style={{ color: "#3b82f6" }}>{diffDays(mod.dataInicio, mod.dataFim)}d</strong></span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </Section>

                  <Section title="Ofício de Solicitação" color="#8b5cf6">
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
                      <Info label="SIGAD" value={of.sigad} mono />
                      <Info label="Status" value={stOficio.label} />
                      <Info label="Ofício COMPREP" value={of.oficioComprep} mono />
                    </div>
                  </Section>

                  <Section title="PAG" color="#22c55e">
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
                      <Info label="SIGAD Abertura PAG" value={mil.sigadPag} mono />
                      <Info label="Nº PAG" value={mil.numeroPag} mono />
                      <Info label="Nº Subprocesso" value={mil.subprocesso} mono />
                    </div>
                  </Section>

                  <Section title="Portaria e Numerário" color="#a78bfa">
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
                      <Info label="Portaria" value={mil.portaria} />
                      <Info label="Boletim" value={mil.boletim} />
                      <Info label="Concessão 1378" value={mil.numStatus === "concedido" ? "Concedido" : mil.numStatus === "negado" ? "Negado" : "Pendente"} />
                    </div>
                  </Section>

                  <Section title={`Ordens de Serviço (${oss.length})`} color="#38bdf8">
                    {mil._oficioComprepOS || getOficio(mil._propId)?.oficioComprep ? (
                      <div style={{ marginBottom: 10 }}>
                        <Info label="COMPREP Autorização" value={getOficio(mil._propId)?.oficioComprep || mil._oficioComprepOS} mono />
                      </div>
                    ) : null}
                    {oss.length === 0 ? (
                      <span style={{ fontSize: 12, color: "#475569" }}>Nenhuma OS cadastrada</span>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {oss.map((os, i) => (
                          <div key={os.id} style={{ background: "#0c111b", border: "1px solid #1e293b", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${os.status === 'Executado' ? '#22c55e' : '#f59e0b'}` }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 6 }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <span style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>OS {i+1}: <span style={{ fontFamily: "'JetBrains Mono','Fira Code',monospace" }}>{os.numero || "—"}</span></span>
                                <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: os.status === 'Executado' ? 'rgba(34,197,94,0.15)' : 'rgba(245,158,11,0.15)', color: os.status === 'Executado' ? '#22c55e' : '#f59e0b', fontWeight: 'bold', textTransform: 'uppercase' }}>{os.status || 'Planejado'}</span>
                              </div>
                              <span style={{ fontSize: 11, color: "#94a3b8" }}>{fmtDate(os.dataInicio)} → {fmtDate(os.dataFim)}</span>
                            </div>
                            <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{os.missaoCurso || "—"} {os.localidade ? `· ${os.localidade}` : ""}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </Section>
                </div>
              </div>
            </div>

            {/* VIEW DE IMPRESSÃO (PRINT ONLY) - FICHA OFICIAL */}
            {isPrinting && (
              <div className="print-only print-container">
                <div className="print-header">
                  {logo && <img src={logo} alt="Logo" style={{ height: 60, marginBottom: 10 }} />}
                  <div className="print-subtitle">MINISTÉRIO DA DEFESA</div>
                  <div className="print-subtitle">COMANDO DA AERONÁUTICA</div>
                  <div className="print-subtitle">1º GRUPO DE DEFESA ANTIAÉREA</div>
                  <div className="print-title">FICHA INDIVIDUAL DE COMISSIONAMENTO</div>
                  <div className="print-subtitle">DATA: {new Date().toLocaleDateString('pt-BR')}</div>
                </div>

                <div className="print-section">
                  <div className="print-section-title">I - DADOS DO MILITAR</div>
                  <table className="print-table">
                    <tbody>
                      <tr>
                        <th width="20%">NOME COMPLETO:</th>
                        <td width="80%">{mil.nomeCompleto || '—'}</td>
                      </tr>
                      <tr>
                        <th>POSTO/GRAD:</th>
                        <td>{mil.postoGrad}</td>
                      </tr>
                      <tr>
                        <th>NOME DE GUERRA:</th>
                        <td>{mil.nomeGuerra || '—'}</td>
                      </tr>
                      <tr>
                        <th>IDENTIDADE:</th>
                        <td>{mil.identidade || '—'}</td>
                      </tr>
                      <tr>
                        <th>SARAM:</th>
                        <td>{mil.saram || '—'}</td>
                      </tr>
                      <tr>
                        <th>OM ADIDO(S):</th>
                        <td>{oMsList}</td>
                      </tr>
                      <tr>
                        <th>DEPENDENTE:</th>
                        <td>{mil._propTemDep ? 'SIM' : 'NÃO'}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                <div className="print-section">
                  <div className="print-section-title">II - DOCUMENTOS VINCULADOS</div>
                  <table className="print-table">
                    <tbody>
                      <tr><th width="25%">PROPOSTA:</th><td>{mil._propTitulo}</td></tr>
                      <tr><th>OFÍCIO DE SOLICITAÇÃO:</th><td>{of.sigad || '—'}</td></tr>
                      <tr><th>AUTORIZAÇÃO (COMPREP):</th><td>{of.oficioComprep || '—'}</td></tr>
                      <tr><th>PORTARIA:</th><td>{mil.portaria || '—'}</td></tr>
                      <tr><th>BOLETIM DE PUBLICAÇÃO:</th><td>{mil.boletim || '—'}</td></tr>
                      <tr><th>Nº PAG:</th><td>{mil.numeroPag || '—'} (Sub: {mil.subprocesso || '—'})</td></tr>
                    </tbody>
                  </table>
                </div>

                <div className="print-section">
                  <div className="print-section-title">III - CONTROLE DE DIAS</div>
                  <div className="print-grid-2">
                    <div className="print-info-box">
                      <div className="print-info-label">META PROPOSTA</div>
                      <div className="print-info-val">{targetDias} dias</div>
                    </div>
                    <div className="print-info-box">
                      <div className="print-info-label">DIAS PLANEJADOS</div>
                      <div className="print-info-val">{diasPlanejados} dias</div>
                    </div>
                    <div className="print-info-box">
                      <div className="print-info-label">DIAS EXECUTADOS</div>
                      <div className="print-info-val">{diasCumpridos} dias</div>
                    </div>
                    <div className="print-info-box">
                      <div className="print-info-label">SALDO RESTANTE</div>
                      <div className="print-info-val">{diasRestantes} dias</div>
                    </div>
                  </div>
                  <div style={{ textAlign: 'center', marginTop: 10, fontWeight: 'bold', fontSize: 14 }}>
                    STATUS DO COMISSIONAMENTO: {isFechado ? 'FECHADO / CONCLUÍDO' : 'EM ANDAMENTO'}
                  </div>
                </div>

                <div className="print-section">
                  <div className="print-section-title">IV - RELAÇÃO DE ORDENS DE SERVIÇO (MISSÕES E CURSOS)</div>
                  {oss.length === 0 ? (
                    <div style={{ fontSize: 12 }}>Nenhuma ordem de serviço cadastrada.</div>
                  ) : (
                    <table className="print-table">
                      <thead>
                        <tr>
                          <th>Nº OS</th>
                          <th>MISSÃO / CURSO</th>
                          <th>LOCALIDADE</th>
                          <th>INÍCIO</th>
                          <th>TÉRMINO</th>
                          <th>DIAS</th>
                          <th>STATUS</th>
                        </tr>
                      </thead>
                      <tbody>
                        {oss.map((os, i) => (
                          <tr key={i}>
                            <td>{os.numero || '—'}</td>
                            <td>{os.missaoCurso || '—'}</td>
                            <td>{os.localidade || '—'}</td>
                            <td>{fmtDate(os.dataInicio)}</td>
                            <td>{fmtDate(os.dataFim)}</td>
                            <td>{diffDays(os.dataInicio, os.dataFim)}</td>
                            <td>{os.status ? os.status.toUpperCase() : 'PLANEJADO'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>

                <div className="print-section">
                  <div className="print-section-title">V - AJUDA DE CUSTO (DADOS FINANCEIROS)</div>
                  <table className="print-table">
                    <tbody>
                      <tr>
                        <th width="30%">ABERTURA (IDA):</th>
                        <td width="70%">{fmtMoney(mil.valorAbertura)}</td>
                      </tr>
                      <tr>
                        <th>FECHAMENTO (VOLTA):</th>
                        <td>{fmtMoney(mil.valorFechamento)}</td>
                      </tr>
                      <tr>
                        <th>SOMA TOTAL:</th>
                        <td>{fmtMoney((parseFloat(mil.valorAbertura)||0) + (parseFloat(mil.valorFechamento)||0))}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                
                <div style={{ marginTop: 60, textAlign: 'center', fontSize: 12 }}>
                  <div style={{ width: 250, borderBottom: '1px solid #000', margin: '0 auto 5px' }}></div>
                  <div>ASSINATURA DO GESTOR</div>
                </div>

              </div>
            )}
          </div>
        );
      };

      if (selectedMil) return renderFicha(selectedMil);

      const totalMil = allMil.length;
      const comSubprocesso = allMil.filter(m => m.subprocesso).length;

      return (
        <div className="no-print">
          <div style={{ marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Consulta de Comissionamento</h2>
            <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Pesquise por nome, nome de guerra, SARAM, Idt, subprocesso ou nº PAG</p>
          </div>

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Total de Militares", value: totalMil, color: "#6366f1" },
              { label: "Com Subprocesso", value: comSubprocesso, color: "#22c55e" },
              { label: "Sem Subprocesso", value: totalMil - comSubprocesso, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.search}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          <div style={{ ...S.card, padding: "20px 24px", marginBottom: 16 }}>
            <div style={S.searchWrap}>
              <span style={S.searchIco}>{I.search}</span>
              <input
                style={{ ...S.searchIn, fontSize: 15, padding: "14px 18px 14px 42px" }}
                placeholder="Digite o nº do SARAM, Identidade, nome do militar..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                autoFocus
              />
            </div>
          </div>

          {search.trim() === "" ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.search}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Digite para pesquisar</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Busque por nome, nome de guerra, SARAM, Idt, nº subprocesso ou nº PAG.</p>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum resultado para "{search}"</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Verifique a grafia ou tente outro termo.</p>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filtered.map(mil => {
                const targetDias = parseInt(mil.diasMinimos) || (mil.modulos || []).reduce((s, m) => s + diffDays(m.dataInicio, m.dataFim), 0);
                const cumpDias = calcDiasOS(mil.ordensServico, "Executado");
                const _lim3 = (parseFloat(mil.valorAbertura)||0) + (parseFloat(mil.valorFechamento)||0);
                const _exec3 = (mil.ordensServico||[]).filter(o=>o.status==="Executado").reduce((a,o)=>a+calcSubtotalOS(mil,o),0);
                const isFechado = (targetDias > 0 && cumpDias >= targetDias) || (_lim3 > 0 && _exec3 >= _lim3);

                return (

    function emptyMilProposta() {

    function emptyModulo() {
      return { id: uid(), tipo: "Curso", descricao: "", localidade: "", omAdido: "", dataInicio: "", dataFim: "" };
    }

    function calcTotaisProposta(prop) {
      let somaAb = 0, somaFe = 0, somaDi = 0;
      (prop.militares || []).forEach(m => {
        somaAb += parseFloat(m.valorAbertura) || 0;
        somaFe += parseFloat(m.valorFechamento) || 0;
        somaDi += parseFloat(m.valorDiarias) || 0;
      });
      return { totalAbertura: somaAb, totalFechamento: somaFe, totalAF: somaAb + somaFe, totalDiarias: somaDi };
    }

    // Deriva o status da proposta a partir dos ofícios vinculados
    const getPropostaStatus = (propId, oficios) => {
      const ofs = (oficios || []).filter(o => o.propostaId === propId);
      if (ofs.some(o => o.status === "autorizado")) return "autorizado";
      if (ofs.length > 0 && ofs.every(o => o.status === "negado")) return "negado";
      return "aguardando";
    };

      aguardando: { label: "Aguardando", color: "#f59e0b", bg: "rgba(245,158,11,0.12)" },
      autorizado:  { label: "Autorizado",  color: "#22c55e", bg: "rgba(34,197,94,0.12)"  },
      negado:      { label: "Negado",      color: "#ef4444", bg: "rgba(239,68,68,0.12)"  },

      const handleSave = (prop) => {
        setPropostas(prev => {
          const idx = prev.findIndex(p => p.id === prop.id);
          if (idx >= 0) { const n = [...prev]; n[idx] = prop; return n; }
          return [...prev, prop];
        });
        setEditing(null);
      };

      const handleDel = () => { setPropostas(p => p.filter(x => x.id !== delProp.id)); setDelProp(null); };

    function RoboLeitorPDF({ onDataExtracted, onClose, efetivoDb }) {
      const [loading, setLoading] = useState(false);
      const [statusMsg, setStatusMsg] = useState("Selecione a Proposta em PDF para a IA analisar.");
      const [filtroMil, setFiltroMil] = useState("");

      const handleFileUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.type !== "application/pdf") {
          setStatusMsg("❌ Por favor, selecione um arquivo PDF válido.");
          return;
        }
        setLoading(true);
        setStatusMsg("⏳ Etapa 1/3: Extraindo texto do PDF...");
        const fileReader = new FileReader();
        fileReader.onerror = () => { setStatusMsg("❌ Erro ao abrir o arquivo."); setLoading(false); };
        fileReader.onload = async function() {
          try {
            const typedarray = new Uint8Array(this.result);
            const pdf = await window.pdfjsLib.getDocument({ data: typedarray }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
              setStatusMsg(`⏳ Etapa 2/3: Lendo página ${i} de ${pdf.numPages}...`);
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              // Agrupa itens por linha usando coordenada Y (PDF: Y maior = topo)
              const TOL = 4;
              const rowMap = new Map();
              for (const item of textContent.items) {
                if (!item.str.trim()) continue;
                const y = Math.round(item.transform[5] / TOL) * TOL;
                if (!rowMap.has(y)) rowMap.set(y, []);
                rowMap.get(y).push({ x: item.transform[4], str: item.str });
              }
              // Ordena de cima para baixo, e dentro de cada linha, da esquerda para direita
              const sortedRows = [...rowMap.entries()]
                .sort((a, b) => b[0] - a[0])
                .map(([, items]) => items.sort((a, b) => a.x - b.x).map(it => it.str).join(" "));
              fullText += sortedRows.join("\n") + "\n";
            }
            if (!fullText.trim()) throw new Error("PDF sem texto reconhecível.");
            setStatusMsg("🧠 Etapa 3/3: Enviando para o Claude AI (aguarde...)");
            await enviarParaIA(fullText, filtroMil.trim());
          } catch (err) {
            setStatusMsg(`❌ Erro ao ler PDF: ${err.message}`);
            setLoading(false);
          }
        };
        fileReader.readAsArrayBuffer(file);
      };

            : "";
          const prompt = `Você é um assistente especialista em propostas de comissionamento do Comando da Aeronáutica (1º GDAAE).${filtroInstrucao}

A tabela tem as colunas: PRIORIDADE | POSTO/GRAD | NOME | DEP | MÓDULOS (INÍCIO/TÉRMINO/Nº DE DIAS/TOTAL DIAS) | MISSÃO E LOCAL | QTD DE AJ. CUSTO | AJUDA DE CUSTO (INÍCIO/TÉRMINO/TOTAL) | DIÁRIAS | OM ADIDO

COMO O TEXTO APARECE (IMPORTANTE):
O texto foi extraído linha a linha do PDF. Cada linha da tabela visual gera uma linha de texto. A linha de um militar aparece assim:
  PRIORIDADE POSTO ESPECIALIDADE NOME SARAM DEP TOTALDIAS QTDAJUDACUSTO R$ VALOR_INICIO
Às vezes o campo DEP (S ou N) aparece colado ao nome ou em linha separada logo abaixo — sempre associe ao militar da linha acima.
Os módulos aparecem em linhas separadas antes ou junto ao militar, no formato:

ATENÇÃO: a descrição de um módulo pode ocupar MÚLTIPLAS linhas de texto. Por exemplo:

Nesse caso, concatene as linhas até encontrar a SIGLA_OM (palavra em maiúsculas sem datas).

1. Cada militar pode ter MÚLTIPLOS módulos (linhas na tabela). Agrupe todos os módulos do mesmo militar.

3. "postoGrad": O formato na tabela é RANK + ESPECIALIDADE + NOME. A especialidade (SGS, INF, BCO, BSP, TAD, TMT, NE, AV, etc.) NÃO faz parte do posto nem do nome — ignore-a. Padronize o posto assim:

5. "nomeGuerra": No documento original o nome de guerra aparece em negrito — mas como extraímos texto plano, não conseguimos detectar o negrito. Use a última palavra significativa do nome como padrão. Exceção: se terminar em JUNIOR/JÚNIOR/FILHO use as duas últimas palavras. Ignore preposições finais (DA, DE, DO, DOS, DAS) e use a palavra anterior. Exemplo: "LOPES DA SILVA" → "SILVA"; "ESPÍRITO SANTO" → "SANTO".
6. "saram": Apenas os dígitos numéricos (remova parênteses e espaços). Ex: "(6493297)" → "6493297".
7. "temDependente": true se DEP = "S" (SIM), false se DEP = "N" (NÃO) ou vazio. ATENÇÃO: o "S" ou "N" pode aparecer em uma linha separada logo abaixo do nome/SARAM do militar — ainda assim é o campo DEP daquele militar.
8. Para cada módulo extraia (formato da linha: "DD/MM/AAAA DD/MM/AAAA NNN DESCRIÇÃO - Cidade/Estado  SIGLA_OM"):
   - "tipo": sempre "Missão"
   - "descricao": nome da missão/curso/exercício, SEM a localidade (tudo antes do " - Cidade")
   - "localidade": cidade/estado que vem após o " - " na descrição (ex: "Rosário do Sul/RS", "Curitiba/PR")
   - "omAdido": sigla no final da linha (ex: "BASM", "BAFL", "BAAN", "CINDACTA II", "BABE", "UNIFA", "BANT", "DTCEA-CGU", "BABR")
   - "dataInicio": primeiro par DD/MM/AAAA → formato YYYY-MM-DD
   - "dataFim": segundo par DD/MM/AAAA → formato YYYY-MM-DD
9. "valorAbertura": número da coluna INÍCIO da Ajuda de Custo (sem R$, sem pontos, vírgula→ponto. Ex: 9011.57)
10. "valorFechamento": número da coluna TÉRMINO da Ajuda de Custo (sem R$)
11. "valorDiarias": número da coluna DIÁRIAS (sem R$)
12. "diasMinimos": número inteiro da coluna TOTAL DIAS
12b. "habilitacao": tipo de habilitação. Procure no campo de MISSÃO, nas OBSERVAÇÕES ao final (ex: "O 1T VINICIUS possui Adicional de Habilitação de Aperfeiçoamento") ou em qualquer parte do texto. Normalize:
    - "ALTOS ESTUDOS CAT I" → "ALTOS ESTUDOS" + "CAT I" ou "CATEGORIA I"
    - "ALTOS ESTUDOS CAT II" → "ALTOS ESTUDOS" + "CAT II" ou "CATEGORIA II"
    - "APERFEIÇOAMENTO" → "APERFEIÇOAMENTO", "APERFEI" ou "Aperfei"
    - "ESPECIALIZAÇÃO" → "ESPECIALIZAÇÃO" ou "ESPECIAL"
    - "FORMAÇÃO" → "FORMAÇÃO" ou "FORMACAO"
    - "" → se não encontrar nenhum dos acima
13. Ignore: linha "TOTAL DA PROPOSTA", nomes de comandantes e assinaturas. NÃO ignore as Observações — elas podem conter habilitação dos militares.
14. "numero": apenas o número/código da proposta, sem "Nº" (ex: "01/1ºGDAAE/2025")
15. "titulo": a linha completa de identificação — "PROPOSTA DE COMISSIONAMENTO Nº" + o número (ex: "PROPOSTA DE COMISSIONAMENTO Nº 01/1ºGDAAE/2025")
16. "subtitulo": a linha de planejamento abaixo do título (ex: "PLANEJAMENTO DE COMISSIONAMENTO PARA 2025")
