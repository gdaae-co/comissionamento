                        const diasOS     = diffDays(os.dataInicio, os.dataFim);
                        const postoNaData = getMilPostoNaData(selMil, os.dataInicio);
                        const valorUnit  = diasOS > 0 ? getValorDiaria(postoNaData, os.localidade) : 0;
                        const subtotalPrincipal = diasOS > 0 ? valorUnit * (diasOS - 0.5) : 0;
                        const pernoites  = os.pernoitesTransito || [];
                        const subtotalTransito = pernoites.reduce((a, p) => {
                          if (!p.localidade) return a;
                          const dp = diffDays(p.dataInicio, p.dataFim);
                          const diasP = dp > 0 ? dp - 0.5 : 1;
                          return a + getValorDiaria(postoNaData, p.localidade) * diasP;
                        }, 0);
                        const subtotal   = subtotalPrincipal + subtotalTransito;
                        const grupo      = getGrupoDiaria(postoNaData);
                        const col        = getColunaDiaria(os.localidade);
                        const colLabel   = col === 0 ? "BSB/MAO/RJ/SP" : col === 1 ? "Capital" : "Demais";
                        const isExec     = os.status === "Executado";
                        const addPernoite = () => updateOS(selMil._propId, selMil.id, os.id, "pernoitesTransito", [...pernoites, { id: uid(), localidade: "", dataInicio: "", dataFim: "" }]);
                        const removePernoite = (pid) => updateOS(selMil._propId, selMil.id, os.id, "pernoitesTransito", pernoites.filter(p => p.id !== pid));
                        const updatePernoite = (pid, field, val) => updateOS(selMil._propId, selMil.id, os.id, "pernoitesTransito", pernoites.map(p => p.id === pid ? { ...p, [field]: val } : p));
                        return (
                          <div key={os.id} style={{ ...S.card, border: `1px solid ${isExec ? "rgba(34,197,94,0.2)" : "#1e293b"}` }}>
                            {/* Cabeçalho da OS */}
                            <div style={{ padding: "12px 18px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center",
                              background: isExec ? "rgba(34,197,94,0.05)" : "rgba(30,41,59,0.3)" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <span style={{ fontSize: 13, fontWeight: 700, color: "#94a3b8" }}>OS {osIdx + 1}</span>
                                {os.numero && <span style={S.mono}>{os.numero}</span>}
                                <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 4,
                                  color: isExec ? "#22c55e" : "#a78bfa",
                                  background: isExec ? "rgba(34,197,94,0.12)" : "rgba(167,139,250,0.12)" }}>
                                  {isExec ? "✔ Executado" : "◷ Planejado"}
                                </span>
                                {pernoites.length > 0 && <span style={{ fontSize: 10, fontWeight: 700, color: "#38bdf8", background: "rgba(56,189,248,0.12)", padding: "2px 7px", borderRadius: 4 }}>🌙 {pernoites.length} pernoite{pernoites.length>1?"s":""} em trânsito</span>}
                                {postoNaData !== selMil.postoGrad && <span style={{ fontSize: 10, fontWeight: 700, color: "#a78bfa", background: "rgba(167,139,250,0.12)", padding: "2px 7px", borderRadius: 4 }}>Posto na data: {postoNaData}</span>}
                                {!isExec && os.dataInicio && (() => {
                                  const hoje = new Date(new Date().toDateString());
                                  const inicio = new Date(os.dataInicio + "T00:00:00");
                                  const diff = Math.round((inicio - hoje) / 864e5);
                                  if (diff > 0) return <span style={{ fontSize: 10, fontWeight: 700, color: "#f59e0b", background: "rgba(245,158,11,0.12)", padding: "2px 7px", borderRadius: 4 }}>⏳ {diff} dia{diff>1?"s":""} para iniciar</span>;
                                  if (diff === 0) return <span style={{ fontSize: 10, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "2px 7px", borderRadius: 4 }}>🟢 Inicia hoje</span>;
                                  return <span style={{ fontSize: 10, fontWeight: 700, color: "#ef4444", background: "rgba(239,68,68,0.12)", padding: "2px 7px", borderRadius: 4 }}>⚠ {Math.abs(diff)} dia{Math.abs(diff)>1?"s":""} em atraso</span>;
                                })()}
                                {diasOS > 0 && (
                                  <span style={{ fontSize: 11, fontWeight: 700, color: "#f59e0b" }}>
                                    {fmtMoney(subtotal)}
                                  </span>
                                )}
                              </div>
                              <button style={{ ...S.actBtn, color: "#ef4444", padding: 3 }} onClick={() => removeOS(selMil._propId, selMil.id, os.id)}>{I.x}</button>
                            </div>

                            {/* Campos da OS */}
                            <div style={{ padding: "14px 18px", display: "flex", flexDirection: "column", gap: 12 }}>
                              <div style={S.row}>
                                <FG label="Status" flex>
                                  <select style={{ ...S.inp, background: isExec ? "rgba(34,197,94,0.08)" : "#0f172a" }}
                                    value={os.status || "Planejado"}
                                    onChange={e => updateOS(selMil._propId, selMil.id, os.id, "status", e.target.value)}>
                                    <option value="Planejado">Planejado (Não Executado)</option>
                                    <option value="Executado">Executado (Concluído)</option>
                                  </select>
                                </FG>
                                <FG label="Nº da Ordem de Serviço" flex>
                                  <input style={S.inp} value={os.numero || ""}
                                    onChange={e => updateOS(selMil._propId, selMil.id, os.id, "numero", e.target.value)}
                                    placeholder="Nº da OS" />
                                </FG>
                              </div>
                              <div style={S.row}>
                                <FG label="Missão / Curso" flex>
                                  <input style={S.inp} list="missoes-list" value={os.missaoCurso || ""}
                                    onChange={e => updateOS(selMil._propId, selMil.id, os.id, "missaoCurso", e.target.value)}
                                    placeholder="Ex: CADOM, OOM-III, Op Ágata..." />
                                </FG>
                                <FG label="Localidade (destino)" flex>
                                  <input style={S.inp} list="cidades-list" value={os.localidade || ""}
                                    onChange={e => updateOS(selMil._propId, selMil.id, os.id, "localidade", e.target.value)}
                                    placeholder="Ex: Brasília-DF" />
                                </FG>
                              </div>
                              <div style={S.row}>
                                <FG label="Início" flex>
                                  <input type="date" style={S.inp} value={os.dataInicio || ""}
                                    onChange={e => updateOS(selMil._propId, selMil.id, os.id, "dataInicio", e.target.value)} />
                                </FG>
                                <FG label="Término" flex>
                                  <input type="date" style={S.inp} value={os.dataFim || ""}
                                    onChange={e => updateOS(selMil._propId, selMil.id, os.id, "dataFim", e.target.value)} />
                                </FG>
                              </div>

                              {/* Pernoites em Trânsito */}
                              <div style={{ background: "rgba(56,189,248,0.05)", border: "1px solid rgba(56,189,248,0.18)", borderRadius: 10, padding: "12px 14px" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: pernoites.length > 0 ? 10 : 0 }}>
                                  <span style={{ fontSize: 11, fontWeight: 700, color: "#38bdf8", textTransform: "uppercase", letterSpacing: ".05em" }}>🌙 Pernoites em Trânsito</span>
                                  <button style={{ ...S.btnPri, padding: "5px 12px", fontSize: 11 }} onClick={addPernoite}>{I.plus} Adicionar</button>
                                </div>
                                {pernoites.length === 0 ? (
                                  <p style={{ fontSize: 12, color: "#475569", margin: "8px 0 0" }}>Nenhum pernoite registrado. Use "Adicionar" para registrar cidades intermediárias.</p>
                                ) : (
                                  <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 4 }}>
                                    {pernoites.map((p, pi) => {
                                      const dp = diffDays(p.dataInicio, p.dataFim);
                                      const diasP = dp > 0 ? dp - 0.5 : 0;
                                      const vPernoite = p.localidade && diasP > 0 ? getValorDiaria(postoNaData, p.localidade) * diasP : 0;
                                      return (
                                        <div key={p.id} style={{ background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "10px 12px", display: "flex", flexDirection: "column", gap: 8 }}>
                                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                            <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, minWidth: 22 }}>{pi+1}</span>
                                            <input list="cidades-list" style={{ ...S.inp, flex: 1 }} value={p.localidade || ""} onChange={e => updatePernoite(p.id, "localidade", e.target.value)} placeholder="Cidade do pernoite" />
                                            {vPernoite > 0 && <span style={{ fontSize: 11, color: "#38bdf8", fontWeight: 700, whiteSpace: "nowrap" }}>{fmtMoney(vPernoite)}</span>}
                                            <button style={{ ...S.actBtn, color: "#ef4444", padding: 3 }} onClick={() => removePernoite(p.id)}>{I.x}</button>
                                          </div>
                                          <div style={{ display: "flex", gap: 8, paddingLeft: 30 }}>
                                            <FG label="Chegada" flex>
                                              <input type="date" style={S.inp} value={p.dataInicio || ""} onChange={e => updatePernoite(p.id, "dataInicio", e.target.value)} />
                                            </FG>
                                            <FG label="Saída" flex>
                                              <input type="date" style={S.inp} value={p.dataFim || ""} onChange={e => updatePernoite(p.id, "dataFim", e.target.value)} />
                                            </FG>
                                            {diasP > 0 && <div style={{ display:"flex", alignItems:"flex-end", paddingBottom:6 }}><span style={{ fontSize: 11, color: "#64748b" }}>{diasP} diária{diasP !== 1 ? "s" : ""}</span></div>}
                                          </div>
                                        </div>
                                      );
                                    })}
                                    {subtotalTransito > 0 && (
                                      <div style={{ fontSize: 11, color: "#38bdf8", fontWeight: 700, textAlign: "right", paddingRight: 4 }}>
                                        Total trânsito: {fmtMoney(subtotalTransito)}
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>

                              {/* Detalhamento de diárias da OS */}
                              {diasOS > 0 && (
                                <div style={{ padding: "10px 14px", background: "rgba(59,130,246,0.06)", border: "1px solid rgba(59,130,246,0.15)", borderRadius: 8,
                                  display: "flex", gap: 18, flexWrap: "wrap", alignItems: "center" }}>
                                  <span style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em" }}>💰 Diárias</span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Grupo: <strong style={{ color: "#7dd3fc" }}>{grupo}</strong></span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Localidade: <strong style={{ color: "#7dd3fc" }}>{colLabel}</strong></span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Dias: <strong style={{ color: "#f1f5f9" }}>{diasOS}</strong></span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Valor/dia: <strong style={{ color: "#f1f5f9" }}>{fmtMoney(valorUnit)}</strong></span>
                                  <span style={{ fontSize: 11, color: "#94a3b8" }}>× {diasOS - 0.5} = <strong style={{ color: "#f1f5f9" }}>{fmtMoney(subtotalPrincipal)}</strong></span>
                                  {subtotalTransito > 0 && <span style={{ fontSize: 11, color: "#fb923c" }}>+ trânsito: <strong>{fmtMoney(subtotalTransito)}</strong></span>}
                                  <span style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b" }}>= {fmtMoney(subtotal)}</span>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ ...S.card, ...S.empty }}>
                  <p style={{ margin: 0, fontSize: 13, color: "#64748b" }}>Selecione um militar na lista ao lado.</p>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════ */
    function App() {
      const [data, setData] = useState({ militares: [], propostas: [], oficios: [], settings: {}, missoesDb: [], cidadesDb: [], efetivoDb: [] });
      const [loaded, setLoaded] = useState(false);
      const [tab, setTab] = useState("dashboard");
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      // Garante que o save só ocorre após dados terem sido carregados com sucesso do Firestore
      const safeToSave = React.useRef(false);
      const [saveStatus, setSaveStatus] = useState("idle"); // "idle" | "saving" | "ok" | "error" | "no-auth"
      const saveTimer = React.useRef(null);
      const [showSettings, setShowSettings] = useState(false);
      const [showArchive, setShowArchive] = useState(false);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        (async () => {
          try {
            const [r, rAssets] = await Promise.all([
              window.storage.get(STORAGE_KEY),
              window.storage.get(STORAGE_KEY + "-assets"),
            ]);
            // r === null significa ERRO de rede/Firestore — NÃO libera o save
            // r.exists === false significa documento inexistente (novo usuário) — libera
            // r.exists === true significa dados carregados — carrega e libera
            if (r === null) {
              console.warn("⚠️ Falha ao carregar dados do Firestore — saves bloqueados para proteger dados.");
              setLoaded(true);
              return; // safeToSave permanece false — nenhum save vai ocorrer
            }
            let loaded = {};
            if (r.value) loaded = JSON.parse(r.value);
            if (rAssets?.value) {
              const assets = JSON.parse(rAssets.value);
              loaded = { ...loaded, settings: { ...(loaded.settings || {}), ...assets } };
            }
            if (Object.keys(loaded).length > 0) setData(d => ({ ...d, ...loaded }));
            safeToSave.current = true; // libera só após Firestore confirmar estado
          } catch (e) { console.log("Erro ao inicializar dados:", e); }
          setLoaded(true);
        })();
      }, []);

      useEffect(() => {
        if (!loaded || !safeToSave.current) return;
        if (!user) { setSaveStatus("no-auth"); return; }
        setSaveStatus("saving");
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(async () => {
          try {
            // Separa logo e efetivoDb (dados grandes) em documento próprio
            const { settings = {}, ...rest } = data;
            const { logo, ...settingsSemLogo } = settings;
            const mainData = { ...rest, settings: settingsSemLogo };
            const assetsData = logo ? { logo } : {};
            // Salva no Firestore
            await Promise.all([
              window.storage.set(STORAGE_KEY, JSON.stringify(mainData)),
              Object.keys(assetsData).length > 0
                ? window.storage.set(STORAGE_KEY + "-assets", JSON.stringify(assetsData))
                : Promise.resolve(),
            ]);
            // Backup local para emergência
            try { localStorage.setItem(STORAGE_KEY + "-backup", JSON.stringify(mainData)); } catch(_) {}
            setSaveStatus("ok");
            if (saveTimer.current) clearTimeout(saveTimer.current);
            saveTimer.current = setTimeout(() => setSaveStatus("idle"), 3000);
          } catch (e) {
            console.error("Erro ao salvar:", e);
            setSaveStatus("error");
          }
        }, 800); // debounce de 800ms para não salvar a cada tecla
      }, [data, loaded, user]);

      const setPropostas = fn => setData(d => ({ ...d, propostas: typeof fn === "function" ? fn(d.propostas) : fn }));

      // ── Arquivamento ──
      const isMilFechado = (mil) => {
        const modDias = (mil.modulos || []).reduce((s, m) => s + diffDays(m.dataInicio, m.dataFim), 0);
        const target  = modDias;
        const cumpr   = calcDiasOS(mil.ordensServico, "Executado");
        const limiar  = (parseFloat(mil.valorAbertura)||0) + (parseFloat(mil.valorFechamento)||0);
        const diarias = (mil.ordensServico||[]).filter(o=>o.status==="Executado").reduce((a,o)=>a+calcSubtotalOS(mil,o),0);
        return (target > 0 && cumpr >= target) || (limiar > 0 && diarias >= limiar);
      };

      const arquivarMilitar = (propId, milId) => {
        setPropostas(prev => prev.map(p => p.id !== propId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : { ...m, arquivado: true })
        }));
      };

      const desarquivarMilitar = (propId, milId) => {
        setPropostas(prev => prev.map(p => p.id !== propId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : { ...m, arquivado: false })
        }));
      };

      const arquivarProposta = (propId) => {
        setPropostas(prev => prev.map(p => p.id !== propId ? p : { ...p, arquivada: true }));
      };

      const desarquivarProposta = (propId) => {
        setPropostas(prev => prev.map(p => p.id !== propId ? p : { ...p, arquivada: false }));
      };

      // Propostas e militares ativos (não arquivados)
      const propostasAtivas = (data.propostas || []).map(p => ({
        ...p,
        militares: (p.militares || []).filter(m => !m.arquivado)
      })).filter(p => !p.arquivada);

      // Tudo arquivado (propostas arquivadas + militares arquivados avulsos)
      const propostasArquivadas = (data.propostas || []).filter(p => p.arquivada);
      const militaresArquivadosAvulsos = (data.propostas || [])
        .filter(p => !p.arquivada)
        .flatMap(p => (p.militares || []).filter(m => m.arquivado).map(m => ({ ...m, _propId: p.id, _propTitulo: p.titulo || "Sem título" })));
      const setOficios = fn => setData(d => ({ ...d, oficios: typeof fn === "function" ? fn(d.oficios || []) : fn }));

      if (authLoading || !loaded) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#0c111b" }}><div style={{ width: 36, height: 36, border: "3px solid #1e293b", borderTop: "3px solid #3b82f6", borderRadius: "50%", animation: "spin .8s linear infinite" }} /></div>;

      const PUBLIC_TABS = ["dashboard", "consulta"];
      const needsAuth = !PUBLIC_TABS.includes(tab);

      return (
        <div style={S.root}>
          <style>{`
            @keyframes spin { to { transform: rotate(360deg) } }
            input:focus, select:focus, textarea:focus { border-color: #10b981 !important; }
            button:hover { opacity: 0.88; }
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: #0f1117; }
            ::-webkit-scrollbar-thumb { background: #1e2a3a; border-radius: 3px; }
          `}</style>

          <datalist id="missoes-list">
            {(data.missoesDb || []).map(m => <option key={m} value={m} />)}
          </datalist>
          <datalist id="cidades-list">
            {(data.cidadesDb || []).map(c => <option key={c} value={c} />)}
          </datalist>
          <datalist id="efetivo-list">
            {(data.efetivoDb || []).map(m => <option key={m.nome} value={m.nome} />)}
          </datalist>

          {showSettings && (
            <Modal open onClose={() => setShowSettings(false)} title="Configurações do Sistema" width={540}>
              <div style={{ padding: "0 28px 28px" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 24, marginTop: 18 }}>
                  
                  <FG label="Logo do Sistema (Sua Imagem)">
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <div style={{...S.logo, width: 60, height: 60, overflow: 'hidden', padding: data.settings?.logo ? 0 : undefined, flexShrink: 0}}>
                        {data.settings?.logo ? <img src={data.settings.logo} alt="Logo" style={{width: '100%', height: '100%', objectFit: 'cover'}} /> : I.shield}
                      </div>
                      <div style={{ flex: 1 }}>
                        <input 
                          type="file" 
                          accept="image/*" 
                          onChange={(e) => {
                            const file = e.target.files[0];
                            if (file) {
                              if (file.size > 1024 * 1024) {
                                alert("A imagem é muito grande! Escolha um arquivo menor que 1MB.");
                                return;
                              }
                              const reader = new FileReader();
                              reader.onload = (event) => {
                                setData(d => ({ ...d, settings: { ...(d.settings || {}), logo: event.target.result } }));
                              };
                              reader.readAsDataURL(file);
                            }
                          }} 
                          style={{ fontSize: 13, color: "#94a3b8", width: "100%", cursor: "pointer" }} 
                        />
                        <div style={{ fontSize: 11, color: "#475569", marginTop: 4 }}>Formatos: JPG, PNG (Máx: 1MB)</div>
                      </div>
                    </div>
                    {data.settings?.logo && (
                      <div style={{ marginTop: 8 }}>
                        <button 
                          onClick={() => setData(d => ({ ...d, settings: { ...(d.settings || {}), logo: null } }))}
                          style={{ ...S.btnGhost, color: "#ef4444", fontSize: 12 }}
                        >
                          {I.trash} Remover Logo Customizada
                        </button>
                      </div>
                    )}
                  </FG>

                  <div style={{ paddingTop: 20, borderTop: "1px solid #1e293b" }}>
                    <FG label="Importar Planilha de Missões e Cidades (CSV)">
                      <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 10px" }}>Suba a planilha de missões para habilitar o preenchimento automático.</p>
                      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <input 
                          type="file" 
                          accept=".csv"
                          onChange={(e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            const reader = new FileReader();
                            reader.onload = (event) => {
                              const text = event.target.result;
                              const lines = text.split('\n');
                              const newMissoes = new Set(data.missoesDb || []);
                              const newCidades = new Set(data.cidadesDb || []);
                              
                              for (let i = 1; i < lines.length; i++) {
                                const line = lines[i].trim();
                                if (!line) continue;
                                const parts = line.split(',');
                                if (parts[0]) {
                                  const missao = parts[0].trim();
                                  if (missao && missao !== 'nan' && missao !== 'null' && missao !== '-') newMissoes.add(missao);
                                }
                                if (parts.length >= 5 && parts[4]) {
                                  const cidade = parts[4].trim();
                                  if (cidade && cidade !== 'nan' && cidade !== 'null' && cidade !== '-') newCidades.add(cidade);
                                }
                              }
                              
                              const updatedMissoes = Array.from(newMissoes).sort();
                              const updatedCidades = Array.from(newCidades).sort();
                              
                              setData(prev => ({
                                ...prev,
                                missoesDb: updatedMissoes,
                                cidadesDb: updatedCidades
                              }));
                              
                              alert(`✅ Importação concluída!\n\nForam extraídas:\n- ${updatedMissoes.length} Missões exclusivas\n- ${updatedCidades.length} Cidades/Localidades exclusivas.\n\nElas já estão salvas na Nuvem para autocompletar!`);
                              e.target.value = null;
                            };
                            reader.readAsText(file);
                          }}
                          style={{ fontSize: 13, color: "#94a3b8", width: "100%", cursor: "pointer" }} 
                        />
                      </div>
                      {data.missoesDb?.length > 0 && (
                        <div style={{ fontSize: 11, color: "#22c55e", marginTop: 8, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
                          {I.check} Banco ativo: {data.missoesDb.length} Missões carregadas.
                        </div>
                      )}
                    </FG>
                  </div>

                  <div style={{ paddingTop: 20, borderTop: "1px solid #1e293b" }}>
                    <FG label="Importar Efetivo & Base Financeira (CSV)">
                      <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 10px" }}>Suba a "Calculadora Ajuda de Custo" para ativar a inteligência financeira do App.</p>
                      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                        <input 
                          type="file" 
                          accept=".csv"
                          onChange={(e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            const reader = new FileReader();
                            reader.onload = (event) => {
                              const text = event.target.result;
                              const lines = text.split('\n');
                              const novoEfetivo = [];
                              
                              const parseLine = (l) => {
                                 let r=[], q=false, v='';
                                 for(let c of l){
                                   if(q){ if(c==='"') q=false; else v+=c; }
                                   else {
                                     if(c==='"') q=true;
                                     else if(c===','||c===';') { r.push(v.trim()); v=''; }
                                     else v+=c;
                                   }
                                 }
                                 r.push(v.trim());
                                 return r;
                              };

                              let idxPosto = 1, idxNome = 2, idxHab = 6, idxDep = 8, idxBase = 12;
                              let foundHeaders = false;

                              for (let i = 0; i < lines.length; i++) {
                                const line = lines[i].trim();
                                if (!line) continue;
                                const cols = parseLine(line);

                                if (!foundHeaders) {
                                  const h = cols.map(c => c.toUpperCase().trim());
                                  if (h.includes('EFETIVO') || h.includes('NOME') || h.includes('SOLDO')) {
                                    const p = h.findIndex(c => c.includes('PT') || c.includes('POSTO') || c.includes('GRAD'));
                                    if(p>=0) idxPosto = p;
                                    const n = h.findIndex(c => c.includes('EFETIVO') || c.includes('NOME'));
                                    if(n>=0) idxNome = n;
                                    const hh = h.findIndex(c => c.includes('HABILITA'));
                                    if(hh>=0) idxHab = hh;
                                    const d = h.findIndex(c => c.includes('DEPENDENTE'));
                                    if(d>=0) idxDep = d;
                                    const b = h.findIndex(c => c.includes('AJUDA DE CUSTO') || c.includes('BASE'));
                                    if(b>=0) idxBase = b;
                                    foundHeaders = true;
                                    continue;
                                  }
                                }

                                if (foundHeaders && cols.length > Math.max(idxNome, idxBase)) {
                                  const posto = cols[idxPosto];
                                  const nome = cols[idxNome];
                                  const dep = cols[idxDep]?.toUpperCase() === 'SIM';
                                  const habRaw = (cols[idxHab] || '').toUpperCase().trim();
                                  let habilitacao = '';
                                  if (habRaw.includes('ALTOS ESTUDOS') && (habRaw.includes('CAT I') || habRaw.includes('CATEGORIA I')) && !habRaw.includes('II')) habilitacao = 'ALTOS ESTUDOS CAT I';
                                  else if (habRaw.includes('ALTOS ESTUDOS') && (habRaw.includes('CAT II') || habRaw.includes('CATEGORIA II'))) habilitacao = 'ALTOS ESTUDOS CAT II';
                                  else if (habRaw.includes('APERFEI')) habilitacao = 'APERFEIÇOAMENTO';
                                  else if (habRaw.includes('ESPECIAL')) habilitacao = 'ESPECIALIZAÇÃO';
                                  else if (habRaw.includes('FORMA')) habilitacao = 'FORMAÇÃO';
                                  let baseStr = cols[idxBase] || '';
                                  baseStr = baseStr.replace(/R\$\s?/g, '').replace(/\./g, '').replace(',', '.');
                                  const baseNum = parseFloat(baseStr);
                                  if (nome && baseNum > 0 && nome !== 'NOME' && nome !== 'EFETIVO') {
                                    novoEfetivo.push({ nome, posto, dep, base: baseNum, habilitacao });
                                  }
                                }
                              }
                              
                              setData(prev => ({ ...prev, efetivoDb: novoEfetivo }));
                              alert(`✅ Mágica Concluída!\n\nForam extraídos ${novoEfetivo.length} militares e suas bases financeiras!\n\nAgora, ao criar uma proposta e digitar o nome, a calculadora inteligente será ativada.`);
                              e.target.value = null; 
                            };
                            reader.readAsText(file);
                          }}
                          style={{ fontSize: 13, color: "#94a3b8", width: "100%", cursor: "pointer" }} 
                        />
                      </div>
                      {data.efetivoDb?.length > 0 && (
                        <div style={{ fontSize: 11, color: "#22c55e", marginTop: 8, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
                          {I.check} Motor Inteligente Ativo: {data.efetivoDb.length} militares em banco.
                        </div>
                      )}
                    </FG>
                  </div>

                </div>
                  {/* ── Assinaturas do PDF ── */}
                  <div style={{ paddingTop: 20, borderTop: "1px solid #1e293b" }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
                      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6-6m-3 9H6a2 2 0 01-2-2v-3m0 0l9-9"/></svg>
                      Assinaturas do PDF Oficial
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
                      <div style={{ background: "rgba(59,130,246,0.06)", border: "1px solid rgba(59,130,246,0.15)", borderRadius: 10, padding: 16 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12 }}>Comandante do 1º GDAAE</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                          <FG label="Nome completo + Posto (ex: DAHER DOS SANTOS PATO JUNIOR Ten Cel Inf)">
                            <input style={S.inp} value={data.settings?.cmd1GdaaeNome || "DAHER DOS SANTOS PATO JUNIOR Ten Cel Inf"}
                              onChange={e => setData(d => ({ ...d, settings: { ...(d.settings||{}), cmd1GdaaeNome: e.target.value }}))}
                              placeholder="DAHER DOS SANTOS PATO JUNIOR Ten Cel Inf" />
                          </FG>
                          <FG label="Nome de guerra (será destacado em negrito no PDF)">
                            <input style={S.inp} value={data.settings?.cmd1GdaaeGuerra || "DAHER"}
                              onChange={e => setData(d => ({ ...d, settings: { ...(d.settings||{}), cmd1GdaaeGuerra: e.target.value }}))}
                              placeholder="DAHER" />
                          </FG>
                        </div>
                      </div>
                      <div style={{ background: "rgba(139,92,246,0.06)", border: "1px solid rgba(139,92,246,0.15)", borderRadius: 10, padding: 16 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#8b5cf6", textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12 }}>Comandante do Grupo de Serviços de Base</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                          <FG label="Nome completo + Posto (ex: TARCISIO PAVAN DORNELLES Ten Cel Av)">
                            <input style={S.inp} value={data.settings?.cmdGsbNome || "TARCISIO PAVAN DORNELLES Ten Cel Av"}
                              onChange={e => setData(d => ({ ...d, settings: { ...(d.settings||{}), cmdGsbNome: e.target.value }}))}
                              placeholder="TARCISIO PAVAN DORNELLES Ten Cel Av" />
                          </FG>
                          <FG label="Nome de guerra (será destacado em negrito no PDF)">
                            <input style={S.inp} value={data.settings?.cmdGsbGuerra || "DORNELLES"}
                              onChange={e => setData(d => ({ ...d, settings: { ...(d.settings||{}), cmdGsbGuerra: e.target.value }}))}
                              placeholder="DORNELLES" />
                          </FG>
                        </div>
                      </div>
                    </div>
                  </div>

                <div style={S.fActions}>
                  {/* ── Backup ── */}
                  <div style={{ paddingTop: 20, borderTop: "1px solid #1e293b" }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}>
                      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 8l-3-3m3 3l3-3"/></svg>
                      Backup dos Dados
                    </div>
                    <p style={{ fontSize: 12, color: "#475569", margin: "0 0 14px" }}>Exporte um arquivo JSON com todos os seus dados. Guarde em local seguro — use para restaurar em caso de perda.</p>
                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                      <button
                        style={{ ...S.btnPri, background: "linear-gradient(135deg,#0369a1,#0ea5e9)", boxShadow: "0 2px 12px rgba(14,165,233,0.3)", fontSize: 13 }}
                        onClick={() => {
                          const { settings = {}, ...rest } = data;
                          const { logo, ...settingsSemLogo } = settings;
                          const exportData = { ...rest, settings: settingsSemLogo, _exportedAt: new Date().toISOString() };
                          const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
                          const url = URL.createObjectURL(blob);
                          const a = document.createElement("a");
                          a.href = url;
                          a.download = `backup-1gdaae-${new Date().toISOString().split("T")[0]}.json`;
                          a.click();
                          URL.revokeObjectURL(url);
                        }}
                      >
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V4m0 8l-3-3m3 3l3-3"/></svg>
                        <span>Exportar Backup</span>
                      </button>
                      <label style={{ ...S.btnSec, fontSize: 13, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6 }}>
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 4v8m0-8l-3 3m3-3l3 3"/></svg>
                        <span>Importar Backup</span>
                        <input
                          type="file"
                          accept=".json"
                          style={{ display: "none" }}
                          onChange={(e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                              try {
                                const parsed = JSON.parse(ev.target.result);
                                if (!parsed.propostas && !parsed.oficios) {
                                  alert("❌ Arquivo inválido. Selecione um backup exportado por este sistema.");
                                  return;
                                }
                                if (!window.confirm(`Restaurar backup de ${parsed._exportedAt ? new Date(parsed._exportedAt).toLocaleString("pt-BR") : "data desconhecida"}?\n\nIsso vai substituir TODOS os dados atuais. Confirma?`)) return;
                                const { _exportedAt, ...restored } = parsed;
                                setData(d => ({ ...d, ...restored }));
                                alert("✅ Backup restaurado com sucesso!");
                              } catch {
                                alert("❌ Erro ao ler o arquivo. Verifique se é um JSON válido.");
                              }
                            };
                            reader.readAsText(file);
                            e.target.value = null;
                          }}
                        />
                      </label>
                    </div>
                  </div>

                  <button style={S.btnPri} onClick={() => setShowSettings(false)}>Concluir</button>
                </div>
              </div>
            </Modal>
          )}

                  {/* ── SEÇÃO: Arquivar proposta ativa ── */}
                  <div>
                    <p style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase", letterSpacing: ".05em" }}>
                      Arquivar Proposta Ativa
                    </p>
                    {(data.propostas || []).filter(p => !p.arquivada).length === 0 ? (
                      <p style={{ fontSize: 13, color: "#475569" }}>Nenhuma proposta ativa.</p>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {(data.propostas || []).filter(p => !p.arquivada).map(p => {
                          const mils = p.militares || [];
                          const todosAtivos = mils.filter(m => !m.arquivado);
                          const todosFechados = todosAtivos.length > 0 && todosAtivos.every(m => isMilFechado(m));
                          const qtdFechados = todosAtivos.filter(m => isMilFechado(m)).length;
                          return (
                            <div key={p.id} style={{ background: "#141c2e", border: "1px solid #1e293b", borderRadius: 10, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                              <div>
                                <div style={{ fontSize: 13, fontWeight: 600, color: "#f1f5f9" }}>{p.titulo || "Sem título"}</div>
                                <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>
                                  {qtdFechados}/{todosAtivos.length} militares fechados
                                  {!todosFechados && <span style={{ color: "#ef4444", marginLeft: 6 }}>— nem todos fecharam</span>}
                                </div>
                              </div>
                              <button
                                disabled={!todosFechados}
                                onClick={() => { if(window.confirm(`Arquivar proposta "${p.titulo}"? Ela sumirá de todas as abas.`)) arquivarProposta(p.id); }}
                                style={{ ...S.btnSec, fontSize: 12, padding: "6px 12px", display: "flex", alignItems: "center", gap: 6,
                                  opacity: todosFechados ? 1 : 0.35, cursor: todosFechados ? "pointer" : "not-allowed",
                                  borderColor: todosFechados ? "rgba(245,158,11,0.5)" : "#1e293b", color: todosFechados ? "#f59e0b" : "#475569" }}
                                title={todosFechados ? "Arquivar proposta" : "Aguardando todos os militares fecharem"}
                              >
                                {I.archive} Arquivar
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* ── SEÇÃO: Arquivar militar individual ── */}
                  <div>
                    <p style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase", letterSpacing: ".05em" }}>
                      Arquivar Militar Individual
                    </p>
                    {(data.propostas || []).filter(p => !p.arquivada).flatMap(p => (p.militares || []).filter(m => !m.arquivado).map(m => ({ ...m, _propId: p.id, _propTitulo: p.titulo }))).length === 0 ? (

                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {(data.propostas || []).filter(p => !p.arquivada).map(p =>

                            const fechado = isMilFechado(m);
                            return (
                              <div key={m.id} style={{ background: "#141c2e", border: `1px solid ${fechado ? "rgba(34,197,94,0.2)" : "#1e293b"}`, borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>

                                  style={{ ...S.btnSec, fontSize: 11, padding: "5px 10px", display: "flex", alignItems: "center", gap: 5, flexShrink: 0,

                <div>

                { key:"portaria",     label:"Portaria",         icon:I.stamp     },
                { key:"numerario",    label:"Numerário",        icon:I.coin      },
                { key:"os",           label:"Ordens de Serviço",icon:I.clipboard },
                { key:"encerramento", label:"Encerramento",     icon:I.flag      },
              ].map(t => (
                <button key={t.key} className={`nav-btn${tab===t.key?" nav-active":""}`} style={{ ...S.sidebarItem, ...(tab===t.key ? S.sidebarItemActive : {}) }} onClick={() => setTab(t.key)}>
                  {t.icon}<span>{t.label}</span>
                </button>
              ))}
            </nav>

            <div style={S.sidebarFooter}>
              {user ? (
                <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                  <button onClick={() => setShowArchive(true)}  style={{ ...S.sidebarItem, color:"#f59e0b" }}>{I.archive}<span>Arquivo</span></button>
                  <button onClick={() => setShowSettings(true)} style={S.sidebarItem}>{I.settings}<span>Configurações</span></button>
                  <button onClick={() => auth.signOut()}        style={{ ...S.sidebarItem, color:"#ef4444" }}>{I.logout}<span>Sair</span></button>
                </div>
              ) : (
                <button onClick={() => setTab("propostas")} style={{ ...S.btnPri, width:"100%", justifyContent:"center", fontSize:12 }}>Fazer Login</button>
              )}
            </div>
          </aside>

          {/* ── Content area ── */}
          <div style={{ marginLeft:220, flex:1, display:"flex", flexDirection:"column", minWidth:0 }}>

            {/* ── Top bar ── */}
            <header className="no-print" style={S.topbar}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:3, height:22, background:"linear-gradient(180deg,#34d399,#059669)", borderRadius:2, boxShadow:"0 0 8px rgba(16,185,129,0.5)" }}/>
                <h1 style={{ margin:0, fontSize:18, fontWeight:700, color:"#f1f5f9", letterSpacing:"-.02em" }}>
                  {({ dashboard:"Dashboard", consulta:"Consulta de Militares", propostas:"Propostas de Comissionamento", oficios:"Ofícios", pag:"PAG", portaria:"Portaria", numerario:"Numerário", os:"Ordens de Serviço", encerramento:"Encerramento" })[tab]}
                </h1>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                {/* Indicador de salvamento — sempre visível */}
                {saveStatus === "saving" && (
                  <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#94a3b8", background:"rgba(100,116,139,0.1)", border:"1px solid rgba(100,116,139,0.2)", borderRadius:8, padding:"5px 10px" }}>
                    <div style={{ width:9, height:9, border:"2px solid #94a3b8", borderTop:"2px solid transparent", borderRadius:"50%", animation:"spin .8s linear infinite", flexShrink:0 }}/>
                    Salvando...
                  </div>
                )}
                {(saveStatus === "ok" || saveStatus === "idle") && loaded && safeToSave.current && user && (
                  <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#22c55e", background:"rgba(34,197,94,0.07)", border:"1px solid rgba(34,197,94,0.18)", borderRadius:8, padding:"5px 10px" }}>
                    <span style={{ fontSize:13 }}>✓</span> Salvo na nuvem
                  </div>
                )}
                {saveStatus === "error" && (
                  <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#ef4444", background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8, padding:"5px 10px", fontWeight:700 }}>
                    ⚠ Erro ao salvar
                  </div>
                )}
                {(saveStatus === "no-auth" || (!user && loaded)) && (
                  <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#f59e0b", background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.25)", borderRadius:8, padding:"5px 10px", fontWeight:700 }}>
                    ⚠ Sem login
                  </div>
                )}
                {user && (
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:36, height:36, borderRadius:10, background:"linear-gradient(135deg,#059669,#10b981)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:15, fontWeight:800, flexShrink:0 }}>
                      {(user.email||"?").charAt(0).toUpperCase()}
                    </div>
                    <div>
                      <div style={{ fontSize:12, fontWeight:700, color:"#f1f5f9" }}>{(user.email||"").split("@")[0]}</div>
                      <div style={{ fontSize:10, color:"#64748b" }}>Administrador</div>
                    </div>
                  </div>
                )}
              </div>
            </header>

            {needsAuth && !user ? (
              <LoginPage logo={data.settings?.logo} onSuccess={() => {}} />
            ) : (
              <>
                <main style={S.main}>
                  {tab === "dashboard"  && <DashboardTab propostas={propostasAtivas} oficios={data.oficios || []} />}
                  {tab === "consulta"   && <ConsultaTab propostas={propostasAtivas} oficios={data.oficios || []} logo={data.settings?.logo} />}
                  {tab === "propostas"  && <PropostasTab propostas={propostasAtivas} setPropostas={setPropostas} efetivoDb={data.efetivoDb} settings={data.settings} oficios={data.oficios || []} />}
                  {tab === "oficios"    && <OficiosTab oficios={data.oficios || []} setOficios={setOficios} propostas={propostasAtivas} />}
                  {tab === "pag"        && <PagTab propostas={propostasAtivas} setPropostas={setPropostas} />}
                  {tab === "portaria"   && <PortariaTab propostas={propostasAtivas} setPropostas={setPropostas} />}
                  {tab === "numerario"    && <NumerarioTab propostas={propostasAtivas} setPropostas={setPropostas} />}
                  {tab === "os"           && <OSTab propostas={propostasAtivas} setPropostas={setPropostas} oficios={data.oficios || []} />}
                  {tab === "encerramento" && <EncerramentoTab propostas={propostasAtivas} setPropostas={setPropostas} oficios={oficios} />}
                </main>

                <footer className="no-print" style={{ borderTop:"1px solid rgba(255,255,255,0.05)", padding:"12px 28px", textAlign:"center", background:"rgba(0,0,0,0.1)" }}>
                  <span style={{ fontSize:10.5, color:"#2d3d56", fontWeight:600, letterSpacing:".1em", textTransform:"uppercase" }}>
                    Desenvolvido por 3S SGS OSCAR · 1º GDAAE
                  </span>
                </footer>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════
       ENCERRAMENTO TAB
       ═══════════════════════════════════════ */
    function EncerramentoTab({ propostas, setPropostas, oficios }) {
      const [saved, setSaved] = useState(false);
      const [filterPropId, setFilterPropId] = useState("");

      const updateMilEnc = (propostaId, milId, field, value) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id === milId ? { ...m, [field]: value } : m)
        }));
      };

      const handleSave = () => { setSaved(true); setTimeout(() => setSaved(false), 2500); };

      // Mostra militares com OS concluída (dias cumpridos ou economicidade atingida)
      const propostasComPortaria = propostas.map(p => ({
        ...p,
        militares: (p.militares || []).filter(m => {
          const modDias = (m.modulos || []).reduce((s, mod) => s + diffDays(mod.dataInicio, mod.dataFim), 0);
          const cumpDias = calcDiasOS(m.ordensServico, "Executado");
          const valAb = parseFloat(m.valorAbertura) || 0;
          const valFe = parseFloat(m.valorFechamento) || 0;
          const totalDiariasExec = (m.ordensServico || [])
            .filter(os => os.status === "Executado")
            .reduce((acc, os) => acc + calcSubtotalOS(m, os), 0);
          const limiar = valAb + valFe;
          const atingiuEco = limiar > 0 && totalDiariasExec >= limiar;
          return (modDias > 0 && cumpDias >= modDias) || atingiuEco;
        })
      })).filter(p => p.militares.length > 0);

      const allMil = propostasComPortaria.flatMap(p => p.militares);
      const totalApostila = allMil.filter(m => m.portariaApostila).length;
      const totalBoletimApostila = allMil.filter(m => m.boletimApostila).length;
      const totalItemFin = allMil.filter(m => m.itemFinanceiro).length;

      return (
        <div className="no-print">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Encerramento de Comissionamento</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Portaria apostila, planilha de encerramento e item financeiro</p>
            </div>
            <button
              style={{ ...S.btnPri, background: saved ? "linear-gradient(135deg,#16a34a,#22c55e)" : "linear-gradient(135deg,#1d4ed8,#2563eb)", transition: "all .3s" }}
              onClick={handleSave}
            >
              {saved ? I.check : I.file}
              <span>{saved ? "Salvo!" : "Salvar"}</span>
            </button>
          </div>

          {propostasComPortaria.length > 1 && (
            <div style={{ marginBottom: 16 }}>
              <select style={{ ...S.inp, maxWidth: 320 }} value={filterPropId} onChange={e => setFilterPropId(e.target.value)}>
                <option value="">— Todas as Propostas —</option>
                {propostasComPortaria.map(p => <option key={p.id} value={p.id}>{p.titulo || "Sem título"}</option>)}
              </select>
            </div>
          )}

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Militares Elegíveis", value: allMil.length, color: "#6366f1" },
              { label: "Port. Apostila", value: totalApostila, color: "#a78bfa" },
              { label: "Publicado em Bol", value: totalBoletimApostila, color: "#22c55e" },
              { label: "Item Financeiro", value: totalItemFin, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.flag}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {allMil.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.flag}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum militar elegível para encerramento</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Militares aparecerão aqui após concluírem todas as Ordens de Serviço previstas.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 16 }}>
              {propostasComPortaria.filter(p => !filterPropId || p.id === filterPropId).map(prop => {
                const apostOk = prop.militares.filter(m => m.portariaApostila).length;
                const finOk   = prop.militares.filter(m => m.itemFinanceiro).length;
                return (
                  <div key={prop.id} style={S.card}>
                    <div style={{ padding: "14px 22px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(99,102,241,0.04)" }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#818cf8" }}>{prop.titulo || "Proposta sem título"}</span>
                      <div style={{ display: "flex", gap: 8 }}>
                        <span style={{ fontSize: 11, fontWeight: 600, color: "#a78bfa", background: "rgba(167,139,250,0.12)", padding: "3px 8px", borderRadius: 4 }}>Apostila: {apostOk}/{prop.militares.length}</span>
                        <span style={{ fontSize: 11, fontWeight: 600, color: "#f59e0b", background: "rgba(245,158,11,0.12)", padding: "3px 8px", borderRadius: 4 }}>Fin: {finOk}/{prop.militares.length}</span>
                      </div>
                    </div>
                    <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 12 }}>
                      {prop.militares.map(mil => {
                        const encOk = !!mil.portariaApostila;
                        const bolOk = !!mil.boletimApostila;
                        const finOk = !!mil.itemFinanceiro;
                        const etapa = finOk ? "Concluído" : bolOk ? "Aguardando Item Fin." : encOk ? "Aguardando Publicação" : "Pendente";
                        const etapaCor = finOk ? "#22c55e" : bolOk ? "#3b82f6" : encOk ? "#a78bfa" : "#f59e0b";

                        // Detecção de promoção e recálculo da ajuda de custo de encerramento
                        const promocoes = mil.promocoes || [];
                        const ultimaPromocao = promocoes.length > 0
                          ? [...promocoes].filter(p => p.dataPromocao && p.postoNovo).sort((a,b) => a.dataPromocao.localeCompare(b.dataPromocao)).pop()
                          : null;
                        const postoEncerramento = ultimaPromocao ? ultimaPromocao.postoNovo : mil.postoGrad;
                        const houvePomocao = !!ultimaPromocao && postoEncerramento !== mil.postoGrad;
                        const diasMin = parseInt(mil.diasMinimos) || 0;
                        const fechamentoOriginal = parseFloat(mil.valorFechamento) || 0;
                        const novoFechamentoCalc = houvePomocao && diasMin > 0
                          ? calcAjudaCustoCompleto(postoEncerramento, mil.habilitacao || "", mil.temDependente, diasMin).volta
                          : null;
                        const diffFechamento = novoFechamentoCalc ? novoFechamentoCalc - fechamentoOriginal : 0;

                        return (
                          <div key={mil.id} style={{ background: "#0c111b", border: `1px solid ${finOk ? "rgba(34,197,94,0.25)" : encOk ? "rgba(167,139,250,0.25)" : "#1e293b"}`, borderRadius: 12, padding: "14px 16px" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                              <InsigniaFAB postoGrad={postoEncerramento} size={34} />
                              <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 600, color: "#f1f5f9", fontSize: 13 }}>
                                  {houvePomocao
                                    ? <span>{mil.postoGrad} <span style={{ color: "#a78bfa" }}>→ {postoEncerramento}</span> {mil.nomeGuerra}</span>
                                    : <span>{mil.postoGrad} {mil.nomeGuerra}</span>}
                                </div>
                                <div style={{ fontSize: 11, color: "#64748b" }}>{mil.nomeCompleto}</div>
                              </div>
                              <span style={{ fontSize: 11, fontWeight: 700, color: etapaCor, background: etapaCor + "18", padding: "3px 10px", borderRadius: 5 }}>{etapa}</span>
                            </div>

                            {/* Alerta de promoção + impacto na ajuda de custo */}
                            {houvePomocao && novoFechamentoCalc && (
                              <div style={{ marginBottom: 12, padding: "10px 14px", background: "rgba(167,139,250,0.08)", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 8 }}>
                                <div style={{ fontSize: 11, fontWeight: 700, color: "#a78bfa", marginBottom: 6 }}>⬆ Promoção detectada: {mil.postoGrad} → {postoEncerramento}</div>
                                <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
                                  <div>
                                    <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", fontWeight: 600 }}>Fechamento original</div>
                                    <div style={{ fontSize: 14, fontWeight: 700, color: "#94a3b8" }}>{fmtMoney(fechamentoOriginal)}</div>
                                  </div>
                                  <span style={{ color: "#475569", fontSize: 16 }}>→</span>
                                  <div>
                                    <div style={{ fontSize: 10, color: "#22c55e", textTransform: "uppercase", fontWeight: 600 }}>Novo valor calculado ({postoEncerramento})</div>
                                    <div style={{ fontSize: 14, fontWeight: 700, color: "#22c55e" }}>{fmtMoney(novoFechamentoCalc)}</div>
                                  </div>
                                  <div style={{ padding: "4px 10px", background: "rgba(245,158,11,0.12)", borderRadius: 6 }}>
                                    <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", fontWeight: 600 }}>Diferença</div>
                                    <div style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b" }}>+{fmtMoney(diffFechamento)}</div>
                                  </div>
                                  {!mil.valorEncerramentoReal && (
                                    <button style={{ ...S.btnPri, padding: "5px 12px", fontSize: 11 }}
                                      onClick={() => updateMilEnc(prop.id, mil.id, "valorEncerramentoReal", String(novoFechamentoCalc.toFixed(2)))}>
                                      Usar este valor
                                    </button>
                                  )}
                                </div>
                                <div style={{ fontSize: 11, color: "#64748b", marginTop: 6 }}>
                                  Nova proposta de encerramento necessária com o valor atualizado.
                                </div>
                              </div>
                            )}

                            {/* Portaria Apostila */}
                            <FG label="Portaria Apostila">
                              <input style={S.inp} value={mil.portariaApostila || ""}
                                onChange={e => updateMilEnc(prop.id, mil.id, "portariaApostila", e.target.value)}
                                placeholder="PORTARIA BACO Nº XX/1GDAAE_CGEP, DE XX DE JANEIRO DE 20XX (Apostila)" />
                            </FG>

                            {encOk && (
                              <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 10 }}>
                                <div style={S.row}>
                                  <FG label="Boletim de Publicação (Apostila)" flex>
                                    <input style={S.inp} value={mil.boletimApostila || ""}
                                      onChange={e => updateMilEnc(prop.id, mil.id, "boletimApostila", e.target.value)}
                                      placeholder="Bol Int Ost Nº XX, de XX MAR 2026" />
                                  </FG>
                                  <FG label={houvePomocao ? `Valor de Encerramento (${postoEncerramento})` : "Novo Valor de Encerramento (se reajuste)"} flex>
                                    <input style={{ ...S.inp, borderColor: houvePomocao && mil.valorEncerramentoReal ? "rgba(34,197,94,0.4)" : undefined }}
                                      type="number" step="0.01" value={mil.valorEncerramentoReal || ""}
                                      onChange={e => updateMilEnc(prop.id, mil.id, "valorEncerramentoReal", e.target.value)}
                                      placeholder={novoFechamentoCalc ? `Sugerido: ${novoFechamentoCalc.toFixed(2)}` : "Ex: 9011.57 (deixe em branco se não houve reajuste)"} />
                                  </FG>
                                </div>
                                <div style={S.row}>
                                  <FG label="Nº Item Financeiro" flex>
                                    <input style={S.inp} value={mil.itemFinanceiro || ""}
                                      onChange={e => updateMilEnc(prop.id, mil.id, "itemFinanceiro", e.target.value)}
                                      placeholder="Nº do item financeiro para pagamento" />
                                  </FG>
                                  <FG label="Nova Proposta de Encerramento (ref.)" flex>
                                    <input style={S.inp} value={mil.novaPropostaEncerramento || ""}
                                      onChange={e => updateMilEnc(prop.id, mil.id, "novaPropostaEncerramento", e.target.value)}
                                      placeholder="Ex: Proposta Nº 02/1GDAAE/2026" />
                                  </FG>
                                </div>
                                <FG label="Observações do Encerramento">
                                  <textarea style={{ ...S.inp, minHeight: 60, resize: "vertical" }} value={mil.observacoesEncerramento || ""}
                                    onChange={e => updateMilEnc(prop.id, mil.id, "observacoesEncerramento", e.target.value)}
                                    placeholder="Ex: Soldo reajustado em 01/07/2025. Nova planilha comparativa elaborada." />
                                </FG>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ─── Styles ─── */
    const S = {
      root: { fontFamily: "'DM Sans','Segoe UI',system-ui,sans-serif", background: "#0a0e1a", minHeight: "100vh", color: "#e2e8f0", display:"flex", flexDirection:"row" },

      // ── Sidebar ──
      sidebar: { width: 220, background: "linear-gradient(180deg,#111827 0%,#0d1421 100%)", borderRight: "1px solid rgba(255,255,255,0.06)", display: "flex", flexDirection: "column", position: "fixed", top: 0, bottom: 0, left: 0, zIndex: 50, overflowY: "auto" },
      sidebarLogo: { padding: "20px 16px 18px", borderBottom: "1px solid rgba(255,255,255,0.05)", flexShrink: 0 },
      sidebarNav: { flex: 1, padding: "6px 8px", overflowY: "auto" },
      sidebarItem: { display: "flex", alignItems: "center", gap: 9, padding: "9px 10px 9px 10px", borderRadius: 10, border: "none", background: "transparent", color: "#64748b", fontSize: 13, fontWeight: 500, cursor: "pointer", width: "100%", textAlign: "left", transition: "all .15s", whiteSpace: "nowrap", marginBottom: 1 },
      sidebarItemActive: { background: "rgba(16,185,129,0.1)", color: "#10b981", fontWeight: 700 },
      sidebarFooter: { padding: "10px", borderTop: "1px solid rgba(255,255,255,0.05)", flexShrink: 0 },

      // ── Topbar ──
      topbar: { background: "rgba(13,20,33,0.85)", borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "0 28px", height: 58, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, position: "sticky", top: 0, zIndex: 40, backdropFilter: "blur(20px) saturate(1.5)" },

      // ── Legacy compat ──
      header: { background: "#141824", borderBottom: "1px solid #1a2235", padding: "0 24px", position: "sticky", top: 0, zIndex: 40 },
      hInner: { maxWidth: 1300, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 0", flexWrap: "wrap", gap: 12 },
      tabs: { display: "flex", gap: 4, background: "#0f1117", borderRadius: 12, padding: 4, flexWrap: "wrap" },
      tab: { display: "flex", alignItems: "center", gap: 7, padding: "8px 16px", borderRadius: 10, background: "transparent", border: "none", color: "#64748b", fontSize: 13, fontWeight: 500, cursor: "pointer", transition: "all .2s", whiteSpace: "nowrap" },
      tabActive: { background: "#1a2235", color: "#f1f5f9", fontWeight: 600 },

      logo: { width: 44, height: 44, borderRadius: 12, background: "linear-gradient(145deg,#047857,#10b981)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", boxShadow: "0 0 0 1px rgba(16,185,129,0.3), 0 0 24px rgba(16,185,129,0.25)" },
      main: { padding: "24px 28px 48px" },

      statsGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(200px,1fr))", gap: 14, marginBottom: 22 },
      statCard: { background: "linear-gradient(145deg,#141e2e,#1a2438)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: "18px 20px", display: "flex", alignItems: "center", gap: 14, boxShadow: "0 4px 16px rgba(0,0,0,0.25)" },
      statIcon: { width: 44, height: 44, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 },
      statVal: { fontSize: 24, fontWeight: 800, color: "#f8fafc", lineHeight: 1, letterSpacing: "-.03em" },
      statLbl: { fontSize: 11, color: "#64748b", marginTop: 3, fontWeight: 500 },
