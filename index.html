            .replace(/```json/gi, "").replace(/```/g, "")
            .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, "") // chars de controle inválidos em JSON
            .trim();

          // Extração balanceada de chaves — ignora conteúdo antes/depois do JSON
          function extractBalancedJSON(text) {
            const s = text.indexOf("{");
            if (s === -1) return null;
            let depth = 0, inStr = false, esc = false;
            for (let i = s; i < text.length; i++) {
              const c = text[i];
              if (esc) { esc = false; continue; }
              if (c === "\\" && inStr) { esc = true; continue; }
              if (c === '"') { inStr = !inStr; continue; }
              if (inStr) continue;
              if (c === "{") depth++;
              else if (c === "}") { depth--; if (depth === 0) return text.substring(s, i + 1); }
            }
            return null; // JSON incompleto
          }

          console.log("[RobôPDF] Resposta bruta da IA:", jsonText.substring(0, 300), "...");
          const jsonStr = extractBalancedJSON(jsonText);
          if (!jsonStr) {
            console.error("[RobôPDF] Resposta completa:", jsonText);
            throw new Error("Resposta da IA foi cortada (JSON incompleto). A proposta pode ter muitos militares. Tente novamente.");
          }

          let propostaExtraida;
          try {
            propostaExtraida = JSON.parse(jsonStr);
          } catch (parseErr) {
            // Tenta corrigir vírgulas duplas/faltando e re-parsear
            const cleaned = jsonStr
              .replace(/,(\s*[}\]])/g, "$1")   // vírgulas antes de fechar
              .replace(/([}\]])\s*([{[])/g, "$1,$2"); // faltou vírgula entre elementos
            propostaExtraida = JSON.parse(cleaned); // se ainda falhar, lança erro real
          }

          // Aplica filtro de nomes no cliente (mais confiável do que pedir pra IA filtrar)
          let militaresFiltrados = propostaExtraida.militares || [];
          if (filtro) {
            const termos = filtro.split(/[,\s]+/).map(t => t.trim().toUpperCase()).filter(Boolean);
            militaresFiltrados = militaresFiltrados.filter(m => {
              const nomeFull = ((m.nomeCompleto || "") + " " + (m.nomeGuerra || "")).toUpperCase();
              return termos.some(t => nomeFull.includes(t));
            });
          }

          const final = {
            id: uid(),
            numero: propostaExtraida.numero || "",
            titulo: propostaExtraida.titulo || "Proposta de Comissionamento",
            subtitulo: propostaExtraida.subtitulo || "",
            dataCriacao: new Date().toISOString().split("T")[0],
            militares: militaresFiltrados.sort((a, b) => (a.prioridade || 99) - (b.prioridade || 99)).map(m => {
              const posto = normalizePosto(m.postoGrad || "S2");
              const dep = !!m.temDependente;
              // Busca habilitação no efetivoDb (CSV carregado) por nome de guerra ou nome completo
              const nomeGuerraNorm = (m.nomeGuerra || "").toUpperCase().trim();
              const nomeCompNorm = (m.nomeCompleto || "").toUpperCase().trim();
              const efEntry = (efetivoDb || []).find(e => {
                const en = e.nome.toUpperCase().trim();
                return en === nomeGuerraNorm || en === nomeCompNorm || nomeCompNorm.includes(en) || nomeGuerraNorm.includes(en);
              });
              const habFromDb = efEntry?.habilitacao || "";
              // Fallback: detectar pela fórmula reversa se o efetivoDb não tiver
              const habFromPdf = m.habilitacao || "";
              const habFinal = habFromPdf || habFromDb || detectHabilitacaoFromAjuda(posto, dep, m.valorAbertura, m.valorFechamento);
              return {
              id: uid(),
              postoGrad: posto,
              nomeCompleto: m.nomeCompleto || "",
              nomeGuerra: m.nomeGuerra || "",
              saram: String(m.saram || ""),
              identidade: m.identidade || "",
              temDependente: dep,
              habilitacao: habFinal,
              diasMinimos: String(m.diasMinimos || ""),
              valorAbertura: String(m.valorAbertura || ""),
              valorFechamento: String(m.valorFechamento || ""),
              valorDiarias: String(m.valorDiarias || ""),
              modulos: (m.modulos || []).map(mod => ({
                id: uid(),
                tipo: mod.tipo || "Missão",
                descricao: mod.descricao || "",
                localidade: mod.localidade || "",
                omAdido: mod.omAdido || "",
                dataInicio: mod.dataInicio || "",
                dataFim: mod.dataFim || "",
              })),
            }; }),
            arquivada: false,
            createdAt: new Date().toISOString()
          };

          setStatusMsg("🎉 Sucesso! Proposta importada. ⚠️ Confira os Nomes de Guerra — o PDF não preserva negrito, então alguns podem precisar de correção manual.");
          setLoading(false);
          onDataExtracted(final);

        } catch (err) {
          console.error("Erro na IA:", err);
          setStatusMsg("❌ Falha na Etapa 3: " + err.message);
          setLoading(false);
        }
      };

      return (
        <div style={{ padding: "30px 28px" }}>
          <div style={{ border: "3px dashed #2563eb", borderRadius: 16, padding: 40, textAlign: "center", background: "rgba(37,99,235,0.08)" }}>
            <div style={{ fontSize: 48, marginBottom: 12, color: "#2563eb" }}>🧠</div>
            <h3 style={{ margin: 0, color: "#f1f5f9", fontSize: 18 }}>Leitor Inteligente (Claude AI)</h3>
            <div style={{

            }}>

            </div>
            {!loading && (

                <label style={{ fontSize: 11, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: ".07em", display: "block", marginBottom: 6 }}>

                </p>

            <label style={{ ...S.btnPri, cursor: loading ? "not-allowed" : "pointer", opacity: loading ? 0.6 : 1, display: "inline-flex", padding: "14px 40px", fontSize: 16 }}>

            </label>
            {!loading && (

                Suporta múltiplos militares e múltiplos módulos por militar.
              </p>
            )}
          </div>
        </div>
      );
    }

    const diasMin = calcDiasMinimos(postoGrad, habilitacao || "", temDependente);

    };
  };

    setProp(p => ({
      ...p,
      militares: p.militares.map(m => {
        if (m.id !== milId) return m;
        const recalcFields = ['postoGrad', 'temDependente', 'habilitacao'];
        return recalcFields.includes(field) ? recalcMil(m, { [field]: value }) : { ...m, [field]: value };

    setProp(p => ({
      ...p,

                          {promocoes.map((pr) => {
                            // Posto anterior: o último posto antes desta promoção (ou o posto inicial do militar)
                            const postoAnterior = mil.postoGradInicial || mil.postoGrad;
                            const postoNovo = pr.postoNovo || mil.postoGrad;
                            // Impacto nas diárias (exemplo: Brasília)
                            const dAntes = getValorDiaria(postoAnterior, "Brasília-DF");
                            const dDepois = getValorDiaria(postoNovo, "Brasília-DF");
                            const mudouGrupo = getGrupoDiaria(postoAnterior) !== getGrupoDiaria(postoNovo);
                            return (
                              <div key={pr.id} style={{ background: "rgba(0,0,0,0.2)", borderRadius: 8, padding: "10px 12px", display: "flex", flexDirection: "column", gap: 8 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, whiteSpace: "nowrap" }}>Novo posto:</span>
                                  <select style={{ ...S.inp, flex: 1 }} value={postoNovo} onChange={e => updatePromocao(pr.id, "postoNovo", e.target.value)}>
                                    {POSTOS.map(p => <option key={p}>{p}</option>)}
                                  </select>
                                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 700, whiteSpace: "nowrap" }}>Data:</span>
                                  <input type="date" style={{ ...S.inp, flex: 1 }} value={pr.dataPromocao || ""} onChange={e => updatePromocao(pr.id, "dataPromocao", e.target.value)} />
                                  <button style={{ ...S.actBtn, color: "#ef4444", padding: 3 }} onClick={() => removePromocao(pr.id)}>{I.x}</button>
                                </div>
                                {mudouGrupo && (
                                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap", padding: "6px 10px", background: "rgba(167,139,250,0.08)", borderRadius: 6, alignItems: "center" }}>
                                    <span style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textTransform: "uppercase" }}>Impacto nas diárias (BSB):</span>
                                    <span style={{ fontSize: 12, color: "#94a3b8" }}>{postoAnterior} <strong style={{ color: "#ef4444" }}>{fmtMoney(dAntes)}/dia</strong></span>
                                    <span style={{ fontSize: 11, color: "#475569" }}>→</span>
                                    <span style={{ fontSize: 12, color: "#94a3b8" }}>{postoNovo} <strong style={{ color: "#22c55e" }}>{fmtMoney(dDepois)}/dia</strong></span>
                                    <span style={{ fontSize: 11, fontWeight: 700, color: "#f59e0b" }}>(+{fmtMoney(dDepois - dAntes)}/dia)</span>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                          <p style={{ fontSize: 11, color: "#a78bfa", margin: "4px 0 0" }}>💡 OS emitidas a partir da data de promoção usarão automaticamente o novo posto para cálculo de diárias.</p>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })()}

              {/* RESUMO E CALCULADORA (mantido igual ao original) */}
              {/* ... (todo o bloco de resumo com diárias, ajuda de custo, totais, etc.) ... */}

            </div>
          </div>
        );
      })}

      <button style={{ ...S.btnSec, width: "100%", padding: 14, marginBottom: 20, borderStyle: "dashed", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }} onClick={addMilitar}>
        {I.plus} Adicionar Militar à Proposta
      </button>

      {/* SUMÁRIO GERAL */}
      {prop.militares.length > 0 && (
        <div style={{ ...S.card, marginBottom: 20, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", borderBottom: "1px solid #1e293b", background: "rgba(34,197,94,0.05)", display: "flex", alignItems: "center", gap: 8 }}>
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#22c55e" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <h3 style={{ margin: 0, fontSize: 13, fontWeight: 700, color: "#22c55e" }}>Resumo Financeiro da Proposta</h3>
          </div>
          {/* Por militar */}
          <div style={{ padding: "12px 20px", borderBottom: "1px solid #0f172a" }}>
            <div style={{ fontSize: 10, color: "#475569", fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 10 }}>Por Militar</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {prop.militares.map(m => {
                const ab = parseFloat(m.valorAbertura) || 0;
                const fe = parseFloat(m.valorFechamento) || 0;
                const di = calcTotalDiarias(m.postoGrad, m.modulos || []);
                const total = ab + fe;
                return (
                  <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#0c111b", borderRadius: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#94a3b8", minWidth: 140 }}>{m.postoGrad} {m.nomeGuerra || "—"}</span>
                    <div style={{ display: "flex", gap: 14, flexWrap: "wrap", flex: 1 }}>
                      {[{l:"Abertura",v:ab,c:"#3b82f6"},{l:"Fechamento",v:fe,c:"#8b5cf6"},{l:"Diárias",v:di,c:"#f59e0b"},{l:"Total (Ab+Fe)",v:total,c:"#22c55e"}].map((x,i)=>(
                        <div key={i}>
                          <div style={{ fontSize: 9, color: "#475569", fontWeight: 600, textTransform: "uppercase" }}>{x.l}</div>
                          <div style={{ fontSize: 13, fontWeight: 800, color: x.c }}>{fmtMoney(x.v)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {/* Totais gerais */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)" }}>
            {[
              { l: "Σ Abertura", v: totais.totalAbertura, c: "#3b82f6" },
              { l: "Σ Fechamento", v: totais.totalFechamento, c: "#8b5cf6" },
              { l: "Σ Diárias", v: prop.militares.reduce((s,m) => s + calcTotalDiarias(m.postoGrad, m.modulos||[]), 0), c: "#f59e0b" },
              { l: "Σ Geral (Ab+Fe)", v: totais.totalAbertura + totais.totalFechamento, c: "#22c55e" },
            ].map((x, i) => (
              <div key={i} style={{ padding: "16px 20px", borderRight: i < 3 ? "1px solid #1e293b" : "none" }}>
                <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 4 }}>{x.l}</div>
                <div style={{ fontSize: 20, fontWeight: 900, color: x.c }}>{fmtMoney(x.v)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ ...S.fActions, marginBottom: 40 }}>
        <button style={S.btnSec} onClick={onCancel}>Cancelar</button>
        <button style={S.btnPri} onClick={() => onSave(prop)}>Salvar Proposta</button>
      </div>

      {/* MODAL DO ROBÔ */}
      {showRobo && (
        <Modal open onClose={() => setShowRobo(false)} title="Robô Leitor de PDF - Proposta de Comissionamento" width={620}>
          <RoboLeitorPDF
            onDataExtracted={(propostaExtraida) => {
              setProp(propostaExtraida);
              setShowRobo(false);
            }}
            efetivoDb={efetivoDb}
          />
        </Modal>
      )}
    </div>
  );
}

    /* ─── Gerador de PDF Oficial ─── */
    function gerarPDFOficial(proposta, settings) {
      const fmtBR = d => {
        if (!d) return '';
        const [y, m, dd] = d.split('-');
        return `${dd}/${m}/${y}`;
      };
      const fmtR = v => {
        const n = parseFloat(v) || 0;
        return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      };

      const militares = proposta.militares || [];
      let totalAb = 0, totalFe = 0, totalDi = 0;
      militares.forEach(mil => {
        totalAb += parseFloat(mil.valorAbertura) || 0;
        totalFe += parseFloat(mil.valorFechamento) || 0;
        totalDi += parseFloat(mil.valorDiarias) || 0;
      });
      const totalAjuda = totalAb + totalFe;

      let rowsHTML = '';
      militares.forEach((mil, idx) => {
        const mods = (mil.modulos || []).length > 0 ? mil.modulos : [{}];
        const nm   = mods.length;
        const totalDias = parseInt(mil.diasMinimos) || (mil.modulos || []).reduce((s, m) => s + diffDays(m.dataInicio, m.dataFim), 0);
        const valAb  = parseFloat(mil.valorAbertura)  || 0;
        const valFe  = parseFloat(mil.valorFechamento) || 0;
        const valDi  = parseFloat(mil.valorDiarias)    || 0;
        const valTot = valAb + valFe;
        const qtd    = mil.temDependente ? 2 : 1;

        mods.forEach((mod, mi) => {
          const dias    = (mod.dataInicio && mod.dataFim) ? diffDays(mod.dataInicio, mod.dataFim) : '';
          const isFirst = mi === 0;
          rowsHTML += '<tr>';
          if (isFirst) {
            rowsHTML += `<td rowspan="${nm}">${idx + 1}</td>`;
            rowsHTML += `<td rowspan="${nm}">${mil.postoGrad || ''}</td>`;
            rowsHTML += `<td rowspan="${nm}" class="esq">${mil.nomeCompleto || ''}<br><b>${mil.nomeGuerra || ''}</b></td>`;
            rowsHTML += `<td rowspan="${nm}">${mil.temDependente ? 'S' : 'N'}</td>`;
          }
          rowsHTML += `<td>${fmtBR(mod.dataInicio)}</td>`;
          rowsHTML += `<td>${fmtBR(mod.dataFim)}</td>`;
          rowsHTML += `<td>${dias}</td>`;
          if (isFirst) rowsHTML += `<td rowspan="${nm}">${totalDias}</td>`;
          rowsHTML += `<td class="esq">${mod.descricao ? mod.descricao + (mod.localidade ? ' - ' + mod.localidade : '') : ''}</td>`;
          if (isFirst) {
            rowsHTML += `<td rowspan="${nm}">${qtd}</td>`;
            rowsHTML += `<td rowspan="${nm}">${fmtR(valAb)}</td>`;
            rowsHTML += `<td rowspan="${nm}">${fmtR(valFe)}</td>`;
            rowsHTML += `<td rowspan="${nm}">${fmtR(valTot)}</td>`;
            rowsHTML += `<td rowspan="${nm}">${fmtR(valDi)}</td>`;
          }
          rowsHTML += `<td>${mod.omAdido || ''}</td>`;
          rowsHTML += '</tr>';
        });
      });

      // Comandantes com nome de guerra em negrito
      const cmd1Nome    = (settings?.cmd1GdaaeNome    || "DAHER DOS SANTOS PATO JUNIOR Ten Cel Inf").trim();
      const cmd1Guerra  = (settings?.cmd1GdaaeGuerra  || "DAHER").trim();
      const cmdGsbNome  = (settings?.cmdGsbNome       || "TARCISIO PAVAN DORNELLES Ten Cel Av").trim();
      const cmdGsbGuerra= (settings?.cmdGsbGuerra     || "DORNELLES").trim();
      const boldGuerra  = (nome, guerra) => guerra ? nome.replace(new RegExp('\\b' + guerra + '\\b'), '<strong>' + guerra + '</strong>') : nome;

      // Ano do documento
      const ano = proposta.dataCriacao ? proposta.dataCriacao.split("-")[0] : new Date().getFullYear();

      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${proposta.titulo || 'Proposta'}</title>
<style>
  @page { size: A4 landscape; margin: 8mm 10mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 7pt; color: #000; }
  .hdr { text-align: center; margin-bottom: 5px; line-height: 1.5; }
  .hdr .org  { font-size: 8pt; font-weight: bold; }
  .hdr .tit  { font-size: 9pt; font-weight: bold; margin-top: 3px; }
  .hdr .sub  { font-size: 8pt; font-weight: bold; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #000; padding: 2px 3px; font-size: 6.5pt; text-align: center; vertical-align: middle; line-height: 1.2; }
  th { background: #d4d4d4; font-weight: bold; }
  .esq { text-align: left; }
  .tot { font-weight: bold; background: #d4d4d4; }
  .obs { margin-top: 5px; font-size: 7pt; line-height: 1.4; }
  .rodape { margin-top: 14px; font-size: 7.5pt; }
  .assinaturas { display: flex; justify-content: space-around; margin-top: 28px; }
  .ass { text-align: center; width: 38%; }
  .ass .linha { border-top: 1px solid #000; margin-bottom: 3px; }
</style></head><body>
<div class="hdr">
  <div class="org">COMANDO DE PREPARO</div>
  <div class="org">BASE AÉREA DE CANOAS — 1º GDAAE</div>
  <div class="tit">${proposta.titulo || 'PROPOSTA DE COMISSIONAMENTO'}</div>
  ${proposta.subtitulo ? '<div class="sub">' + proposta.subtitulo + '</div>' : ''}
</div>
<table>
  <thead>
    <tr>
      <th rowspan="2">PRIORIDADE</th>
      <th rowspan="2">POSTO/<br>GRAD.</th>
      <th rowspan="2">NOME</th>
      <th rowspan="2">DEP</th>
      <th colspan="2">MÓDULOS</th>
      <th rowspan="2">Nº DE<br>DIAS</th>
      <th rowspan="2">TOTAL<br>DIAS</th>
      <th rowspan="2">MISSÃO E LOCAL DE REALIZAÇÃO DO SV</th>
      <th colspan="4">AJUDA DE CUSTO</th>
      <th rowspan="2">DIÁRIAS</th>
      <th rowspan="2">OM<br>ADIDO</th>
    </tr>
    <tr>
      <th>INÍCIO</th><th>TÉRMINO</th>
      <th>QTD</th><th>INÍCIO</th><th>TÉRMINO</th><th>TOTAL</th>
    </tr>
  </thead>
  <tbody>
    ${rowsHTML}
    <tr class="tot">
      <td colspan="9" style="text-align:right;padding-right:6px;">TOTAL DA PROPOSTA</td>
      <td></td>
      <td>${fmtR(totalAb)}</td>
      <td>${fmtR(totalFe)}</td>
      <td>${fmtR(totalAjuda)}</td>
      <td>${fmtR(totalDi)}</td>
      <td></td>
    </tr>
  </tbody>
</table>
${proposta.observacoes ? '<div class="obs"><strong>Obs.:</strong> ' + proposta.observacoes + '</div>' : ''}
<div class="rodape">
  <p style="margin-bottom:32px;">Canoas, ______ de __________________________ de ${ano}.</p>
  <div class="assinaturas">
    <div class="ass">
      <div class="linha"></div>
      <div>${boldGuerra(cmd1Nome, cmd1Guerra)}</div>
      <div>Comandante do 1º GDAAE</div>
    </div>
    <div class="ass">
      <div class="linha"></div>
      <div>${boldGuerra(cmdGsbNome, cmdGsbGuerra)}</div>
      <div>Comandante do Grupo de Serviços de Base</div>
    </div>
  </div>
</div>
</body></html>`;

      const win = window.open('', '_blank', 'width=1100,height=750');
      win.document.write(html);
      win.document.close();
      setTimeout(function(){ win.print(); }, 700);
    }

    /* ─── Proposta Viewer ─── */
    function PropostaViewer({ proposta, settings, onBack, onEdit }) {
      const totais = calcTotaisProposta(proposta);
      return (
        <div className="no-print">
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
            <button style={{ ...S.actBtn, padding: 8 }} onClick={onBack}>{I.back}</button>
            <div style={{ flex: 1 }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>{proposta.titulo || "Proposta sem título"}</h2>
              <p style={{ margin: "2px 0 0", fontSize: 12, color: "#64748b" }}>Criada em {fmtDate(proposta.dataCriacao)} · {proposta.militares.length} militar{proposta.militares.length !== 1 ? "es" : ""}</p>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button style={{...S.btnSec, padding:'8px 14px', fontSize:12, display:'flex', alignItems:'center', gap:6, borderColor:'rgba(34,197,94,0.4)', color:'#22c55e'}}
                onClick={() => gerarPDFOficial(proposta, settings)}>
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h4a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                </svg>
                Gerar PDF Oficial
              </button>
              <button style={S.btnPri} onClick={() => onEdit(proposta)}>{I.edit}<span>Editar</span></button>
            </div>
          </div>

          {(proposta.militares || []).map((mil, idx) => {
            const totalDias = (mil.modulos || []).reduce((s, mod) => s + diffDays(mod.dataInicio, mod.dataFim), 0);
            const ajudas = calcAjudas(mil.temDependente, totalDias);
            const valAb = parseFloat(mil.valorAbertura) || 0;
            const valFe = parseFloat(mil.valorFechamento) || 0;

            const targetDias = parseInt(mil.diasMinimos) || totalDias;
            const diasCumpridos = calcDiasOS(mil.ordensServico, "Executado");
            const _limPag = valAb + valFe;
            const _execPag = (mil.ordensServico||[]).filter(o=>o.status==="Executado").reduce((a,o)=>a+calcSubtotalOS(mil,o),0);
            const isFechado = (targetDias > 0 && diasCumpridos >= targetDias) || (_limPag > 0 && _execPag >= _limPag);

            return (
              <div key={mil.id} style={{ ...S.card, marginBottom: 16 }}>
                <div style={{ padding: "16px 22px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <InsigniaFAB postoGrad={mil.postoGrad} size={34} />
                    <div>
                      <div style={{ fontWeight: 700, color: "#f1f5f9", fontSize: 14 }}>{mil.postoGrad} {mil.nomeGuerra}</div>
                      <div style={{ fontSize: 12, color: "#64748b" }}>{mil.nomeCompleto}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: "#94a3b8" }}>Idt: <strong style={{ color: "#f1f5f9" }}>{mil.identidade || "—"}</strong></span>
                    <span style={{ fontSize: 12, color: "#94a3b8" }}>SARAM: <strong style={{ color: "#f1f5f9" }}>{mil.saram || "—"}</strong></span>
                    <span style={{ fontSize: 12, color: "#94a3b8" }}>Meta: <strong style={{ color: "#38bdf8" }}>{targetDias}d</strong></span>
                    
                    {isFechado ? (
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "2px 8px", borderRadius: 4, display: "flex", alignItems: "center", gap: 4 }}>
                        {I.check} Fechado
                      </span>
                    ) : (
                      <span style={{ fontSize: 11, fontWeight: 600, color: "#3b82f6", background: "rgba(59,130,246,0.12)", padding: "2px 8px", borderRadius: 4 }}>
                        Em Andamento
                      </span>
                    )}
                  </div>
                </div>
                <div style={{ padding: 22 }}>
                  <span style={{ ...S.lbl, fontSize: 11, marginBottom: 10, display: "block" }}>MÓDULOS E OM ADIDO</span>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                    {(mil.modulos || []).map((mod) => {
                      const dias = diffDays(mod.dataInicio, mod.dataFim);
                      return (
                        <div key={mod.id} style={{ background: "#0c111b", border: "1px solid #1e293b", borderRadius: 10, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                          <div style={{display: 'flex', flexDirection: 'column', gap: 4}}>
                            <span style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0" }}>{mod.tipo}: {mod.descricao || "—"} {mod.localidade ? `(${mod.localidade})` : ""}</span>
                            {mod.omAdido && <span style={{fontSize: 11, color: "#94a3b8"}}>OM Adido: {mod.omAdido}</span>}
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontSize: 12, color: "#94a3b8" }}>{fmtDate(mod.dataInicio)} → {fmtDate(mod.dataFim)}</span>
                            <span style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", background: "rgba(59,130,246,0.12)", padding: "2px 10px", borderRadius: 5 }}>{dias}d</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 14, background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, padding: 18 }}>
                    {[
                      { l: "Total Dias", v: totalDias, c: "#f1f5f9", fmt: false },
                      { l: "Ajudas de Custo", v: ajudas, c: "#f59e0b", fmt: false },
                      { l: "Abertura", v: valAb, c: "#3b82f6", fmt: true },
                      { l: "Fechamento", v: valFe, c: "#8b5cf6", fmt: true },
                      { l: "Diárias", v: parseFloat(mil.valorDiarias) || 0, c: "#f59e0b", fmt: true },
                      { l: "Total (Ab+Fe)", v: valAb + valFe, c: "#22c55e", fmt: true },
                    ].map((x, i) => (
                      <div key={i}>
                        <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em" }}>{x.l}</div>
                        <div style={{ fontSize: 18, fontWeight: 800, color: x.c, marginTop: 2 }}>{x.fmt ? fmtMoney(x.v) : x.v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })}

          {/* TOTAL GERAL */}
          <div style={{ ...S.card, marginBottom: 40, overflow: "hidden" }}>
            <div style={{ padding: "16px 24px", borderBottom: "1px solid #1e293b", background: "rgba(34,197,94,0.05)" }}>
              <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "#22c55e" }}>Somatório Geral</h3>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))" }}>
              {[
                { l: "Σ Abertura", v: totais.totalAbertura, c: "#3b82f6" },
                { l: "Σ Fechamento", v: totais.totalFechamento, c: "#8b5cf6" },
                { l: "Σ Diárias", v: totais.totalDiarias, c: "#f59e0b" },
                { l: "Σ Total Geral (Ab+Fe)", v: totais.totalAbertura + totais.totalFechamento, c: "#22c55e" },
              ].map((x, i) => (
                <div key={i} style={{ padding: "20px 24px", borderRight: i < 3 ? "1px solid #1e293b" : "none" }}>
                  <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 6 }}>{x.l}</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: x.c }}>{fmtMoney(x.v)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════
       OFÍCIOS TAB
       ═══════════════════════════════════════ */
    const OFICIO_STATUS = {
      aguardando: { label: "Aguardando", color: "#f59e0b", bg: "rgba(245,158,11,0.12)" },
      autorizado: { label: "Autorizado", color: "#22c55e", bg: "rgba(34,197,94,0.12)" },
      negado: { label: "Negado", color: "#ef4444", bg: "rgba(239,68,68,0.12)" },
    };

    function OficiosTab({ oficios, setOficios, propostas }) {
      const [showForm, setShowForm] = useState(false);
      const [editOf, setEditOf] = useState(null);
      const [delOf, setDelOf] = useState(null);

      const handleAdd = (f) => { setOficios(p => [...p, { ...f, id: uid(), criadoEm: new Date().toISOString() }]); setShowForm(false); };
      const handleEdit = (f) => { setOficios(p => p.map(o => o.id === editOf.id ? { ...o, ...f } : o)); setEditOf(null); };
      const handleDel = () => { setOficios(p => p.filter(o => o.id !== delOf.id)); setDelOf(null); };

      const getPropostaTitulo = (propId) => {
        const p = propostas.find(x => x.id === propId);
        return p ? (p.titulo || "Proposta sem título") : "— Proposta removida —";
      };

      return (
        <div className="no-print">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Ofícios de Solicitação de Abertura</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Controle de autorização vinculado às propostas</p>
            </div>
            <button style={S.btnPri} onClick={() => setShowForm(true)}>{I.plus}<span>Novo Ofício</span></button>
          </div>

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", marginBottom: 20 }}>
            {[
              { label: "Total", value: oficios.length, color: "#6366f1" },
              { label: "Aguardando", value: oficios.filter(o => o.status === "aguardando").length, color: "#f59e0b" },
              { label: "Autorizados", value: oficios.filter(o => o.status === "autorizado").length, color: "#22c55e" },
              { label: "Negados", value: oficios.filter(o => o.status === "negado").length, color: "#ef4444" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.mail}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {oficios.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.mail}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum ofício registrado</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Clique em "Novo Ofício" para registrar.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 12 }}>
              {oficios.map(o => {
                const stCfg = OFICIO_STATUS[o.status] || OFICIO_STATUS.aguardando;
                return (
                  <div key={o.id} style={S.card}>
                    <div style={{ padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14, flex: 1, minWidth: 200 }}>
                        <div style={{ width: 42, height: 42, borderRadius: 11, background: stCfg.bg, color: stCfg.color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{I.mail}</div>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                            <span style={{ fontSize: 14, fontWeight: 700, color: "#f1f5f9", fontFamily: "'JetBrains Mono','Fira Code',monospace" }}>{o.sigad || "—"}</span>
                            <span style={{ ...S.badge, color: stCfg.color, background: stCfg.bg }}>{stCfg.label}</span>
                          </div>
                          <div style={{ fontSize: 12, color: "#64748b", marginTop: 3 }}>
                            Proposta: <strong style={{ color: "#94a3b8" }}>{getPropostaTitulo(o.propostaId)}</strong>
                          </div>
                          {o.status === "autorizado" && o.oficioComprep && (
                            <div style={{ fontSize: 12, color: "#22c55e", marginTop: 3 }}>
                              COMPREP: <strong style={{ fontFamily: "'JetBrains Mono','Fira Code',monospace" }}>{o.oficioComprep}</strong>
                            </div>
                          )}
                          {o.observacoes && <div style={{ fontSize: 12, color: "#475569", marginTop: 2 }}>{o.observacoes}</div>}
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button style={S.actBtn} title="Editar" onClick={() => setEditOf(o)}>{I.edit}</button>
                        <button style={{ ...S.actBtn, color: "#ef4444" }} title="Excluir" onClick={() => setDelOf(o)}>{I.trash}</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <Modal open={showForm} onClose={() => setShowForm(false)} title="Novo Ofício de Solicitação" width={500}>
            <OficioForm propostas={propostas} onSave={handleAdd} onCancel={() => setShowForm(false)} />
          </Modal>
          <Modal open={!!editOf} onClose={() => setEditOf(null)} title="Editar Ofício" width={500}>
            {editOf && <OficioForm inicial={editOf} propostas={propostas} onSave={handleEdit} onCancel={() => setEditOf(null)} />}
          </Modal>
          {delOf && <Modal open onClose={() => setDelOf(null)} title="Confirmar Exclusão" width={420}>
            <div style={{ padding: "0 28px 28px" }}>
              <p style={{ fontSize: 14, color: "#94a3b8", lineHeight: 1.6, margin: 0 }}>Excluir o ofício <strong>{delOf.sigad || "sem SIGAD"}</strong>?</p>
              <div style={S.fActions}><button style={S.btnSec} onClick={() => setDelOf(null)}>Cancelar</button><button style={{ ...S.btnPri, background: "#dc2626" }} onClick={handleDel}>Excluir</button></div>
            </div>
          </Modal>}
        </div>
      );
    }

    function OficioForm({ inicial, propostas, onSave, onCancel }) {
      const [f, setF] = useState(inicial || { sigad: "", propostaId: propostas[0]?.id || "", status: "aguardando", oficioComprep: "", observacoes: "" });
      const ch = (k, v) => setF(p => ({ ...p, [k]: v }));
      const ok = f.sigad && f.propostaId;

      return (
        <div style={{ padding: "0 28px 28px" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14, marginTop: 18 }}>
            <FG label="Nº SIGAD *"><input style={S.inp} value={f.sigad} onChange={e => ch("sigad", e.target.value)} placeholder="Ex: 64000.012345/2026-01" /></FG>
            <FG label="Proposta Vinculada *">
              <select style={S.inp} value={f.propostaId} onChange={e => ch("propostaId", e.target.value)}>
                {propostas.length === 0 && <option value="">— Nenhuma proposta cadastrada —</option>}
                {propostas.map(p => (
                  <option key={p.id} value={p.id}>{p.titulo || "Proposta sem título"} ({fmtDate(p.dataCriacao)})</option>
                ))}
              </select>
            </FG>
            <FG label="Status de Autorização">
              <select style={S.inp} value={f.status} onChange={e => ch("status", e.target.value)}>
                {Object.entries(OFICIO_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </FG>
            {f.status === "autorizado" && (
              <FG label="Nº Ofício COMPREP"><input style={S.inp} value={f.oficioComprep || ""} onChange={e => ch("oficioComprep", e.target.value)} placeholder="Ex: Of nº 001-S1/COMPREP/2026" /></FG>
            )}
            <FG label="Observações"><textarea style={{ ...S.inp, minHeight: 64, resize: "vertical" }} value={f.observacoes} onChange={e => ch("observacoes", e.target.value)} placeholder="Informações adicionais..." /></FG>
          </div>
          <div style={S.fActions}><button style={S.btnSec} onClick={onCancel}>Cancelar</button><button style={{ ...S.btnPri, opacity: ok ? 1 : .5 }} disabled={!ok} onClick={() => ok && onSave(f)}>{inicial ? "Salvar" : "Registrar"}</button></div>
        </div>
      );
    }

    /* ═══════════════════════════════════════
       PAG TAB
       ═══════════════════════════════════════ */
    function PagTab({ propostas, setPropostas }) {
      const [saved, setSaved] = useState(false);
      const [filterPropId, setFilterPropId] = useState("");

      const updateMilPag = (propostaId, milId, field, value) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id === milId ? { ...m, [field]: value } : m)
        }));
      };

      const handleSave = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      };

      const allMil = propostas.flatMap(p => (p.militares || []).map(m => ({ ...m, _propId: p.id, _propTitulo: p.titulo })));
      const totalPagOk = allMil.filter(m => m.numeroPag).length;

      return (
        <div className="no-print">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Abertura de PAG Individual</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Controle de SIGAD e número de PAG por militar</p>
            </div>
            <button
              style={{ ...S.btnPri, background: saved ? "linear-gradient(135deg,#16a34a,#22c55e)" : "linear-gradient(135deg,#1d4ed8,#2563eb)", transition: "all .3s" }}
              onClick={handleSave}
            >
              {saved ? I.check : I.file}
              <span>{saved ? "Salvo!" : "Salvar"}</span>
            </button>
          </div>

          {propostas.filter(p => p.militares?.length > 0).length > 1 && (
            <div style={{ marginBottom: 16 }}>
              <select style={{ ...S.inp, maxWidth: 320 }} value={filterPropId} onChange={e => setFilterPropId(e.target.value)}>
                <option value="">— Todas as Propostas —</option>
                {propostas.filter(p => p.militares?.length > 0).map(p => <option key={p.id} value={p.id}>{p.titulo || "Sem título"}</option>)}
              </select>
            </div>
          )}

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Total de Militares", value: allMil.length, color: "#6366f1" },
              { label: "PAGs Registrados", value: totalPagOk, color: "#22c55e" },
              { label: "PAGs Pendentes", value: allMil.length - totalPagOk, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.file}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {allMil.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.file}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum militar nas propostas</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Cadastre militares em uma proposta para gerenciar os PAGs aqui.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 16 }}>
              {propostas.filter(p => p.militares?.length > 0 && (!filterPropId || p.id === filterPropId)).map(prop => {
                const pagsDone = prop.militares.filter(m => m.numeroPag).length;
                return (
                  <div key={prop.id} style={S.card}>
                    <div style={{ padding: "14px 22px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(59,130,246,0.04)" }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#93c5fd" }}>{prop.titulo || "Proposta sem título"}</span>
                      <span style={{
                        fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 5,
                        color: pagsDone === prop.militares.length ? "#22c55e" : "#f59e0b",
                        background: pagsDone === prop.militares.length ? "rgba(34,197,94,0.12)" : "rgba(245,158,11,0.12)",
                      }}>
                        {pagsDone}/{prop.militares.length} PAGs
                      </span>
                    </div>
                    <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 10 }}>
                      {prop.militares.map(mil => {
                        const done = !!mil.numeroPag;
                        return (
                          <div key={mil.id} style={{ background: "#0c111b", border: `1px solid ${done ? "rgba(34,197,94,0.25)" : "#1e293b"}`, borderRadius: 12, padding: "14px 16px", transition: "border-color .2s" }}>
                            <div style={{ display: "flex", alignItems: "flex-start", gap: 14, flexWrap: "wrap" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 200, flex: "1 1 200px" }}>
                                <InsigniaFAB postoGrad={mil.postoGrad} size={34} />
                                <div style={{ flex: 1 }}>
                                  <div style={{ fontWeight: 600, color: "#f1f5f9", fontSize: 13 }}>{mil.postoGrad} {mil.nomeGuerra}</div>
                                  <div style={{ fontSize: 11, color: "#64748b" }}>{mil.nomeCompleto}</div>
                                </div>
                                {done ? (
                                  <span style={{ fontSize: 11, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "3px 10px", borderRadius: 5, display: "flex", alignItems: "center", gap: 4 }}>
                                    {I.check} Registrado
                                  </span>
                                ) : (
                                  <span style={{ fontSize: 11, fontWeight: 600, color: "#f59e0b", background: "rgba(245,158,11,0.12)", padding: "3px 10px", borderRadius: 5 }}>
                                    Pendente
                                  </span>
                                )}
                              </div>
                              <div style={{ display: "flex", gap: 12, flex: "2 1 300px", flexWrap: "wrap" }}>
                                <FG label="Nº SIGAD Abertura de PAG" flex>
                                  <input style={S.inp} value={mil.sigadPag || ""} onChange={e => updateMilPag(prop.id, mil.id, "sigadPag", e.target.value)} placeholder="Nº SIGAD do ofício" />
                                </FG>
                                <FG label="Nº do PAG" flex>
                                  <input style={S.inp} value={mil.numeroPag || ""} onChange={e => updateMilPag(prop.id, mil.id, "numeroPag", e.target.value)} placeholder="Nº PAG gerado" />
                                </FG>
                                <FG label="Nº Subprocesso" flex>
                                  <input style={S.inp} value={mil.subprocesso || ""} onChange={e => updateMilPag(prop.id, mil.id, "subprocesso", e.target.value)} placeholder="Ex: 12345" />
                                </FG>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════
       PORTARIA TAB
       ═══════════════════════════════════════ */
    function PortariaTab({ propostas, setPropostas }) {
      const [saved, setSaved] = useState(false);
      const [filterPropId, setFilterPropId] = useState("");

      const updateMilField = (propostaId, milId, field, value) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id === milId ? { ...m, [field]: value } : m)
        }));
      };

      const handleSave = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      };

      const allMil = propostas.flatMap(p => (p.militares || []).map(m => ({ ...m, _propId: p.id })));
      const totalComPortaria = allMil.filter(m => m.portaria).length;
      const totalComBoletim = allMil.filter(m => m.boletim).length;

      return (
        <div className="no-print">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Portarias de Comissionamento</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Controle de portarias, itens 9449 e publicação em Boletim</p>
            </div>
            <button
              style={{ ...S.btnPri, background: saved ? "linear-gradient(135deg,#16a34a,#22c55e)" : "linear-gradient(135deg,#1d4ed8,#2563eb)", transition: "all .3s" }}
              onClick={handleSave}
            >
              {saved ? I.check : I.file}
              <span>{saved ? "Salvo!" : "Salvar"}</span>
            </button>
          </div>

          {propostas.filter(p => p.militares?.length > 0).length > 1 && (
            <div style={{ marginBottom: 16 }}>
              <select style={{ ...S.inp, maxWidth: 320 }} value={filterPropId} onChange={e => setFilterPropId(e.target.value)}>
                <option value="">— Todas as Propostas —</option>
                {propostas.filter(p => p.militares?.length > 0).map(p => <option key={p.id} value={p.id}>{p.titulo || "Sem título"}</option>)}
              </select>
            </div>
          )}

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Total de Militares", value: allMil.length, color: "#6366f1" },
              { label: "Com Portaria", value: totalComPortaria, color: "#8b5cf6" },
              { label: "Publicados em Bol", value: totalComBoletim, color: "#22c55e" },
              { label: "Pendentes", value: allMil.length - totalComBoletim, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.stamp}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {allMil.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.stamp}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum militar nas propostas</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Cadastre militares em uma proposta para registrar portarias aqui.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 16 }}>
              {propostas.filter(p => p.militares?.length > 0 && (!filterPropId || p.id === filterPropId)).map(prop => {
                const portOk = prop.militares.filter(m => m.portaria).length;
                const bolOk = prop.militares.filter(m => m.boletim).length;
                return (
                  <div key={prop.id} style={S.card}>
                    <div style={{ padding: "14px 22px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(139,92,246,0.04)" }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa" }}>{prop.titulo || "Proposta sem título"}</span>
                      <div style={{ display: "flex", gap: 8 }}>
                        <span style={{ fontSize: 11, fontWeight: 600, color: "#a78bfa", background: "rgba(139,92,246,0.12)", padding: "3px 8px", borderRadius: 4 }}>
                          Port. {portOk}/{prop.militares.length}
                        </span>
                        <span style={{
                          fontSize: 11, fontWeight: 600, padding: "3px 8px", borderRadius: 4,
                          color: bolOk === prop.militares.length ? "#22c55e" : "#f59e0b",
                          background: bolOk === prop.militares.length ? "rgba(34,197,94,0.12)" : "rgba(245,158,11,0.12)",
                        }}>
                          Bol. {bolOk}/{prop.militares.length}
                        </span>
                      </div>
                    </div>
                    <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 10 }}>
                      {prop.militares.map(mil => {
                        const done = !!mil.portaria;
                        const published = !!mil.boletim;
                        return (
                          <div key={mil.id} style={{ background: "#0c111b", border: `1px solid ${published ? "rgba(34,197,94,0.25)" : done ? "rgba(139,92,246,0.25)" : "#1e293b"}`, borderRadius: 12, padding: "14px 16px", transition: "border-color .2s" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                              <InsigniaFAB postoGrad={mil.postoGrad} size={34} />
                              <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 600, color: "#f1f5f9", fontSize: 13 }}>{mil.postoGrad} {mil.nomeGuerra}</div>
                                <div style={{ fontSize: 11, color: "#64748b" }}>{mil.nomeCompleto}</div>
                              </div>
                              {published ? (
                                <span style={{ fontSize: 11, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "3px 10px", borderRadius: 5, display: "flex", alignItems: "center", gap: 4 }}>
                                  {I.check} Publicado
                                </span>
                              ) : done ? (
                                <span style={{ fontSize: 11, fontWeight: 700, color: "#a78bfa", background: "rgba(139,92,246,0.12)", padding: "3px 10px", borderRadius: 5 }}>
                                  Portaria OK
                                </span>
                              ) : (
                                <span style={{ fontSize: 11, fontWeight: 600, color: "#f59e0b", background: "rgba(245,158,11,0.12)", padding: "3px 10px", borderRadius: 5 }}>
                                  Pendente
                                </span>
                              )}
                            </div>
                            <FG label="Portaria de Comissionamento">
                              <input style={S.inp} value={mil.portaria || ""} onChange={e => updateMilField(prop.id, mil.id, "portaria", e.target.value)} placeholder="PORTARIA BACO Nº XX/1GDAAE_CGEP, DE XX DE JANEIRO DE 20XX" />
                            </FG>
                            {mil.portaria && (
                              <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 10 }}>
                                <div style={S.row}>
                                  <FG label="Item Portaria 9449" flex>
                                    <select style={S.inp} value={mil.item9449 || "pendente"} onChange={e => updateMilField(prop.id, mil.id, "item9449", e.target.value)}>
                                      <option value="pendente">Pendente</option>
                                      <option value="ok">OK — Conforme</option>
                                      <option value="ajuste">Necessita Ajuste</option>
                                    </select>
                                  </FG>
                                  <FG label="Boletim Interno Ostensivo" flex>
                                    <input style={S.inp} value={mil.boletim || ""} onChange={e => updateMilField(prop.id, mil.id, "boletim", e.target.value)} placeholder="Bol Int Ost Nº XX, de XX MAR 2026" />
                                  </FG>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════
       NUMERÁRIO TAB
       ═══════════════════════════════════════ */
    const NUMERARIO_STATUS = {
      pendente: { label: "Pendente", color: "#f59e0b", bg: "rgba(245,158,11,0.12)" },
      concedido: { label: "Concedido", color: "#22c55e", bg: "rgba(34,197,94,0.12)" },
      negado: { label: "Negado", color: "#ef4444", bg: "rgba(239,68,68,0.12)" },
    };

    function NumerarioTab({ propostas, setPropostas }) {
      const [saved, setSaved] = useState(false);
      const [filterPropId, setFilterPropId] = useState("");

      const updateMilNum = (propostaId, milId, field, value) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id === milId ? { ...m, [field]: value } : m)
        }));
      };

      const handleSave = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      };

      const propostasComBol = propostas.map(p => ({
        ...p,
        militares: (p.militares || []).filter(m => m.portaria && m.boletim)
      })).filter(p => p.militares.length > 0);

      const allMil = propostasComBol.flatMap(p => p.militares);
      const totalConcedido = allMil.filter(m => m.numStatus === "concedido").length;
      const totalPublicado = allMil.filter(m => m.numBoletim).length;

      return (
        <div className="no-print">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Numerário — Ajuda de Custo</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Concessão (1378) — Militares com portaria publicada em boletim</p>
            </div>
            <button
              style={{ ...S.btnPri, background: saved ? "linear-gradient(135deg,#16a34a,#22c55e)" : "linear-gradient(135deg,#1d4ed8,#2563eb)", transition: "all .3s" }}
              onClick={handleSave}
            >
              {saved ? I.check : I.file}
              <span>{saved ? "Salvo!" : "Salvar"}</span>
            </button>
          </div>

          {propostasComBol.length > 1 && (
            <div style={{ marginBottom: 16 }}>
              <select style={{ ...S.inp, maxWidth: 320 }} value={filterPropId} onChange={e => setFilterPropId(e.target.value)}>
                <option value="">— Todas as Propostas —</option>
                {propostasComBol.map(p => <option key={p.id} value={p.id}>{p.titulo || "Sem título"}</option>)}
              </select>
            </div>
          )}

          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Militares Elegíveis", value: allMil.length, color: "#6366f1" },
              { label: "Concedidos", value: totalConcedido, color: "#22c55e" },
              { label: "Publicados em Bol", value: totalPublicado, color: "#3b82f6" },
              { label: "Pendentes", value: allMil.length - totalConcedido, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.coin}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {allMil.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.coin}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum militar elegível</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Militares aparecerão aqui após terem a portaria publicada em boletim.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 16 }}>
              {propostasComBol.filter(p => !filterPropId || p.id === filterPropId).map(prop => {
                const okCount = prop.militares.filter(m => m.numBoletim).length;
                return (
                  <div key={prop.id} style={S.card}>
                    <div style={{ padding: "14px 22px", borderBottom: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(234,179,8,0.04)" }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#fbbf24" }}>{prop.titulo || "Proposta sem título"}</span>
                      <span style={{
                        fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 5,
                        color: okCount === prop.militares.length ? "#22c55e" : "#f59e0b",
                        background: okCount === prop.militares.length ? "rgba(34,197,94,0.12)" : "rgba(245,158,11,0.12)",
                      }}>
                        {okCount}/{prop.militares.length}
                      </span>
                    </div>
                    <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 10 }}>
                      {prop.militares.map(mil => {
                        const stCfg = NUMERARIO_STATUS[mil.numStatus || "pendente"] || NUMERARIO_STATUS.pendente;
                        return (
                          <div key={mil.id} style={{ background: "#0c111b", border: `1px solid ${mil.numBoletim ? "rgba(34,197,94,0.25)" : "#1e293b"}`, borderRadius: 12, padding: "14px 16px", transition: "border-color .2s" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                              <InsigniaFAB postoGrad={mil.postoGrad} size={34} />
                              <div style={{ flex: 1 }}>
                                <div style={{ fontWeight: 600, color: "#f1f5f9", fontSize: 13 }}>{mil.postoGrad} {mil.nomeGuerra}</div>
                                <div style={{ fontSize: 11, color: "#64748b" }}>{mil.nomeCompleto}</div>
                              </div>
                              <span style={{ ...S.badge, color: stCfg.color, background: stCfg.bg }}>{stCfg.label}</span>
                            </div>
                            <div style={S.row}>
                              <FG label="Status Concessão (1378)" flex>
                                <select style={S.inp} value={mil.numStatus || "pendente"} onChange={e => updateMilNum(prop.id, mil.id, "numStatus", e.target.value)}>
                                  {Object.entries(NUMERARIO_STATUS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                                </select>
                              </FG>
                              <FG label="Boletim de Publicação" flex>
                                <input style={S.inp} value={mil.numBoletim || ""} onChange={e => updateMilNum(prop.id, mil.id, "numBoletim", e.target.value)} placeholder="Bol Int Ost Nº XX, de XX MAR 2026" />
                              </FG>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════
       ORDENS DE SERVIÇO TAB
       ═══════════════════════════════════════ */
    function emptyOS() {
      return { id: uid(), numero: "", missaoCurso: "", localidade: "", dataInicio: "", dataFim: "", status: "Planejado", pernoitesTransito: [] };
    }

    function OSTab({ propostas, setPropostas, oficios }) {
      const [saved, setSaved] = useState(false);
      const [selectedMilKey, setSelectedMilKey] = useState(null); // "propId::milId"

      const getComprep = (propId) => {
        const of = oficios.find(o => o.propostaId === propId && o.status === "autorizado" && o.oficioComprep);
        return of?.oficioComprep || null;
      };

      const updateOS = (propostaId, milId, osId, field, value) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : {
            ...m,
            ordensServico: (m.ordensServico || []).map(os => os.id === osId ? { ...os, [field]: value } : os)
          })
        }));
      };

      const addOS = (propostaId, milId) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : {
            ...m,
            ordensServico: [...(m.ordensServico || []), emptyOS()]
          })
        }));
      };

      const removeOS = (propostaId, milId, osId) => {
        setSaved(false);
        setPropostas(prev => prev.map(p => p.id !== propostaId ? p : {
          ...p,
          militares: p.militares.map(m => m.id !== milId ? m : {
            ...m,
            ordensServico: (m.ordensServico || []).filter(os => os.id !== osId)
          })
        }));
      };

      const handleSave = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      };

      // Lista plana de todos os militares com referência à proposta
      const allMil = propostas.flatMap(p =>
        (p.militares || []).map(m => ({
          ...m,
          _propId: p.id,
          _propTitulo: p.titulo || "Proposta sem título",
          _key: p.id + "::" + m.id,
        }))
      );

      const totalOS   = allMil.reduce((s, m) => s + (m.ordensServico?.length || 0), 0);
      const milComOS  = allMil.filter(m => m.ordensServico?.length > 0).length;

      // Militar selecionado
      const selMil = allMil.find(m => m._key === selectedMilKey) || null;

      // Auto-selecionar o primeiro se nenhum selecionado ainda
      React.useEffect(() => {
        if (!selectedMilKey && allMil.length > 0) setSelectedMilKey(allMil[0]._key);
      }, [allMil.length]);

      // Cálculos do militar selecionado
      const calcMil = (mil) => {
        if (!mil) return {};
        const oss = mil.ordensServico || [];
        const totalDiasModulos = (mil.modulos || []).reduce((s, m) => s + diffDays(m.dataInicio, m.dataFim), 0);
        const targetDias       = parseInt(mil.diasMinimos) || totalDiasModulos;
        const diasCumpridos    = calcDiasOS(oss, "Executado");
        const diasPlanejados   = calcDiasOS(oss, "Planejado");
        const diasRestantes    = Math.max(0, targetDias - diasCumpridos);
        const ossExec          = oss.filter(o => o.status === "Executado");
        const ossPlanj         = oss.filter(o => o.status === "Planejado");
        const totalDiariasExec = ossExec.reduce((acc, os) => acc + calcSubtotalOS(mil, os), 0);
        const totalDiariasPlanj = ossPlanj.reduce((acc, os) => acc + calcSubtotalOS(mil, os), 0);
        const _limOS = (parseFloat(mil.valorAbertura)||0) + (parseFloat(mil.valorFechamento)||0);
        const _atingiuOS = _limOS > 0 && totalDiariasExec >= _limOS;
        const isFechado = (targetDias > 0 && diasCumpridos >= targetDias) || _atingiuOS;
        return { oss, targetDias, diasCumpridos, diasPlanejados, diasRestantes, isFechado,
                 totalDiariasExec, totalDiariasPlanj,
                 totalDiariasGeral: totalDiariasExec + totalDiariasPlanj };
      };

      const cm = calcMil(selMil);

      return (
        <div className="no-print">

          {/* ── Cabeçalho ── */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f1f5f9" }}>Ordens de Serviço</h2>
              <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Selecione um militar na lista para gerenciar suas OS</p>
            </div>
            <button
              style={{ ...S.btnPri, background: saved ? "linear-gradient(135deg,#16a34a,#22c55e)" : "linear-gradient(135deg,#1d4ed8,#2563eb)", transition: "all .3s" }}
              onClick={handleSave}
            >
              {saved ? I.check : I.file}
              <span>{saved ? "Salvo!" : "Salvar"}</span>
            </button>
          </div>

          {/* ── Cards de resumo ── */}
          <div style={{ ...S.statsGrid, gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", marginBottom: 22 }}>
            {[
              { label: "Total de Militares", value: allMil.length, color: "#6366f1" },
              { label: "Militares com OS",   value: milComOS,      color: "#22c55e" },
              { label: "Total de OS",        value: totalOS,       color: "#3b82f6" },
              { label: "Sem OS",             value: allMil.length - milComOS, color: "#f59e0b" },
            ].map((c, i) => (
              <div key={i} style={S.statCard}>
                <div style={{ ...S.statIcon, background: c.color + "18", color: c.color }}>{I.clipboard}</div>
                <div><div style={S.statVal}>{c.value}</div><div style={S.statLbl}>{c.label}</div></div>
              </div>
            ))}
          </div>

          {allMil.length === 0 ? (
            <div style={{ ...S.card, ...S.empty }}>
              <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 12 }}>{I.clipboard}</div>
              <p style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8", margin: "0 0 6px" }}>Nenhum militar nas propostas</p>
              <p style={{ fontSize: 13, color: "#475569", margin: 0 }}>Cadastre militares em uma proposta para gerenciar as OS aqui.</p>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 16, alignItems: "start" }}>

              {/* ══ LISTA LATERAL DE MILITARES ══ */}
              <div style={{ ...S.card, position: "sticky", top: 80 }}>
                <div style={{ padding: "12px 16px", borderBottom: "1px solid #1e293b", background: "rgba(56,189,248,0.04)" }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#7dd3fc", textTransform: "uppercase", letterSpacing: ".05em" }}>Militares</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", maxHeight: "70vh", overflowY: "auto" }}>
                  {propostas.filter(p => p.militares?.length > 0).map(prop => (
                    <div key={prop.id}>
                      {/* Separador de proposta */}
                      <div style={{ padding: "8px 14px 6px", background: "rgba(30,41,59,0.6)", borderBottom: "1px solid #1e293b" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: ".05em" }}>
                          {prop.titulo || "Proposta sem título"}
                        </span>
                      </div>
                      {prop.militares.map(mil => {
                        const key    = prop.id + "::" + mil.id;
                        const isSelected = selectedMilKey === key;
                        const ossCount = mil.ordensServico?.length || 0;
                        const execCount = (mil.ordensServico || []).filter(o => o.status === "Executado").length;
                        const totalDiasModulos = (mil.modulos || []).reduce((s, m) => s + diffDays(m.dataInicio, m.dataFim), 0);
                        const targetDias = parseInt(mil.diasMinimos) || totalDiasModulos;
                        const diasCump = calcDiasOS(mil.ordensServico || [], "Executado");
                        const _limLst = (parseFloat(mil.valorAbertura)||0) + (parseFloat(mil.valorFechamento)||0);
                        const _execLst = (mil.ordensServico||[]).filter(o=>o.status==="Executado").reduce((a,o)=>a+calcSubtotalOS(mil,o),0);
                        const fechado  = (targetDias > 0 && diasCump >= targetDias) || (_limLst > 0 && _execLst >= _limLst);
                        return (
                          <button
                            key={key}
                            onClick={() => setSelectedMilKey(key)}
                            style={{
                              width: "100%", textAlign: "left", background: isSelected ? "rgba(59,130,246,0.12)" : "transparent",
                              border: "none", borderBottom: "1px solid rgba(30,41,59,0.5)",
                              borderLeft: isSelected ? "3px solid #3b82f6" : "3px solid transparent",
                              padding: "10px 14px", cursor: "pointer", transition: "all .15s",
                            }}
                          >
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <InsigniaFAB postoGrad={mil.postoGrad} size={30} />
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontSize: 12, fontWeight: 600, color: isSelected ? "#f1f5f9" : "#cbd5e1",
                                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                  {mil.postoGrad} {mil.nomeGuerra}
                                </div>
                                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}>
                                  <span style={{ fontSize: 10, color: ossCount > 0 ? "#22c55e" : "#475569", fontWeight: 600 }}>
                                    {ossCount} OS
                                  </span>
                                  {ossCount > 0 && (
                                    <span style={{ fontSize: 10, color: "#64748b" }}>
                                      ({execCount} exec.)
                                    </span>
                                  )}
                                  {fechado && (
                                    <span style={{ fontSize: 9, fontWeight: 700, color: "#22c55e", background: "rgba(34,197,94,0.12)", padding: "1px 5px", borderRadius: 3 }}>✔</span>
                                  )}
                                </div>
                              </div>
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>

              {/* ══ PAINEL DIREITO: OS DO MILITAR SELECIONADO ══ */}
              {selMil ? (
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

                  {/* Cabeçalho do militar */}
                  <div style={{ ...S.card }}>
                    <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <InsigniaFAB postoGrad={selMil.postoGrad} size={44} />
                        <div>
                          <div style={{ fontSize: 16, fontWeight: 700, color: "#f1f5f9" }}>{selMil.postoGrad} {selMil.nomeGuerra}</div>
                          <div style={{ fontSize: 12, color: "#64748b" }}>{selMil.nomeCompleto}</div>
                          <div style={{ fontSize: 11, color: "#475569", marginTop: 2 }}>{selMil._propTitulo} {getComprep(selMil._propId) ? <span style={{ color: "#22c55e", fontWeight: 600 }}>· COMPREP: {getComprep(selMil._propId)}</span> : null}</div>
                        </div>
                      </div>
                      <button style={S.btnPri} onClick={() => addOS(selMil._propId, selMil.id)}>{I.plus} Nova OS</button>
                    </div>

                    {/* Barra de progresso + resumo */}
                    <div style={{ padding: "0 20px 16px", display: "flex", gap: 10, flexWrap: "wrap" }}>
                      {[
                        { label: "Meta",       value: cm.targetDias + "d",            color: "#94a3b8" },
                        { label: "Executados", value: cm.diasCumpridos + "d",         color: "#3b82f6" },
                        { label: "Planejados", value: cm.diasPlanejados + "d",        color: "#a78bfa" },
                        { label: "Restantes",  value: cm.diasRestantes + "d",         color: cm.isFechado ? "#22c55e" : "#f59e0b" },
                        { label: "Diárias Exec.", value: fmtMoney(cm.totalDiariasExec),  color: "#22c55e" },
                        { label: "Diárias Planj.", value: fmtMoney(cm.totalDiariasPlanj), color: "#a78bfa" },
                        { label: "Total Diárias",  value: fmtMoney(cm.totalDiariasGeral), color: "#f59e0b" },
                      ].map((item, i) => (
                        <div key={i} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 8, padding: "8px 14px", minWidth: 90 }}>
                          <div style={{ fontSize: 10, color: "#475569", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".04em", marginBottom: 2 }}>{item.label}</div>
                          <div style={{ fontSize: 14, fontWeight: 700, color: item.color }}>{item.value}</div>
                        </div>
                      ))}
                      {cm.isFechado && (
                        <div style={{ display: "flex", alignItems: "center", padding: "8px 14px", background: "rgba(34,197,94,0.1)", border: "1px solid rgba(34,197,94,0.3)", borderRadius: 8 }}>
                          <span style={{ fontSize: 12, fontWeight: 700, color: "#22c55e" }}>✔ FECHADO</span>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Lista de OS */}
                  {cm.oss.length === 0 ? (
                    <div style={{ ...S.card, padding: "40px 24px", textAlign: "center" }}>
                      <div style={{ color: "#334155", display: "flex", justifyContent: "center", marginBottom: 10 }}>{I.clipboard}</div>
                      <p style={{ margin: "0 0 14px", fontSize: 13, color: "#64748b" }}>Nenhuma OS cadastrada para este militar.</p>
                      <button style={S.btnPri} onClick={() => addOS(selMil._propId, selMil.id)}>{I.plus} Adicionar primeira OS</button>
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {cm.oss.map((os, osIdx) => {
